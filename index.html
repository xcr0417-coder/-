<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>三國幻戰：魔王級割草試煉</title>
<style>
:root{
  --bg:#080b10;
  --panel:#151b28;
  --panel2:#20283a;
  --text:#f5f7ff;
  --muted:#9aa5bb;
  --gold:#ffd36a;
  --red:#ff6b6b;
  --green:#69e28d;
  --blue:#6ab7ff;
  --purple:#b980ff;
  --border:#2f3a52;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{
  margin:0;
  width:100vw;
  height:100vh;
  overflow:hidden;
  background:radial-gradient(circle at top,#202b45,#07090f 70%);
  color:var(--text);
  font-family:"Microsoft JhengHei","PingFang TC",system-ui,sans-serif;
}
button,input,select{
  font-family:inherit;
}
button{
  border:1px solid var(--border);
  background:linear-gradient(#2c3753,#172032);
  color:var(--text);
  border-radius:10px;
  padding:9px 12px;
  font-weight:700;
  cursor:pointer;
}
button:active{transform:scale(.96);}
button.primary{background:linear-gradient(#ffd36a,#b97922);color:#201300;}
button.danger{background:linear-gradient(#ff7878,#9c2020);}
button.green{background:linear-gradient(#7bea9d,#218046);}
button.purple{background:linear-gradient(#c690ff,#6730af);}
button.small{font-size:12px;padding:6px 8px;}
input,select{
  width:100%;
  padding:9px;
  border-radius:8px;
  background:#0c1220;
  color:var(--text);
  border:1px solid var(--border);
}
#app{
  height:100vh;
  display:flex;
  flex-direction:column;
}
#topbar{
  height:54px;
  background:rgba(5,8,14,.95);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 12px;
  z-index:50;
}
.logo{
  color:var(--gold);
  font-size:19px;
  font-weight:900;
  letter-spacing:1px;
}
.resources{
  display:flex;
  gap:10px;
  color:var(--muted);
  font-size:13px;
}
.resources b{color:var(--gold);}
#main{
  flex:1;
  min-height:0;
  display:grid;
  grid-template-columns:280px 1fr 310px;
}
.panel{
  background:rgba(18,24,38,.92);
  border-right:1px solid var(--border);
  overflow:auto;
  padding:12px;
}
.panel.right{
  border-right:none;
  border-left:1px solid var(--border);
}
.tabs{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
  margin-bottom:10px;
}
.tab.active{
  background:linear-gradient(#ffd36a,#b87920);
  color:#1a1100;
}
.section{
  background:rgba(255,255,255,.045);
  border:1px solid var(--border);
  border-radius:12px;
  padding:10px;
  margin-bottom:10px;
}
.section h3{
  margin:0 0 8px;
  color:var(--gold);
  font-size:15px;
}
.item{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  padding:8px;
  margin:6px 0;
  border-radius:10px;
  border:1px solid var(--border);
  background:rgba(255,255,255,.04);
}
.muted{color:var(--muted);font-size:13px;line-height:1.5;}
.gold{color:var(--gold);}
.red{color:var(--red);}
.green{color:var(--green);}
.blue{color:var(--blue);}
.purple{color:var(--purple);}
#gameWrap{
  position:relative;
  overflow:hidden;
  background:#0a1020;
}
#gameCanvas{
  width:100%;
  height:100%;
  display:block;
}
#hud{
  position:absolute;
  top:10px;
  left:10px;
  right:10px;
  display:flex;
  justify-content:space-between;
  gap:10px;
  pointer-events:none;
}
.hudBox{
  background:rgba(0,0,0,.5);
  border:1px solid rgba(255,255,255,.14);
  border-radius:12px;
  padding:8px 10px;
  min-width:160px;
  font-size:13px;
}
.bar{
  height:10px;
  border-radius:999px;
  background:#29334a;
  overflow:hidden;
  margin-top:5px;
}
.bar div{height:100%;width:50%;}
.hp div{background:linear-gradient(90deg,#ff4040,#ffa15f);}
.mp div{background:linear-gradient(90deg,#3b9cff,#8bdcff);}
.boss div{background:linear-gradient(90deg,#a855f7,#ff4ca8);}
.exp div{background:linear-gradient(90deg,#ffd36a,#79ff9e);}
#dialogBox{
  position:absolute;
  left:50%;
  bottom:20px;
  transform:translateX(-50%);
  width:min(720px,92%);
  background:rgba(5,8,16,.94);
  border:1px solid var(--gold);
  border-radius:14px;
  padding:14px;
  display:none;
  z-index:30;
}
#dialogName{
  color:var(--gold);
  font-weight:900;
  margin-bottom:6px;
}
#dialogText{line-height:1.6;}
#mobileControls{
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:190px;
  display:none;
  pointer-events:none;
}
#joystickBase{
  position:absolute;
  left:35px;
  bottom:35px;
  width:120px;
  height:120px;
  border-radius:50%;
  background:rgba(255,255,255,.08);
  border:2px solid rgba(255,255,255,.22);
  pointer-events:auto;
}
#joystickKnob{
  position:absolute;
  left:35px;
  top:35px;
  width:50px;
  height:50px;
  border-radius:50%;
  background:rgba(255,211,106,.88);
  box-shadow:0 0 20px rgba(255,211,106,.45);
}
.actionBtns{
  position:absolute;
  right:24px;
  bottom:28px;
  display:grid;
  grid-template-columns:68px 68px;
  gap:10px;
  pointer-events:auto;
}
.skillBtn{
  width:68px;
  height:68px;
  border-radius:50%;
  font-size:12px;
  padding:0;
}
#modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.72);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:100;
}
.modalCard{
  width:min(820px,94vw);
  max-height:86vh;
  overflow:auto;
  background:linear-gradient(#1d2639,#0e1421);
  border:1px solid var(--border);
  border-radius:18px;
  padding:18px;
  box-shadow:0 24px 70px rgba(0,0,0,.5);
}
.modalCard h2{
  margin-top:0;
  color:var(--gold);
}
.cardGrid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(125px,1fr));
  gap:10px;
}
.heroCard{
  background:rgba(255,255,255,.05);
  border:1px solid var(--border);
  border-radius:12px;
  padding:9px;
  text-align:center;
}
.portrait{
  width:82px;
  height:82px;
  margin:0 auto 7px;
  border-radius:50%;
  background:radial-gradient(circle at top,#52617f,#121827);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:38px;
  border:2px solid rgba(255,255,255,.16);
}
.notice{
  border-left:3px solid var(--gold);
  padding:8px;
  background:rgba(255,211,106,.08);
  margin:8px 0;
  line-height:1.5;
}
.rarity-SSR{color:#ffdf70;}
.rarity-SR{color:#c293ff;}
.rarity-R{color:#7fc8ff;}
@media(max-width:1120px){
  #main{grid-template-columns:230px 1fr;}
  .panel.right{display:none;}
}
@media(max-width:760px){
  #main{grid-template-columns:1fr;}
  .panel{display:none;}
  #mobileControls{display:block;}
  .resources{font-size:11px;gap:5px;}
  #topbar{height:48px;}
}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div class="logo">三國幻戰</div>
    <div class="resources">
      <span>金幣 <b id="goldText">0</b></span>
      <span>玉璧 <b id="gemText">0</b></span>
      <span>體力 <b id="energyText">0</b></span>
      <span>戰力 <b id="powerText">0</b></span>
    </div>
    <button class="small primary" onclick="openModal('menu')">選單</button>
  </div>

  <div id="main">
    <aside class="panel">
      <div class="tabs">
        <button class="tab active" onclick="switchLeft('battle')">戰鬥</button>
        <button class="tab" onclick="switchLeft('team')">隊伍</button>
        <button class="tab" onclick="switchLeft('gacha')">抽卡</button>
        <button class="tab" onclick="switchLeft('daily')">每日</button>
      </div>
      <div id="leftContent"></div>
    </aside>

    <main id="gameWrap">
      <canvas id="gameCanvas"></canvas>

      <div id="hud">
        <div class="hudBox">
          <div>武將 HP <span id="hpText"></span></div>
          <div class="bar hp"><div id="hpBar"></div></div>
          <div>氣力 <span id="mpText"></span></div>
          <div class="bar mp"><div id="mpBar"></div></div>
          <div>等級 <span id="lvText"></span></div>
          <div class="bar exp"><div id="expBar"></div></div>
        </div>
        <div class="hudBox">
          <div>關卡：<span id="stageText"></span></div>
          <div>難度：<span id="difficultyText" class="red"></span></div>
          <div>擊破：<span id="killText"></span></div>
          <div>除草：<span id="weedText"></span></div>
        </div>
        <div class="hudBox">
          <div>Boss HP <span id="bossHpText"></span></div>
          <div class="bar boss"><div id="bossBar"></div></div>
        </div>
      </div>

      <div id="dialogBox">
        <div id="dialogName"></div>
        <div id="dialogText"></div>
        <div style="text-align:right;margin-top:10px;">
          <button class="small primary" onclick="nextDialog()">下一句</button>
        </div>
      </div>

      <div id="mobileControls">
        <div id="joystickBase"><div id="joystickKnob"></div></div>
        <div class="actionBtns">
          <button class="skillBtn primary" ontouchstart="playerAttack()" onclick="playerAttack()">普攻</button>
          <button class="skillBtn purple" ontouchstart="castSkill()" onclick="castSkill()">戰法</button>
          <button class="skillBtn green" ontouchstart="cutWeed()" onclick="cutWeed()">除草</button>
          <button class="skillBtn danger" ontouchstart="dodge()" onclick="dodge()">閃避</button>
        </div>
      </div>
    </main>

    <aside class="panel right">
      <div class="section">
        <h3>更新公告</h3>
        <div class="notice">
          三國幻戰整合版：補回魔王級難度、Boss、遠程兵、法師、盾兵、掉落道具、平板觸控搖桿、卡庫、隊伍、抽卡、禮物碼、每日、儲值、角色繪圖、角色對話、管理員頁、固定搖桿、更多武將資料、劇情對話框。
        </div>
        <div class="notice">
          新增除草機制：地圖會生成雜草，靠近後按 E 或右下「除草」，可能獲得金幣、藥草、糧草、寶箱，也可能觸發伏兵。
        </div>
      </div>

      <div class="section">
        <h3>操作說明</h3>
        <div class="muted">
          鍵盤：WASD 移動、J 普攻、K 戰法、E 除草、L 補血、空白閃避。<br>
          平板：左下搖桿，右下按鈕。
        </div>
      </div>

      <div class="section">
        <h3>劇情</h3>
        <button onclick="startStory()">播放劇情對話</button>
      </div>

      <div class="section">
        <h3>創作者工具</h3>
        <button class="primary" onclick="openModal('admin')">管理員頁</button>
      </div>
    </aside>
  </div>
</div>

<div id="modal">
  <div class="modalCard">
    <div id="modalContent"></div>
    <div style="text-align:right;margin-top:14px;">
      <button onclick="closeModal()">關閉</button>
    </div>
  </div>
</div>

<script>
const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");
let W=0,H=0,last=0;
let keys={};
let currentLeft="battle";
let fixedJoystick=true;

const state={
  gold:6000,
  gem:1600,
  energy:80,
  difficulty:"魔王級",
  stage:"虎牢幻境",
  owned:[1,2,3],
  team:[1,2,3],
  dailyClaimed:false,
  giftUsed:{},
  rechargeTotal:0,
  inventory:{potion:6,herb:0,grain:0,iron:0,bossSoul:0,treasure:0},
  kills:0,
  weedsCut:0,
  announcements:[
    "虎牢幻境開放，呂布幻影成為第一位魔王級 Boss。",
    "新增固定搖桿模式，平板操作更穩定。",
    "新增除草機制，草叢可能掉落資源，也可能藏有伏兵。"
  ]
};

const difficulties={
  "普通":{hp:1,atk:1,boss:1,reward:1,spawn:1},
  "困難":{hp:1.5,atk:1.35,boss:1.6,reward:1.4,spawn:1.2},
  "噩夢":{hp:2.3,atk:1.8,boss:2.5,reward:2,spawn:1.4},
  "魔王級":{hp:3.8,atk:2.8,boss:5,reward:3.8,spawn:1.8}
};

const heroes=[
  {id:1,name:"關羽",title:"美髯公",rarity:"SSR",job:"猛將",icon:"🟢",atk:58,hp:520,skill:"青龍偃月"},
  {id:2,name:"趙雲",title:"常山龍膽",rarity:"SSR",job:"突擊",icon:"🔵",atk:56,hp:460,skill:"七進七出"},
  {id:3,name:"諸葛亮",title:"臥龍",rarity:"SSR",job:"法師",icon:"🪶",atk:62,hp:360,skill:"八陣雷火"},
  {id:4,name:"張飛",title:"燕人",rarity:"SR",job:"盾兵",icon:"🟤",atk:42,hp:650,skill:"長坂怒吼"},
  {id:5,name:"黃忠",title:"老當益壯",rarity:"SR",job:"遠程兵",icon:"🏹",atk:48,hp:390,skill:"百步穿楊"},
  {id:6,name:"馬超",title:"錦馬超",rarity:"SR",job:"騎兵",icon:"🐎",atk:50,hp:430,skill:"西涼突擊"},
  {id:7,name:"周瑜",title:"美周郎",rarity:"SSR",job:"法師",icon:"🔥",atk:64,hp:350,skill:"赤壁烈焰"},
  {id:8,name:"呂蒙",title:"白衣渡江",rarity:"R",job:"軍師",icon:"📘",atk:32,hp:330,skill:"奇襲"},
  {id:9,name:"太史慈",title:"東萊勇將",rarity:"SR",job:"遠程兵",icon:"🎯",atk:45,hp:410,skill:"神射連擊"},
  {id:10,name:"貂蟬",title:"閉月",rarity:"SSR",job:"輔助",icon:"🌸",atk:36,hp:390,skill:"亂舞魅影"},
  {id:11,name:"曹操",title:"魏武帝",rarity:"SSR",job:"君主",icon:"👑",atk:54,hp:480,skill:"魏武號令"},
  {id:12,name:"孫尚香",title:"弓腰姬",rarity:"SR",job:"遠程兵",icon:"🏵️",atk:46,hp:370,skill:"連弩破陣"},
  {id:13,name:"司馬懿",title:"冢虎",rarity:"SSR",job:"法師",icon:"🕯️",atk:61,hp:370,skill:"鬼謀黑雷"},
  {id:14,name:"許褚",title:"虎癡",rarity:"R",job:"盾兵",icon:"🐯",atk:36,hp:610,skill:"虎衛衝撞"},
  {id:15,name:"甘寧",title:"錦帆賊",rarity:"R",job:"刺客",icon:"⚓",atk:40,hp:360,skill:"錦帆夜襲"}
];

const player={
  x:180,y:300,r:18,
  hp:1000,maxHp:1000,
  mp:300,maxMp:300,
  lv:1,exp:0,nextExp:100,
  atk:65,speed:260,
  cd:0,skillCd:0,invuln:0
};

let boss=null;
let enemies=[];
let bullets=[];
let drops=[];
let weeds=[];
let floating=[];
let dialogQueue=[];
let currentDialog=0;

let joy={active:false,dx:0,dy:0};

function resize(){
  const rect=canvas.parentElement.getBoundingClientRect();
  W=rect.width;H=rect.height;
  canvas.width=W*devicePixelRatio;
  canvas.height=H*devicePixelRatio;
  ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
}
window.addEventListener("resize",resize);
resize();

function calcPower(){
  return state.team
    .map(id=>heroes.find(h=>h.id===id))
    .reduce((s,h)=>s+h.hp+h.atk*12,0);
}

function applyTeamStats(){
  const p=calcPower();
  player.maxHp=750+Math.floor(p*.18);
  player.maxMp=240+state.team.length*50;
  player.atk=38+Math.floor(p*.02);
  player.hp=Math.min(player.hp,player.maxHp);
  player.mp=Math.min(player.mp,player.maxMp);
}

function resetBattle(){
  applyTeamStats();
  const d=difficulties[state.difficulty];
  player.x=160;
  player.y=H/2;
  player.hp=player.maxHp;
  player.mp=player.maxMp;
  state.kills=0;

  boss={
    name:"呂布幻影",
    x:W-210,
    y:H/2,
    r:50,
    hp:Math.floor(3600*d.boss),
    maxHp:Math.floor(3600*d.boss),
    atk:48*d.atk,
    phase:1,
    attackTimer:1,
    summonTimer:2.5
  };

  enemies=[];
  bullets=[];
  drops=[];
  weeds=[];
  floating=[];

  spawnWeeds(28);
  spawnEnemy("盾兵");
  spawnEnemy("遠程兵");
  spawnEnemy("法師");
}

function spawnEnemy(type,x,y){
  const d=difficulties[state.difficulty];
  const base={
    "步兵":{hp:180,atk:14,r:15,speed:105,range:35,color:"#9ca3af"},
    "遠程兵":{hp:220,atk:20,r:16,speed:92,range:280,color:"#6ab7ff"},
    "法師":{hp:190,atk:30,r:15,speed:75,range:330,color:"#b980ff"},
    "盾兵":{hp:470,atk:16,r:20,speed:65,range:48,color:"#ffd36a"},
    "伏兵":{hp:260,atk:24,r:17,speed:135,range:45,color:"#ff6b6b"}
  }[type];

  enemies.push({
    type,
    x:x??(W*.48+Math.random()*W*.45),
    y:y??(85+Math.random()*(H-140)),
    hp:Math.floor(base.hp*d.hp),
    maxHp:Math.floor(base.hp*d.hp),
    atk:base.atk*d.atk,
    r:base.r,
    speed:base.speed,
    range:base.range,
    color:base.color,
    cd:Math.random()*1.4
  });
}

function spawnWeeds(n){
  for(let i=0;i<n;i++){
    weeds.push({
      x:70+Math.random()*(W-140),
      y:95+Math.random()*(H-145),
      r:14+Math.random()*8,
      cut:false,
      sway:Math.random()*Math.PI*2
    });
  }
}

function playerAttack(){
  if(player.cd>0)return;
  player.cd=.28;

  let hit=false;
  if(boss && dist(player,boss)<player.r+boss.r+45){
    damageBoss(player.atk);
    hit=true;
  }

  enemies.forEach(e=>{
    if(dist(player,e)<player.r+e.r+42){
      e.hp-=player.atk;
      floatText(e.x,e.y-22,"-"+player.atk,"#ffdf70");
      hit=true;
    }
  });

  removeDeadEnemies();
  if(!hit)floatText(player.x,player.y-30,"揮空","#aaa");
}

function castSkill(){
  if(player.skillCd>0 || player.mp<45)return;
  player.skillCd=1.7;
  player.mp-=45;

  bullets.push({
    from:"player",
    x:player.x,
    y:player.y,
    vx:560,
    vy:0,
    r:10,
    dmg:player.atk*2.6,
    color:"#8bdcff",
    life:1.3
  });

  enemies.forEach(e=>{
    if(dist(player,e)<165){
      e.hp-=player.atk*1.1;
      floatText(e.x,e.y-20,"戰法","#8bdcff");
    }
  });

  if(boss && dist(player,boss)<190){
    damageBoss(player.atk*1.2);
  }
  removeDeadEnemies();
}

function cutWeed(){
  let target=null;
  let best=9999;
  weeds.forEach(w=>{
    if(w.cut)return;
    const dd=dist(player,w);
    if(dd<best){
      best=dd;
      target=w;
    }
  });

  if(!target || best>55){
    floatText(player.x,player.y-26,"附近沒有草","#aaa");
    return;
  }

  target.cut=true;
  state.weedsCut++;

  const r=Math.random();
  if(r<.32){
    const g=80+Math.floor(Math.random()*160);
    state.gold+=g;
    floatText(target.x,target.y,"金幣+"+g,"#ffd36a");
  }else if(r<.52){
    state.inventory.herb++;
    floatText(target.x,target.y,"藥草+1","#69e28d");
  }else if(r<.68){
    state.inventory.grain++;
    state.energy+=3;
    floatText(target.x,target.y,"糧草+1","#d7b56d");
  }else if(r<.82){
    state.inventory.iron++;
    floatText(target.x,target.y,"鐵礦+1","#b8c0cc");
  }else if(r<.93){
    state.inventory.treasure++;
    state.gem+=20;
    floatText(target.x,target.y,"寶箱+1","#b980ff");
  }else{
    spawnEnemy("伏兵",target.x+20,target.y+20);
    floatText(target.x,target.y,"伏兵！","#ff6b6b");
  }

  if(weeds.filter(w=>!w.cut).length<6)spawnWeeds(10);
  updateUI();
  renderLeft();
}

function usePotion(){
  if(state.inventory.potion<=0)return;
  state.inventory.potion--;
  player.hp=Math.min(player.maxHp,player.hp+Math.floor(player.maxHp*.35));
  floatText(player.x,player.y-25,"補血","#69e28d");
  renderLeft();
}

function dodge(){
  if(player.invuln>0)return;
  player.invuln=.45;
  player.x+=85;
  player.x=Math.min(W-70,player.x);
}

function damageBoss(amount){
  boss.hp-=amount;
  floatText(boss.x,boss.y-25,"-"+Math.floor(amount),"#ffdf70");
  if(boss.hp<=0)winBattle();
}

function playerDamage(amount){
  if(player.invuln>0)return;
  player.hp-=amount;
  player.invuln=.55;
  floatText(player.x,player.y-25,"-"+Math.floor(amount),"#ff6b6b");
  if(player.hp<=0)loseBattle();
}

function removeDeadEnemies(){
  enemies=enemies.filter(e=>{
    if(e.hp<=0){
      state.kills++;
      gainExp(18);
      dropItem(e.x,e.y);
      return false;
    }
    return true;
  });
}

function gainExp(v){
  player.exp+=v;
  while(player.exp>=player.nextExp){
    player.exp-=player.nextExp;
    player.lv++;
    player.nextExp=Math.floor(player.nextExp*1.25);
    player.maxHp+=80;
    player.atk+=8;
    player.hp=player.maxHp;
    floatText(player.x,player.y-45,"升級！","#ffd36a");
  }
}

function dropItem(x,y){
  const r=Math.random();
  let item="gold";
  if(r>.88)item="potion";
  else if(r>.74)item="herb";
  else if(r>.60)item="grain";
  else if(r>.46)item="iron";
  drops.push({x,y,item,r:12});
}

function collectDrop(d){
  if(d.item==="gold"){
    const g=Math.floor(70*difficulties[state.difficulty].reward);
    state.gold+=g;
    floatText(d.x,d.y,"金幣+"+g,"#ffd36a");
  }
  if(d.item==="potion"){
    state.inventory.potion++;
    floatText(d.x,d.y,"藥水+1","#69e28d");
  }
  if(d.item==="herb"){
    state.inventory.herb++;
    floatText(d.x,d.y,"藥草+1","#69e28d");
  }
  if(d.item==="grain"){
    state.inventory.grain++;
    state.energy+=2;
    floatText(d.x,d.y,"糧草+1","#d7b56d");
  }
  if(d.item==="iron"){
    state.inventory.iron++;
    floatText(d.x,d.y,"鐵礦+1","#b8c0cc");
  }
  updateUI();
  renderLeft();
}

function winBattle(){
  const d=difficulties[state.difficulty];
  const reward=Math.floor(1300*d.reward);
  state.gold+=reward;
  state.gem+=Math.floor(60*d.reward);
  state.inventory.bossSoul++;
  openSimpleModal("勝利",`
    <p class="green">你擊敗了呂布幻影！</p>
    <p>獲得金幣 ${reward}、玉璧、Boss 魂魄 x1。</p>
    <p>擊破數：${state.kills}，除草數：${state.weedsCut}</p>
    <button class="primary" onclick="closeModal();resetBattle();">再戰一次</button>
  `);
  updateUI();
}

function loseBattle(){
  openSimpleModal("戰敗",`
    <p class="red">部隊被魔王級幻境擊退。</p>
    <p>建議：提升隊伍戰力、用除草取得補給、先清遠程兵與法師。</p>
    <button class="primary" onclick="closeModal();resetBattle();">重新挑戰</button>
  `);
}

function update(dt){
  player.cd=Math.max(0,player.cd-dt);
  player.skillCd=Math.max(0,player.skillCd-dt);
  player.invuln=Math.max(0,player.invuln-dt);
  player.mp=Math.min(player.maxMp,player.mp+18*dt);

  let mx=0,my=0;
  if(keys.w||keys.ArrowUp)my--;
  if(keys.s||keys.ArrowDown)my++;
  if(keys.a||keys.ArrowLeft)mx--;
  if(keys.d||keys.ArrowRight)mx++;
  if(joy.active || fixedJoystick){
    mx+=joy.dx;
    my+=joy.dy;
  }
  const len=Math.hypot(mx,my)||1;
  if(Math.hypot(mx,my)>0){
    player.x+=mx/len*player.speed*dt;
    player.y+=my/len*player.speed*dt;
  }
  player.x=Math.max(30,Math.min(W-30,player.x));
  player.y=Math.max(70,Math.min(H-35,player.y));

  if(boss && boss.hp>0){
    boss.summonTimer-=dt;
    boss.attackTimer-=dt;

    if(boss.hp<boss.maxHp*.55)boss.phase=2;
    if(boss.hp<boss.maxHp*.25)boss.phase=3;

    if(boss.summonTimer<=0){
      boss.summonTimer=boss.phase===1?4.2:boss.phase===2?3:2.1;
      const pool=["步兵","盾兵","遠程兵","法師"];
      spawnEnemy(pool[Math.floor(Math.random()*pool.length)]);
    }

    if(boss.attackTimer<=0){
      boss.attackTimer=boss.phase===1?1.4:boss.phase===2?1:.72;
      const a=angleTo(boss,player);
      bullets.push({
        from:"boss",
        x:boss.x,
        y:boss.y,
        vx:Math.cos(a)*(240+boss.phase*55),
        vy:Math.sin(a)*(240+boss.phase*55),
        r:12,
        dmg:boss.atk,
        color:"#ff4ca8",
        life:4
      });
    }

    if(dist(player,boss)<player.r+boss.r){
      playerDamage(boss.atk*dt*1.5);
    }
  }

  enemies.forEach(e=>{
    e.cd-=dt;
    const a=angleTo(e,player);
    const dd=dist(e,player);
    if(dd>e.range*.75){
      e.x+=Math.cos(a)*e.speed*dt;
      e.y+=Math.sin(a)*e.speed*dt;
    }
    if(e.cd<=0){
      e.cd=e.type==="法師"?1.8:e.type==="遠程兵"?1.15:.75;
      if(e.type==="法師"||e.type==="遠程兵"){
        bullets.push({
          from:"enemy",
          x:e.x,
          y:e.y,
          vx:Math.cos(a)*(e.type==="法師"?190:270),
          vy:Math.sin(a)*(e.type==="法師"?190:270),
          r:e.type==="法師"?10:7,
          dmg:e.atk,
          color:e.color,
          life:3
        });
      }else{
        if(dd<e.r+player.r+18)playerDamage(e.atk);
      }
    }
  });

  bullets.forEach(b=>{
    b.x+=b.vx*dt;
    b.y+=b.vy*dt;
    b.life-=dt;
    if(b.from==="player"){
      if(boss && dist(b,boss)<b.r+boss.r){
        damageBoss(b.dmg);
        b.life=0;
      }
      enemies.forEach(e=>{
        if(dist(b,e)<b.r+e.r){
          e.hp-=b.dmg;
          b.life=0;
        }
      });
    }else{
      if(dist(b,player)<b.r+player.r){
        playerDamage(b.dmg);
        b.life=0;
      }
    }
  });

  removeDeadEnemies();
  bullets=bullets.filter(b=>b.life>0&&b.x>-60&&b.x<W+60&&b.y>-60&&b.y<H+60);

  drops.forEach(d=>{
    if(dist(d,player)<d.r+player.r+12)d.collected=true;
  });
  drops.filter(d=>d.collected).forEach(collectDrop);
  drops=drops.filter(d=>!d.collected);

  floating.forEach(f=>{
    f.life-=dt;
    f.y-=35*dt;
  });
  floating=floating.filter(f=>f.life>0);

  updateUI();
}

function draw(){
  ctx.clearRect(0,0,W,H);
  drawGround();
  weeds.forEach(drawWeed);
  drops.forEach(drawDrop);
  enemies.forEach(drawEnemy);
  if(boss)drawBoss();
  bullets.forEach(drawBullet);
  drawPlayer();

  floating.forEach(f=>{
    ctx.globalAlpha=Math.max(0,f.life);
    ctx.fillStyle=f.color;
    ctx.font="bold 16px sans-serif";
    ctx.textAlign="center";
    ctx.fillText(f.text,f.x,f.y);
    ctx.globalAlpha=1;
  });
}

function drawGround(){
  ctx.fillStyle="#0b1324";
  ctx.fillRect(0,0,W,H);
  ctx.strokeStyle="rgba(255,255,255,.04)";
  for(let x=0;x<W;x+=48){
    ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();
  }
  for(let y=0;y<H;y+=48){
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
  }
  ctx.strokeStyle="rgba(255,211,106,.25)";
  ctx.lineWidth=3;
  ctx.strokeRect(25,62,W-50,H-92);
}

function drawWeed(w){
  if(w.cut)return;
  ctx.save();
  ctx.translate(w.x,w.y);
  ctx.strokeStyle="#58c56e";
  ctx.lineWidth=3;
  for(let i=-2;i<=2;i++){
    ctx.beginPath();
    ctx.moveTo(i*4,8);
    ctx.quadraticCurveTo(i*6,-4,i*9,-w.r);
    ctx.stroke();
  }
  ctx.restore();
}

function drawPlayer(){
  ctx.save();
  ctx.translate(player.x,player.y);
  ctx.globalAlpha=player.invuln>0?.55:1;
  ctx.fillStyle="#6ab7ff";
  ctx.beginPath();
  ctx.arc(0,0,player.r,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle="#fff";
  ctx.font="22px sans-serif";
  ctx.textAlign="center";
  ctx.textBaseline="middle";
  ctx.fillText("將",0,1);
  ctx.restore();
}

function drawBoss(){
  ctx.save();
  ctx.translate(boss.x,boss.y);
  ctx.fillStyle=boss.phase===1?"#a855f7":boss.phase===2?"#ff4ca8":"#ff3030";
  ctx.beginPath();
  ctx.arc(0,0,boss.r,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle="#fff";
  ctx.font="36px sans-serif";
  ctx.textAlign="center";
  ctx.textBaseline="middle";
  ctx.fillText("呂",0,1);
  ctx.font="13px sans-serif";
  ctx.fillText("Phase "+boss.phase,0,boss.r+18);
  ctx.restore();
}

function drawEnemy(e){
  ctx.save();
  ctx.translate(e.x,e.y);
  ctx.fillStyle=e.color;
  ctx.beginPath();
  ctx.arc(0,0,e.r,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle="#111";
  ctx.font="16px sans-serif";
  ctx.textAlign="center";
  ctx.textBaseline="middle";
  const text={
    "步兵":"兵",
    "遠程兵":"弓",
    "法師":"術",
    "盾兵":"盾",
    "伏兵":"伏"
  }[e.type];
  ctx.fillText(text,0,1);
  ctx.fillStyle="#263046";
  ctx.fillRect(-22,-e.r-12,44,5);
  ctx.fillStyle="#69e28d";
  ctx.fillRect(-22,-e.r-12,44*(e.hp/e.maxHp),5);
  ctx.restore();
}

function drawBullet(b){
  ctx.fillStyle=b.color;
  ctx.beginPath();
  ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
  ctx.fill();
}

function drawDrop(d){
  ctx.save();
  ctx.translate(d.x,d.y);
  const color={
    gold:"#ffd36a",
    potion:"#69e28d",
    herb:"#58c56e",
    grain:"#d7b56d",
    iron:"#b8c0cc"
  }[d.item]||"#fff";
  ctx.fillStyle=color;
  ctx.beginPath();
  ctx.arc(0,0,d.r,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle="#111";
  ctx.font="12px sans-serif";
  ctx.textAlign="center";
  ctx.textBaseline="middle";
  const t={
    gold:"金",
    potion:"藥",
    herb:"草",
    grain:"糧",
    iron:"鐵"
  }[d.item]||"?";
  ctx.fillText(t,0,1);
  ctx.restore();
}

function floatText(x,y,text,color){
  floating.push({x,y,text,color,life:.9});
}

function loop(t){
  const dt=Math.min(.033,(t-last)/1000||0);
  last=t;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

      </div>
      <div class="section">
        <h3>道具</h3>
        <div class="item"><span>補血藥</span><b>${state.inventory.potion}</b></div>
        <div class="item"><span>藥草</span><b>${state.inventory.herb}</b></div>
        <div class="item"><span>糧草</span><b>${state.inventory.grain}</b></div>

function heroRow(id,inTeam){
  const h=heroes.find(x=>x.id===id);
  return `
    <div class="item">
      <span>
        <b class="rarity-${h.rarity}">${h.icon} ${h.name}</b><br>
        <span class="muted">${h.title}｜${h.rarity}｜${h.job}｜${h.skill}</span>
      </span>
      ${inTeam
        ? `<button class="small danger" onclick="removeTeam(${id})">下陣</button>`
        : `<button class="small primary" onclick="addTeam(${id})">上陣</button>`
      }
    </div>
  `;
}

function switchLeft(type){renderLeft(type);}

function addTeam(id){
  if(state.team.includes(id))return;
  if(state.team.length>=3){
    alert("隊伍最多 3 人");
    return;
  }
  state.team.push(id);
  applyTeamStats();
  renderLeft("team");
  updateUI();
}

function removeTeam(id){
  if(state.team.length<=1){
    alert("至少保留 1 人");
    return;
  }
  state.team=state.team.filter(x=>x!==id);
  applyTeamStats();
  renderLeft("team");
  updateUI();
}

function drawGacha(n){
  const cost=n===10?1800:200;
  if(state.gem<cost){
    alert("玉璧不足");
    return;
  }
  state.gem-=cost;
  const result=[];
  for(let i=0;i<n;i++){
    const r=Math.random();
    let pool;
    if(r>.92)pool=heroes.filter(h=>h.rarity==="SSR");
    else if(r>.62)pool=heroes.filter(h=>h.rarity==="SR");
    else pool=heroes.filter(h=>h.rarity==="R");
    const h=pool[Math.floor(Math.random()*pool.length)];
    result.push(h);
    if(!state.owned.includes(h.id))state.owned.push(h.id);
    else state.gold+=300;
  }
  openSimpleModal("抽卡結果",`
    <div class="cardGrid">
      ${result.map(h=>`
        <div class="heroCard">
          <div class="portrait">${h.icon}</div>
          <b class="rarity-${h.rarity}">${h.name}</b>
          <div class="muted">${h.title}</div>
          <div>${h.rarity}｜${h.job}</div>
        </div>
      `).join("")}
    </div>
  `);
  updateUI();
  renderLeft("gacha");
}

function redeemGift(){
  const code=document.getElementById("giftInput").value.trim().toUpperCase();
  const rewards={
    HUANZHAN:{gem:500,gold:3000,potion:3},
    LUBU999:{gem:999,gold:9999,potion:5},
    WEED777:{gem:300,gold:7777,herb:7,grain:7}
  };
  if(!rewards[code]){
    alert("禮物碼無效");
    return;
  }
  if(state.giftUsed[code]){
    alert("此禮物碼已使用");
    return;
  }
  const r=rewards[code];
  state.giftUsed[code]=true;
  state.gem+=r.gem||0;
  state.gold+=r.gold||0;
  state.inventory.potion+=r.potion||0;
  state.inventory.herb+=r.herb||0;
  state.inventory.grain+=r.grain||0;
  alert("兌換成功");
  updateUI();
  renderLeft("gacha");
}

function claimDaily(){
  if(state.dailyClaimed){
    alert("今日已領");
    return;
  }
  state.dailyClaimed=true;
  state.gold+=1500;
  state.gem+=150;
  state.energy+=30;
  state.inventory.potion+=2;
  alert("每日領取成功");
  updateUI();
  renderLeft("daily");
}

function recharge(amount){
  state.rechargeTotal+=amount;
  state.gem+=amount*12;
  state.gold+=amount*100;
  alert("模擬儲值成功");
  updateUI();
  renderLeft("gacha");
}

            <b class="rarity-${h.rarity}">${h.name}</b>
            <div class="muted">${h.title}</div>
            <div>${h.rarity}｜${h.job}</div>
            <div class="blue">${h.skill}</div>
            <div class="muted">ATK ${h.atk} / HP ${h.hp}</div>
          </div>
        `).join("")}
      </div>
    `;
  }

  if(type==="admin"){
    el.innerHTML=`
      <h2>創作者 / 管理員頁</h2>
      <div class="section">
        <h3>測試工具</h3>
        <button class="primary" onclick="adminGiveAll()">取得全部武將</button>
        <button class="green" onclick="adminAddResource()">增加資源</button>
        <button class="danger" onclick="adminWeakBoss()">弱化 Boss</button>
        <button onclick="adminSpawnWeeds()">生成草叢</button>
        <button onclick="adminResetDaily()">重置每日</button>
      </div>
      <div class="section">
        <h3>公告編輯</h3>
        <input id="adminNotice" placeholder="輸入新公告">
        <button onclick="adminAddNotice()">新增公告</button>
      </div>
      <div class="section">
        <h3>狀態</h3>
        <div class="item"><span>武將</span><b>${state.owned.length}/${heroes.length}</b></div>
        <div class="item"><span>儲值總額</span><b>${state.rechargeTotal}</b></div>
        <div class="item"><span>除草數</span><b>${state.weedsCut}</b></div>
      </div>
    `;
  }

  document.getElementById("modal").style.display="flex";
}

function openSimpleModal(title,html){
  document.getElementById("modalContent").innerHTML=`<h2>${title}</h2>${html}`;
  document.getElementById("modal").style.display="flex";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

function adminGiveAll(){
  state.owned=heroes.map(h=>h.id);
  alert("已取得全部武將");
  updateUI();
}
function adminAddResource(){
  state.gold+=99999;
  state.gem+=9999;
  state.energy+=999;
  state.inventory.potion+=99;
  state.inventory.herb+=99;
  state.inventory.grain+=99;
  alert("資源已增加");
  updateUI();
}
function adminWeakBoss(){
  if(boss)boss.hp=Math.min(boss.hp,300);
  alert("Boss 已弱化");
}
function adminSpawnWeeds(){
  spawnWeeds(30);
  alert("草叢已生成");
}
function adminResetDaily(){
  state.dailyClaimed=false;
  alert("每日已重置");
}
function adminAddNotice(){
  const v=document.getElementById("adminNotice").value.trim();
  if(!v)return;
  state.announcements.unshift(v);
  alert("公告已新增");
  openModal("admin");
}

function startStory(){
  dialogQueue=[
    {name:"劉備",text:"虎牢幻境異變，呂布幻影率兵重現，諸位須破此局。"},
    {name:"關羽",text:"敵方盾兵堅硬，遠程兵與法師會在後方牽制，不可只追 Boss。"},
    {name:"諸葛亮",text:"草叢中藏有補給，也可能有伏兵。善用除草，才能在魔王級撐下去。"},
    {name:"趙雲",text:"我先突入陣中，主公請調整隊伍與戰法。"},
    {name:"呂布幻影",text:"凡人也敢踏入虎牢幻境？來試試魔王級的壓迫吧。"},
    {name:"系統",text:"劇情結束。進入三國幻戰。"}
  ];
  currentDialog=0;
  showDialog();
}

function showDialog(){
  const box=document.getElementById("dialogBox");
  const d=dialogQueue[currentDialog];
  if(!d){
    box.style.display="none";
    return;
  }
  document.getElementById("dialogName").textContent=d.name;
  document.getElementById("dialogText").textContent=d.text;
  box.style.display="block";
}
function nextDialog(){
  currentDialog++;
  showDialog();
}

function updateUI(){
  document.getElementById("goldText").textContent=state.gold;
  document.getElementById("gemText").textContent=state.gem;
  document.getElementById("energyText").textContent=state.energy;
  document.getElementById("powerText").textContent=calcPower();

  document.getElementById("hpText").textContent=Math.max(0,Math.floor(player.hp))+"/"+player.maxHp;
  document.getElementById("mpText").textContent=Math.floor(player.mp)+"/"+player.maxMp;
  document.getElementById("lvText").textContent=player.lv;
  document.getElementById("hpBar").style.width=Math.max(0,player.hp/player.maxHp*100)+"%";
  document.getElementById("mpBar").style.width=Math.max(0,player.mp/player.maxMp*100)+"%";
  document.getElementById("expBar").style.width=Math.max(0,player.exp/player.nextExp*100)+"%";

  document.getElementById("stageText").textContent=state.stage;
  document.getElementById("difficultyText").textContent=state.difficulty;
  document.getElementById("killText").textContent=state.kills;
  document.getElementById("weedText").textContent=state.weedsCut;

  if(boss){
    document.getElementById("bossHpText").textContent=Math.max(0,Math.floor(boss.hp))+"/"+boss.maxHp;
    document.getElementById("bossBar").style.width=Math.max(0,boss.hp/boss.maxHp*100)+"%";
  }
}

function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}
function angleTo(a,b){return Math.atan2(b.y-a.y,b.x-a.x);}

window.addEventListener("keydown",e=>{
  keys[e.key]=true;
  if(e.key==="j")playerAttack();
  if(e.key==="k")castSkill();
  if(e.key==="e")cutWeed();
  if(e.key==="l")usePotion();
  if(e.key===" ")dodge();
});
window.addEventListener("keyup",e=>keys[e.key]=false);

const base=document.getElementById("joystickBase");
const knob=document.getElementById("joystickKnob");

function joyMove(clientX,clientY){
  const rect=base.getBoundingClientRect();
  const cx=rect.left+rect.width/2;
  const cy=rect.top+rect.height/2;
  let dx=clientX-cx;
  let dy=clientY-cy;
  const max=42;
  const len=Math.hypot(dx,dy);
  if(len>max){
    dx=dx/len*max;
    dy=dy/len*max;
  }
  joy.dx=dx/max;
  joy.dy=dy/max;
  knob.style.left=(35+dx)+"px";
  knob.style.top=(35+dy)+"px";
}

base.addEventListener("touchstart",e=>{
  joy.active=true;
  joyMove(e.touches[0].clientX,e.touches[0].clientY);
});
base.addEventListener("touchmove",e=>{
  e.preventDefault();
  joyMove(e.touches[0].clientX,e.touches[0].clientY);
},{passive:false});
base.addEventListener("touchend",()=>{
  joy.active=false;
  joy.dx=0;
  joy.dy=0;
  knob.style.left="35px";
  knob.style.top="35px";
});
base.addEventListener("mousedown",e=>{
  joy.active=true;
  joyMove(e.clientX,e.clientY);
});
window.addEventListener("mousemove",e=>{
  if(joy.active)joyMove(e.clientX,e.clientY);
});
window.addEventListener("mouseup",()=>{
  joy.active=false;
  joy.dx=0;
  joy.dy=0;
  knob.style.left="35px";
  knob.style.top="35px";
});

applyTeamStats();
resetBattle();
renderLeft("battle");
updateUI();
requestAnimationFrame(loop);
</script>
