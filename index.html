<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>三國志 Web v8.5：萬人合擊版 (30x30)</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background: #1a1a1a; color: #ecf0f1; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { background: #2c3e50; width: 100%; padding: 10px 0; text-align: center; border-bottom: 4px solid #f1c40f; display: flex; justify-content: space-around; align-items: center; z-index: 100; flex-shrink: 0; font-size: 14px;}
        .game-area { display: flex; flex-direction: row; gap: 10px; padding: 10px; width: 100%; height: calc(100vh - 50px); box-sizing: border-box; }
        .map-container { flex-grow: 1; height: 100%; overflow: auto; border: 4px solid #3e2723; border-radius: 8px; background: #111; position: relative; }
        .map-grid { display: grid; grid-template-columns: repeat(30, 50px); grid-template-rows: repeat(30, 50px); gap: 1px; background: #222; padding: 5px; width: fit-content; margin: auto; }
        .side-panel { width: 320px; flex-shrink: 0; background: #34495e; padding: 10px; border-radius: 12px; display: flex; flex-direction: column; gap: 8px; height: 100%; overflow-y: auto; box-sizing: border-box;}
        @media (max-width: 768px) { .game-area { flex-direction: column; } .side-panel { width: 100%; height: 45vh; } .map-container { height: 55vh; } .map-grid { grid-template-columns: repeat(30, 40px); grid-template-rows: repeat(30, 40px); } }
        .cell { width: 100%; height: 100%; background: #2e7d32; display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; border: 0.1px solid rgba(255,255,255,0.05); }
        .cell.city { background: #546e7a; border: 2px inset #f1c40f; }
        .cell.building-cell { background: #795548; border: 1px solid; }
        .unit { width: 80%; height: 80%; border-radius: 50%; border: 2px solid #fff; position: absolute; z-index: 10; font-size: 14px; display: flex; align-items: center; justify-content: center; font-weight: bold; text-shadow: 1px 1px 2px black;}
        .unit.selected { border-color: #f1c40f; box-shadow: 0 0 15px #f1c40f; transform: scale(1.1); z-index: 30;}
        .stack-badge { position: absolute; top: -5px; right: -5px; background: #e74c3c; color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; display: flex; align-items: center; justify-content: center; z-index: 40; border: 1px solid white;}
        .u-shu { background: #2980b9; } .u-wei { background: #c0392b; } .u-wu { background: #27ae60; } 
        .u-dong { background: #8e44ad; } .u-yuan { background: #f1c40f; color: #000;} 
        .action-menu { background: #2c3e50; padding: 10px; border-radius: 8px; display: none; border: 2px solid #f1c40f; }
        .log { background: #000; padding: 8px; flex-grow: 1; overflow-y: auto; font-size: 13px; color: #2ecc71; border-radius: 8px; min-height: 100px;}
        button { padding: 8px; cursor: pointer; font-weight: bold; border: none; border-radius: 4px; transition: 0.2s; }
        .btn-tactic { background: #d35400; color: white; }
        .btn-next { background: #27ae60; color: white; padding: 12px; font-size: 1.1em; }
    </style>
</head>
<body onload="loadGame()">

<div class="header">
    <div id="playerIndicator" style="padding:4px 12px; border-radius:5px; font-weight:bold;">載入中...</div>
    <div>📅 第 <span id="uiTurn">1</span> 旬</div>
    <div>💰 金：<span id="uiGold">0</span> | 🌾 糧：<span id="uiFood">0</span></div>
</div>

<div class="game-area">
    <div class="map-container"><div id="map" class="map-grid"></div></div>
    <div class="side-panel">
        <div id="actionMenu" class="action-menu">
            <h3 id="activeUnitName" style="margin:0; color:#f1c40f;">武將</h3>
            <div id="unitStats" style="font-size:12px; background:#1a252f; padding:5px; border-radius:5px; margin:5px 0;"></div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;">
                <button style="background:#e74c3c; color:white;" onclick="handleAttack()">⚔️ 攻擊</button>
                <button class="btn-tactic" onclick="toggleSubMenu('tactic')">🔥 戰法</button>
                <button style="background:#8e44ad; color:white;" onclick="toggleSubMenu('strategy')">🧠 計謀</button>
                <button style="background:#f39c12; color:black;" onclick="toggleSubMenu('build')">🔨 建設</button>
            </div>
            <div id="subMenu" style="display:none; flex-wrap:wrap; gap:4px; margin-top:8px; padding:5px; background:rgba(0,0,0,0.3); border-radius:5px;"></div>
            <div id="domesticActions" style="display:none; margin-top:8px; border-top:1px solid #555; padding-top:8px;">
                <button style="background:#2980b9; color:white; width:100%" onclick="handleDevelop()">🔨 開發此城</button>
            </div>
            <button style="background:#7f8c8d; color:white; width:100%; margin-top:8px;" onclick="finishAction()">⌛ 待命</button>
        </div>
        <div class="log" id="logBox">> v8.5 合擊版就緒。</div>
        <button class="btn-next" onclick="nextTurn()">⏳ 結束回合</button>
    </div>
</div>

<script>
    // 定義 4 個戰法
    const UNIT_TYPES = { 
        '騎': { move: 3, range: 1, tactics: [{n:'突擊',c:20,m:1.3}, {n:'突進',c:35,m:1.8}, {n:'疾風',c:50,m:2.2}, {n:'萬馬奔騰',c:80,m:3.0}] }, 
        '步': { move: 2, range: 1, tactics: [{n:'槍突',c:20,m:1.3}, {n:'旋風',c:35,m:1.8}, {n:'奮戰',c:50,m:2.1}, {n:'百戰不殆',c:75,m:2.8}] }, 
        '弓': { move: 1, range: 2, tactics: [{n:'火矢',c:20,m:1.2}, {n:'齊射',c:40,m:1.7}, {n:'貫穿',c:55,m:2.2}, {n:'亂箭',c:80,m:3.2}] }, 
        '智': { move: 2, range: 2, tactics: [{n:'陷阱',c:20,m:1.4}, {n:'妖術',c:40,m:2.0}, {n:'落石',c:60,m:2.5}, {n:'神算',c:90,m:3.5}] },
        '石': { move: 1, range: 3, tactics: [{n:'巨石',c:25,m:1.5}, {n:'碎城',c:45,m:2.5}, {n:'崩塌',c:65,m:3.2}, {n:'流星',c:90,m:4.0}] },
        '車': { move: 1, range: 1, tactics: [{n:'撞擊',c:25,m:1.5}, {n:'破牆',c:45,m:2.5}, {n:'碾壓',c:65,m:3.0}, {n:'兵器大賞',c:85,m:3.8}] }
    };

    let gameState; let selectedUnit = null; let isProcessingAI = false;

    function log(msg, color = "#2ecc71") {
        const box = document.getElementById('logBox'); box.innerHTML += `<br><span style="color:${color}">${msg}</span>`;
        box.scrollTop = box.scrollHeight;
    }

    function loadGame() {
        const saved = localStorage.getItem('sanguo_v8_5');
        gameState = saved ? JSON.parse(saved) : getDefaultState();
        initMap();
    }

    function getDefaultState() {
        const factions = [
            { id: 'shu', name: '劉備軍', color: '#2980b9', gold: 2000, food: 100000, isAI: false },
            { id: 'wei', name: '曹操軍', color: '#c0392b', gold: 2000, food: 100000, isAI: true },
            { id: 'wu', name: '孫權軍', color: '#27ae60', gold: 2000, food: 100000, isAI: true },
            { id: 'dong', name: '董卓軍', color: '#8e44ad', gold: 2000, food: 100000, isAI: true },
            { id: 'yuan', name: '袁紹軍', color: '#f1c40f', gold: 2000, food: 100000, isAI: true }
        ];
        let units = [];
        const raw = [
            {f:'shu', x:5, y:25, n:["劉備","關羽","張飛","孔明","趙雲","黃忠"], t:['步','騎','騎','智','騎','弓']},
            {f:'wei', x:15, y:12, n:["曹操","夏侯","司馬","許褚","郭嘉","荀彧"], t:['騎','車','智','步','石','智']},
            {f:'wu', x:25, y:22, n:["孫權","周瑜","太史","甘寧","呂蒙","黃蓋"], t:['弓','智','車','騎','步','車']}
        ];
        raw.forEach(g => g.n.forEach((name, i) => {
            units.push({
                id: units.length, name, faction: g.f, type: g.t[i], x: g.x, y: g.y,
                troops: 5000, stamina: 100, acted: false, movesLeft: 2, atk: 85
            });
        }));
        return {
            turn: 1, currentPlayerIndex: 0, factions, buildings: [],
            cities: raw.map(g => ({ x: g.x, y: g.y, faction: g.f, name: g.f.toUpperCase(), dev: 300 })),
            units
        };
    }

    function initMap() {
        const mapEl = document.getElementById('map'); mapEl.innerHTML = '';
        for (let y = 0; y < 30; y++) {
            for (let x = 0; x < 30; x++) {
                const cell = document.createElement('div'); cell.className = 'cell'; cell.onclick = () => handleCellClick(x, y);
                
                const city = gameState.cities.find(c => c.x === x && c.y === y);
                if(city) { cell.classList.add('city'); cell.innerHTML = `🏰`; cell.style.borderColor = gameState.factions.find(f=>f.id===city.faction).color; }
                
                const unitsAtPos = gameState.units.filter(u => u.x === x && u.y === y && u.troops > 0);
                if(unitsAtPos.length > 0) {
                    const topUnit = unitsAtPos.find(u => !u.acted) || unitsAtPos[0];
                    const uEl = document.createElement('div');
                    uEl.className = `unit u-${topUnit.faction} ${selectedUnit === topUnit ? 'selected' : ''}`;
                    uEl.innerText = topUnit.name[0];
                    if (topUnit.acted) uEl.style.filter = "grayscale(1) opacity(0.5)";
                    
                    // 多人站位標記
                    if (unitsAtPos.length > 1) {
                        const badge = document.createElement('div');
                        badge.className = 'stack-badge';
                        badge.innerText = unitsAtPos.length;
                        uEl.appendChild(badge);
                    }
                    cell.appendChild(uEl);
                }
                mapEl.appendChild(cell);
            }
        }
        updateUI();
    }

    function handleCellClick(x, y) {
        if(isProcessingAI) return;
        const fac = gameState.factions[gameState.currentPlayerIndex];
        const unitsAtPos = gameState.units.filter(u => u.x === x && u.y === y && u.troops > 0 && u.faction === fac.id);

        if (unitsAtPos.length > 0) {
            // 如果點擊格子，切換選擇該格內還沒行動的武將
            const nextUnit = unitsAtPos.find(u => !u.acted && u !== selectedUnit) || unitsAtPos[0];
            if (!nextUnit.acted) {
                selectedUnit = nextUnit;
                showActionMenu(selectedUnit);
                initMap();
                return;
            }
        }

        if (selectedUnit) {
            const dist = Math.abs(x - selectedUnit.x) + Math.abs(y - selectedUnit.y);
            if (dist <= UNIT_TYPES[selectedUnit.type].move && selectedUnit.movesLeft > 0) {
                selectedUnit.x = x; selectedUnit.y = y; selectedUnit.movesLeft--;
                checkCapture(x, y);
                showActionMenu(selectedUnit); initMap();
            }
        }
    }

    function checkCapture(x, y) {
        const city = gameState.cities.find(c => c.x === x && c.y === y);
        if (city && city.faction !== selectedUnit.faction) {
            city.faction = selectedUnit.faction;
            log(`🏰 佔領了 ${city.name}！`, "#f1c40f");
        }
    }

    function showActionMenu(unit) {
        document.getElementById('actionMenu').style.display = 'block';
        document.getElementById('activeUnitName').innerText = `${unit.name} [${unit.type}]`;
        document.getElementById('unitStats').innerText = `兵力: ${unit.troops} | 氣力: ${unit.stamina} | 剩餘移動: ${unit.movesLeft}`;
        const city = gameState.cities.find(c => c.x === unit.x && c.y === unit.y);
        document.getElementById('domesticActions').style.display = (city && city.faction === unit.faction) ? 'block' : 'none';
        document.getElementById('subMenu').style.display = 'none';
    }

    function toggleSubMenu(type) {
        const sm = document.getElementById('subMenu'); sm.style.display = 'flex'; sm.innerHTML = '';
        if (type === 'tactic') {
            UNIT_TYPES[selectedUnit.type].tactics.forEach((t, i) => {
                sm.innerHTML += `<button class="btn-tactic" style="font-size:11px; flex:1 0 45%" onclick="executeTactic(${i})">${t.n}(${t.c})</button>`;
            });
        }
    }

    function executeTactic(idx) {
        const t = UNIT_TYPES[selectedUnit.type].tactics[idx];
        if (selectedUnit.stamina < t.c) { log("氣力不足！", "#e74c3c"); return; }
        
        const target = gameState.units.find(u => u.faction !== selectedUnit.faction && u.troops > 0 && Math.abs(u.x-selectedUnit.x)+Math.abs(u.y-selectedUnit.y) <= UNIT_TYPES[selectedUnit.type].range);
        if (target) {
            selectedUnit.stamina -= t.c;
            let dmg = Math.floor((selectedUnit.atk * selectedUnit.troops / 200) * t.m);
            target.troops -= dmg;
            log(`🔥 ${selectedUnit.name} 使用【${t.n}】，${target.name} 損兵 ${dmg}！`);
            finishAction();
        } else log("範圍內無敵軍！");
    }

    function handleAttack() {
        const target = gameState.units.find(u => u.faction !== selectedUnit.faction && u.troops > 0 && Math.abs(u.x-selectedUnit.x)+Math.abs(u.y-selectedUnit.y) <= UNIT_TYPES[selectedUnit.type].range);
        if (target) {
            let dmg = Math.floor(selectedUnit.atk * selectedUnit.troops / 300);
            target.troops -= dmg; log(`⚔️ ${selectedUnit.name} 攻擊 ${target.name}，損兵 ${dmg}`);
            finishAction();
        }
    }

    function finishAction() {
        if(selectedUnit) { selectedUnit.acted = true; selectedUnit = null; }
        document.getElementById('actionMenu').style.display = 'none';
        initMap();
        localStorage.setItem('sanguo_v8_5', JSON.stringify(gameState));
    }

    function nextTurn() {
        selectedUnit = null;
        gameState.currentPlayerIndex = (gameState.currentPlayerIndex + 1) % gameState.factions.length;
        if (gameState.currentPlayerIndex === 0) gameState.turn++;
        
        const fac = gameState.factions[gameState.currentPlayerIndex];
        gameState.units.forEach(u => {
            if(u.faction === fac.id && u.troops > 0) {
                u.acted = false; u.movesLeft = 2;
                
                // 城池回復邏輯
                const inCity = gameState.cities.some(c => c.x === u.x && c.y === u.y && c.faction === u.faction);
                if (inCity) {
                    u.stamina = Math.min(100, u.stamina + 35); // 回城大幅回復
                    u.troops = Math.min(10000, u.troops + 200); // 順便補點兵
                    if(!fac.isAI) log(`🏰 ${u.name} 在城中休養，氣力大增！`, "#f1c40f");
                } else {
                    u.stamina = Math.min(100, u.stamina + 5); // 平時小量回復
                }
            }
        });

        if (fac.isAI) { isProcessingAI = true; runAI(); } 
        else { isProcessingAI = false; log(`--- 第 ${gameState.turn} 旬：${fac.name} ---`, "#3498db"); }
        initMap();
    }

    function runAI() {
        // AI 簡化邏輯：堆疊攻擊
        const myUnits = gameState.units.filter(u => u.faction === gameState.factions[gameState.currentPlayerIndex].id && u.troops > 0);
        myUnits.forEach(u => {
            let target = gameState.units.find(tu => tu.faction !== u.faction && tu.troops > 0);
            if (target) {
                if (Math.abs(target.x - u.x) + Math.abs(target.y - u.y) > 1) {
                    u.x += (u.x < target.x ? 1 : -1);
                }
                if (Math.abs(target.x - u.x) + Math.abs(target.y - u.y) <= 1) {
                    target.troops -= 300;
                }
            }
            u.acted = true;
        });
        setTimeout(nextTurn, 200);
    }

    function updateUI() {
        const fac = gameState.factions[gameState.currentPlayerIndex];
        document.getElementById('playerIndicator').innerText = fac.name;
        document.getElementById('playerIndicator').style.background = fac.color;
        document.getElementById('uiTurn').innerText = gameState.turn;
        document.getElementById('uiGold').innerText = fac.gold;
        document.getElementById('uiFood').innerText = fac.food;
    }
</script>
</body>
</html>
