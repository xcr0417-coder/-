<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三國幻戰 × 無雙 街機卡牌版</title>
<style>
/* 街機電競風格 UI (Wahlap Style) */
* { box-sizing: border-box; user-select: none; }
body { margin: 0; background: #080a0f; color: #e0e6ed; font-family: "Microsoft JhengHei", sans-serif; overflow: hidden; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 3px; }

header { height: 60px; background: linear-gradient(180deg, #1a1a1a, #0a0a0a); border-bottom: 2px solid #d4af37; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 10; position: relative; }
header h1 { margin: 0; color: #d4af37; font-size: 22px; text-shadow: 0 0 10px rgba(212, 175, 55, 0.5); letter-spacing: 2px; }
.currency span { color: #fff; font-weight: bold; margin-right: 15px; text-shadow: 0 0 5px rgba(255,255,255,0.3); }

#app { height: 100vh; display: flex; flex-direction: column; background: radial-gradient(circle at center, #111520 0%, #050608 100%); }
main { flex: 1; display: flex; overflow: hidden; }

/* 側邊導覽列 */
#side { width: 180px; background: rgba(10, 12, 16, 0.85); padding: 20px 10px; border-right: 1px solid #333; backdrop-filter: blur(5px); }
button { cursor: pointer; border: 1px solid #d4af37; background: linear-gradient(180deg, #2a2210, #110e05); color: #d4af37; border-radius: 4px; padding: 10px; margin: 6px 0; font-weight: bold; transition: all 0.2s; text-transform: uppercase; letter-spacing: 1px; }
button:hover { background: linear-gradient(180deg, #d4af37, #9c7b16); color: #000; box-shadow: 0 0 10px rgba(212, 175, 55, 0.6); }
button:disabled { border-color: #555; color: #555; background: #222; cursor: not-allowed; box-shadow: none; }
.navbtn { width: 100%; font-size: 16px; margin-bottom: 12px; }

#content { flex: 1; padding: 20px; overflow-y: auto; }
.panel { background: rgba(20, 25, 35, 0.7); border: 1px solid #3a4454; border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }
.title { color: #d4af37; font-size: 20px; margin-bottom: 15px; border-left: 4px solid #d4af37; padding-left: 10px; text-shadow: 0 0 8px rgba(212, 175, 55, 0.4); }

/* 卡牌樣式 */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
.card { background: linear-gradient(145deg, #1e2433, #0f121a); border: 1px solid #4a5568; border-radius: 8px; padding: 15px; text-align: center; position: relative; overflow: hidden; transition: transform 0.2s; }
.card:hover { transform: translateY(-5px); }
.r0 { border-color: #718096; } .r1 { border-color: #4299e1; box-shadow: 0 0 10px rgba(66,153,225,0.2); } .r2 { border-color: #9f7aea; box-shadow: 0 0 10px rgba(159,122,234,0.3); } .r3 { border-color: #ecc94b; box-shadow: 0 0 15px rgba(236,201,75,0.4); } .r4 { border-color: #e2e8f0; box-shadow: 0 0 20px rgba(255,255,255,0.6); }
.icon { font-size: 40px; margin-bottom: 5px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
.tag { display: inline-block; padding: 3px 8px; background: #2d3748; border-radius: 4px; font-size: 12px; margin: 3px; color: #e2e8f0; }

/* 戰鬥介面 */
#gameWrap { display: none; position: fixed; inset: 0; background: #000; z-index: 99; }
#game { display: block; background: radial-gradient(circle at center, #2d1c15, #0a0604); }
#ko-counter { position: fixed; top: 20px; right: 20px; color: #d4af37; font-size: 32px; font-weight: bold; text-shadow: 0 0 10px #d4af37, 2px 2px 0 #000; z-index: 101; font-style: italic; }
#hud { position: fixed; top: 20px; left: 20px; background: rgba(10, 15, 25, 0.85); border: 1px solid #4299e1; border-radius: 8px; padding: 15px; line-height: 1.6; font-size: 14px; z-index: 101; min-width: 280px; box-shadow: 0 0 15px rgba(66,153,225,0.3); }
#help { position: fixed; right: 20px; bottom: 170px; background: rgba(0,0,0,.7); padding: 15px; border-radius: 8px; border: 1px solid #555; font-size: 13px; line-height: 1.6; z-index: 101; color: #aaa; }
#help span { color: #d4af37; font-weight: bold; }
#hand { position: fixed; bottom: 0; left: 0; right: 0; height: 160px; background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(10,15,25,0.95) 30%); border-top: 1px solid rgba(212,175,55,0.3); display: flex; align-items: center; justify-content: center; gap: 15px; z-index: 101; padding-top: 20px; }
.handCard { width: 110px; height: 130px; border: 1px solid #d4af37; border-radius: 6px; background: linear-gradient(145deg, #2a2210, #110e05); text-align: center; padding: 8px; font-size: 12px; cursor: pointer; transition: transform 0.1s; position: relative; }
.handCard b { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: #d4af37; color: #000; padding: 2px 8px; border-radius: 10px; font-size: 14px; box-shadow: 0 0 5px #d4af37; }
.handCard:hover { transform: translateY(-15px); box-shadow: 0 0 15px #d4af37; }
#msg { position: fixed; top: 30%; width: 100%; text-align: center; color: #d4af37; font-size: 50px; font-weight: bold; font-style: italic; text-shadow: 0 0 20px #ff0000, 3px 3px 0 #000; pointer-events: none; z-index: 102; transition: all 0.3s; }

/* 能量條 */
.bar-wrap { display: flex; align-items: center; margin: 4px 0; }
.bar-wrap span { width: 40px; font-weight: bold; font-size: 12px; }
.bar { flex: 1; height: 10px; background: #111; border: 1px solid #333; border-radius: 5px; overflow: hidden; position: relative; }
.fill { height: 100%; transition: width 0.1s linear; }
.hp { background: linear-gradient(90deg, #1e7035, #39e66d); }
.skill { background: linear-gradient(90deg, #1e4a7a, #4aa3ff); }
.ult { background: linear-gradient(90deg, #993d00, #ff7a18); }
.musou { background: linear-gradient(90deg, #997a00, #ffd700); box-shadow: 0 0 8px #ffd700; }
</style>
</head>

<body>
<div id="app">
<header>
  <h1>三國幻戰 × 無雙 <small style="color:#aaa; font-size:12px;">街機能量版</small></h1>
  <div class="currency">
    銅錢：<span id="coin">0</span>
    元寶：<span id="jade">0</span>
    關卡：<span id="stage">1</span>
  </div>
</header>

<main>
  <div id="side">
    <button class="navbtn" id="btnHome">主城資訊</button>
    <button class="navbtn" id="btnAccount">帳號卡庫</button>
    <button class="navbtn" id="btnTeam">出戰編制</button>
    <button class="navbtn" id="btnSummon">招募武將</button>
    <button class="navbtn" id="btnBattle" style="color:#fff; border-color:#ff4444; background:linear-gradient(180deg, #aa2222, #550000);">開始出草</button>
    <button class="navbtn" id="btnReset" style="margin-top:50px; font-size:12px; color:#888; border-color:#444; background:none;">重置存檔</button>
  </div>
  <div id="content"></div>
</main>
</div>

<div id="gameWrap">
  <canvas id="game"></canvas>
  <div id="ko-counter">擊破數: 0</div>
  <div id="hud"></div>
  <div id="help">
    <span>WASD</span>：移動<br>
    <span>J</span>：普通攻擊 (連按可接段)<br>
    <span>I</span>：蓄力攻擊 (C技，搭配普攻變化)<br>
    <span>K</span>：武將戰技 (消耗技能條 30)<br>
    <span>L</span>：絕招卡 (消耗絕招條 100)<br>
    <span>U</span>：無雙亂舞 (消耗無雙條 100)<br>
    <span>空白鍵</span>：閃避<br>
    <span>1~5</span>：使用下方戰術卡<br>
    <span>TAB</span>：切換主控武將<br>
    <span>ESC</span>：撤退
  </div>
  <div id="msg"></div>
  <div id="hand"></div>
</div>

<script>
const $ = id => document.getElementById(id);

// ==========================================
// 壹、基礎設定與系統
// ==========================================
const CardType = { HERO: "武將", WEAPON: "武器", ULTIMATE: "絕招", PET: "寵物", SKILL: "技能", SOLDIER: "兵卡" };
const Rarity = { COMMON: 0, RARE: 1, EPIC: 2, LEGENDARY: 3, SILVER_LEGENDARY: 4 };
const RarityNames = ["普通", "稀有", "史詩", "傳說", "白銀傳說"];

class Card {
  constructor(name, type, rarity, basePower = 100, extra = {}) {
    this.name = name; this.type = type; this.rarity = rarity;
    this.level = 1; this.star = 0; this.basePower = basePower;
    this.uid = extra.uid || name + "_" + Date.now() + "_" + Math.floor(Math.random() * 9999);
    Object.assign(this, { icon:"🎴", hp:0, atk:0, def:0, speed:0, dmg:0, heal:0, effect:"", skillName:"戰技" }, extra);
  }
  calculateTotalPower() {
    let p = this.basePower + (this.basePower * (this.level - 1) * 0.1) + (this.basePower * this.star * 0.3) + (this.basePower * this.rarity * 0.5);
    return Math.floor(this.rarity === Rarity.SILVER_LEGENDARY ? p * 100 : p);
  }
}

class GachaSystem {
  drawSingleCard() {
    let r = Math.random() * 100, rarity;
    if (r <= 1) rarity = Rarity.LEGENDARY;
    else if (r <= 10) rarity = Rarity.EPIC;
    else if (r <= 40) rarity = Rarity.RARE;
    else rarity = Rarity.COMMON;
    const list = cardTemplates.filter(c => c.rarity === rarity);
    return createCardFromTemplate(list[Math.floor(Math.random() * list.length)]);
  }
}

class Player {
  constructor(playerName) {
    this.name = playerName;
    this.equippedWeapon = null; this.equippedUltimate = null;
    this.skillEnergy = 0; this.ultimateEnergy = 0; this.musouEnergy = 0;
  }
  chargeEnergy(type, amount) {
    if (type === "skill") this.skillEnergy = Math.min(100, this.skillEnergy + amount);
    else if (type === "ultimate") this.ultimateEnergy = Math.min(100, this.ultimateEnergy + amount);
    else if (type === "musou") this.musouEnergy = Math.min(100, this.musouEnergy + amount);
  }
  useEnergy(type, cost) {
    if (this[type+"Energy"] >= cost) { this[type+"Energy"] -= cost; return true; }
    return false;
  }
}

const cardTemplates = [
  { id:"zhaoyun", name:"趙雲", type:CardType.HERO, rarity:Rarity.EPIC, icon:"🐉", basePower:420, hp:800, atk:100, def:40, skillName:"龍膽突刺", effect:"高速槍擊" },
  { id:"guanyu", name:"關羽", type:CardType.HERO, rarity:Rarity.EPIC, icon:"🟢", basePower:460, hp:950, atk:110, def:50, skillName:"青龍偃月", effect:"大範圍掃蕩" },
  { id:"lubu", name:"呂布", type:CardType.HERO, rarity:Rarity.LEGENDARY, icon:"🔥", basePower:650, hp:1200, atk:150, def:60, skillName:"天下無雙", effect:"破壞力極高" },
  { id:"fangtian", name:"方天畫戟", type:CardType.WEAPON, rarity:Rarity.EPIC, icon:"🔱", basePower:500, atk:80, effect:"極大提升無雙傷害" },
  { id:"qinggang", name:"青釭劍", type:CardType.WEAPON, rarity:Rarity.RARE, icon:"⚔️", basePower:260, atk:45, effect:"攻擊提升" },
  { id:"ultimate_fire", name:"炎刃·亂舞", type:CardType.ULTIMATE, rarity:Rarity.EPIC, icon:"🔥", basePower:420, dmg:400, effect:"絕招大範圍火傷" },
  { id:"horse", name:"赤兔馬", type:CardType.PET, rarity:Rarity.EPIC, icon:"🐎", basePower:360, speed:1.5, effect:"移速大增" },
  { id:"fire", name:"火牛陣", type:CardType.SKILL, rarity:Rarity.RARE, icon:"🦬", basePower:220, dmg:200, effect:"衝擊敵人" },
  { id:"heal", name:"包子", type:CardType.SKILL, rarity:Rarity.RARE, icon:"🥟", basePower:200, heal:300, effect:"恢復生命" }
];
function createCardFromTemplate(t) { return new Card(t.name, t.type, t.rarity, t.basePower, t); }

// ==========================================
// 貳、遊戲狀態與UI
// ==========================================
let state = { coin: 5000, jade: 800, stage: 1, cards: [], team: [] };
const gacha = new GachaSystem();

function save() { localStorage.setItem("wahlap_musou_v1", JSON.stringify(state)); }
function load() {
  const data = localStorage.getItem("wahlap_musou_v1");
  if (data) { state = JSON.parse(data); state.cards = state.cards.map(c => Object.assign(new Card(c.name, c.type, c.rarity, c.basePower, c), c)); }
  if (!state.cards || state.cards.length === 0) {
    state = { coin:5000, jade:800, stage:1, cards:[], team:[] };
    const initial = ["zhaoyun", "guanyu", "fangtian", "ultimate_fire", "heal"];
    initial.forEach(id => state.cards.push(createCardFromTemplate(cardTemplates.find(c=>c.id===id))));
    state.team = [state.cards[0].uid];
    save();
  }
}

function updateTop() { $("coin").textContent = state.coin; $("jade").textContent = state.jade; $("stage").textContent = state.stage; }
function setContent(html) { $("content").innerHTML = html; updateTop(); }
function cardInfo(c) { return `<div class="icon">${c.icon}</div><b>${c.name}</b><br><span class="tag">${c.type}</span><span class="tag">${RarityNames[c.rarity]}</span><br>Lv.${c.level}　${c.star}★<br>戰力：<span style="color:#d4af37">${c.calculateTotalPower()}</span><br><small style="color:#aaa">${c.effect||c.skillName||""}</small>`; }

function showHome() {
  setContent(`
  <div class="panel">
    <div class="title">Wahlap Arcade 系統核心</div>
    <p>1. <b>C技連段 (Charge Attack)</b>：按 J 普攻，中途按 I 施放 C2~C4 蓄力技。</p>
    <p>2. <b>百人斬割草機制</b>：大幅增加同螢幕敵人，普攻具備擊退與範圍判定。</p>
    <p>3. <b>真·無雙亂舞</b>：集滿無雙(U)，進入無敵狂暴狀態，持續對周圍造成毀滅打擊。</p>
    <p>4. <b>卡牌強化與連攜</b>：武器提升無雙威力，絕招卡解鎖L鍵必殺。</p>
  </div>
  `);
}

function showAccount() {
  let html = `<div class="panel"><div class="title">帳號卡庫</div><div class="grid">`;
  state.cards.forEach(c => {
    html += `<div class="card r${c.rarity}">${cardInfo(c)}<br><div style="margin-top:10px;"><button style="padding:5px;width:45%" onclick="levelCard('${c.uid}')">升級</button> <button style="padding:5px;width:45%" onclick="starCard('${c.uid}')">升星</button></div></div>`;
  });
  setContent(html + `</div></div>`);
}

function levelCard(uid) {
  const c = state.cards.find(x => x.uid === uid);
  const cost = 300 + c.level * 80;
  if (state.coin < cost) return alert("銅錢不足");
  state.coin -= cost; c.level++; save(); showAccount();
}

function starCard(uid) {
  const c = state.cards.find(x => x.uid === uid);
  const same = state.cards.find(x => x.name === c.name && x.uid !== uid);
  if (!same) return alert("需消耗一張同名卡");
  state.cards = state.cards.filter(x => x.uid !== same.uid); c.star++; save(); showAccount();
}

function showTeam() {
  let html = `<div class="panel"><div class="title">出戰編制 (最多 2 名)</div><div class="grid">`;
  for(let i=0;i<2;i++) {
    const h = state.cards.find(x => x.uid === state.team[i]);
    html += `<div class="card" style="border-color:#d4af37"><b>P${i+1}</b><br>${h ? `${cardInfo(h)}<br><button onclick="removeTeam(${i})">下陣</button>` : "<br>空位"}</div>`;
  }
  html += `</div></div><div class="panel"><div class="title">選擇武將</div><div class="grid">`;
  state.cards.filter(c => c.type === CardType.HERO).forEach(c => {
    const on = state.team.includes(c.uid);
    html += `<div class="card r${c.rarity}">${cardInfo(c)}<br><button ${on?"disabled":""} onclick="addTeam('${c.uid}')">${on?"已上陣":"上陣"}</button></div>`;
  });
  setContent(html + `</div></div>`);
}

function addTeam(uid) { if(state.team.length>=2)return alert("最多2人"); state.team.push(uid); save(); showTeam(); }
function removeTeam(i) { state.team.splice(i,1); save(); showTeam(); }

function showSummon() {
  setContent(`<div class="panel"><div class="title">招募武將/卡牌</div><p>100 元寶抽 1 張。傳說 1%，史詩 9%，稀有 30%。</p><button onclick="summon(1)">單抽</button> <button onclick="summon(10)">十連抽</button></div>`);
}

function summon(n) {
  if (state.jade < n * 100) return alert("元寶不足");
  state.jade -= n * 100;
  let res = [];
  for(let i=0;i<n;i++){ const c=gacha.drawSingleCard(); state.cards.push(c); res.push(c.name); }
  save(); alert("獲得：\n" + res.join("\n")); showSummon();
}

// ==========================================
// 參、戰鬥系統 (真·三國無雙機制)
// ==========================================
const canvas = $("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth; canvas.height = window.innerHeight;

let keys = {}, players = [], enemies = [], allies = [], handCards = [], deck = [];
let loopId, active = 0, gameOver = false, KOs = 0;
let slashes = []; // 刀光特效

window.addEventListener("keydown", e => { keys[e.key.toLowerCase()] = true; if(e.key===" ") keys.space=true; if(e.key==="Escape") exitBattle(); if(e.key==="Tab"){ e.preventDefault(); if(players.length) active=(active+1)%players.length; } if(["1","2","3","4","5"].includes(e.key)) useHand(Number(e.key)-1); });
window.addEventListener("keyup", e => { keys[e.key.toLowerCase()] = false; if(e.key===" ") keys.space=false; });

function createBattlePlayer(card, i) {
  const p = new Player(card.name);
  p.equippedWeapon = state.cards.find(c=>c.type===CardType.WEAPON) || null;
  p.equippedUltimate = state.cards.find(c=>c.type===CardType.ULTIMATE) || null;
  const power = card.calculateTotalPower();
  return {
    sys: p, base: card, name: card.name, icon: card.icon,
    x: canvas.width/2 + i*50 - 25, y: canvas.height/2, r: 24,
    hp: card.hp + power, maxHp: card.hp + power, atk: card.atk + Math.floor(power*0.1), speed: 5,
    faceX: 1, faceY: 0, atkCd: 0, comboSeq: 0, comboTimer: 0,
    inv: 0, dodge: 0, musouTimer: 0, state: "idle"
  };
}

function startBattle() {
  const t = state.team.map(u => state.cards.find(c=>c.uid===u)).filter(Boolean);
  if(t.length===0) return alert("請設定武將");
  $("gameWrap").style.display = "block";
  players = t.map(createBattlePlayer);
  enemies = []; allies = []; slashes = []; handCards = []; KOs = 0; $("ko-counter").textContent = "擊破數: 0";
  deck = state.cards.filter(c => c.type !== CardType.HERO);
  drawHand(); drawCd = 0; active = 0; gameOver = false;
  for(let i=0;i<20;i++) spawnEnemy(true);
  if(loopId) cancelAnimationFrame(loopId);
  battleLoop();
}

function exitBattle() { $("gameWrap").style.display="none"; cancelAnimationFrame(loopId); showHome(); }
function rand(a,b){ return Math.random()*(b-a)+a; }
function dis(a,b){ return Math.hypot(a.x-b.x,a.y-b.y); }
function showMsg(t, color="#d4af37", size="50px") { 
  const m = $("msg"); m.textContent = t; m.style.color = color; m.style.fontSize = size;
  m.style.transform = "scale(1.2)"; setTimeout(()=>{ m.style.transform = "scale(1)"; }, 100);
  setTimeout(()=>m.textContent="", 1500); 
}

function spawnEnemy(isInitial=false) {
  if (enemies.length >= 40) return; // 同屏高達 40 雜兵
  let angle = rand(0, Math.PI*2);
  let dist = isInitial ? rand(100, 600) : canvas.width/2 + 200;
  let px = players[0] ? players[0].x : canvas.width/2;
  let py = players[0] ? players[0].y : canvas.height/2;
  enemies.push({
    x: px + Math.cos(angle)*dist, y: py + Math.sin(angle)*dist, r: 16,
    hp: 80 + state.stage*20, maxHp: 80 + state.stage*20, atk: 10 + state.stage*2, spd: rand(1.5, 2.5),
    vx: 0, vy: 0, stun: 0 // 用於擊退與硬直
  });
}

function drawHand() {
  handCards = []; const cp = [...deck];
  for(let i=0;i<5 && cp.length;i++) handCards.push(cp.splice(Math.floor(Math.random()*cp.length),1)[0]);
  const h = $("hand"); h.innerHTML = "";
  handCards.forEach((c,i) => {
    let div = document.createElement("div"); div.className = "handCard r"+c.rarity;
    div.innerHTML = `<b>${i+1}</b><div class="icon" style="font-size:24px">${c.icon}</div><div style="font-size:14px;font-weight:bold;color:#d4af37;margin:4px 0">${c.name}</div><div style="color:#aaa">${c.type}</div>`;
    div.onclick = () => useHand(i); h.appendChild(div);
  });
}

function useHand(i) {
  const c = handCards[i]; if(!c||gameOver) return;
  const p = players[active];
  if (c.type === CardType.WEAPON) { p.sys.equippedWeapon = c; p.atk += c.atk; showMsg(`裝備 ${c.name}`); }
  if (c.type === CardType.PET) { p.speed += c.speed; showMsg(`召喚 ${c.name}`); }
  if (c.type === CardType.SKILL) { createExplosion(p.x, p.y, 250, (c.dmg||150)+p.atk, "#ff5500"); if(c.heal) p.hp=Math.min(p.maxHp, p.hp+c.heal); showMsg(`發動 ${c.name}`); }
  if (c.type === CardType.ULTIMATE) { p.sys.equippedUltimate = c; p.sys.chargeEnergy("ultimate", 50); showMsg(`獲得必殺 ${c.name}`); }
  handCards.splice(i,1); drawHand();
}

// 產生刀光與範圍判定
function createSlash(p, angle, radius, spread, color, damage, knockback) {
  slashes.push({ x: p.x, y: p.y, angle, radius, spread, color, life: 10, maxLife: 10 });
  enemies.forEach(e => {
    if(e.hp<=0) return;
    let dist = dis(p, e);
    let angToEnemy = Math.atan2(e.y - p.y, e.x - p.x);
    let angDiff = Math.abs(angToEnemy - angle);
    if(angDiff > Math.PI) angDiff = Math.PI*2 - angDiff;
    
    if (dist <= radius && angDiff <= spread/2) {
      e.hp -= damage; e.stun = 15;
      e.vx = Math.cos(angToEnemy) * knockback; e.vy = Math.sin(angToEnemy) * knockback;
      p.sys.chargeEnergy("skill", 2); p.sys.chargeEnergy("musou", 1);
    }
  });
}

function createExplosion(x, y, radius, damage, color="#ffd700") {
  slashes.push({ x, y, radius, type:"circle", color, life: 20, maxLife: 20 });
  enemies.forEach(e => {
    if(dis({x,y}, e) <= radius) {
      e.hp -= damage; e.vx = (e.x-x)*0.1; e.vy = (e.y-y)*0.1; e.stun=30;
    }
  });
}

function handleAttack(p) {
  if (p.atkCd > 0 || p.musouTimer > 0) return;
  
  let angle = Math.atan2(p.faceY, p.faceX);
  
  if (keys.j) { // 普攻連段
    p.atkCd = 15; p.comboTimer = 60; p.comboSeq = (p.comboSeq % 4) + 1;
    let radius = 100 + p.comboSeq*10;
    createSlash(p, angle, radius, Math.PI, "#e0e6ed", p.atk, 5);
    p.x += p.faceX * 10; p.y += p.faceY * 10;
  } 
  else if (keys.i) { // C技 (蓄力攻擊)
    if (p.comboSeq === 0) return; // 必須接在普攻後
    p.atkCd = 30; 
    if (p.comboSeq === 1) { // C2 挑空
      createSlash(p, angle, 120, Math.PI/2, "#4299e1", p.atk*2, 2);
    } else if (p.comboSeq === 2) { // C3 突進
      createSlash(p, angle, 150, Math.PI/1.5, "#9f7aea", p.atk*2.5, 8);
      p.x += p.faceX * 50; p.y += p.faceY * 50;
    } else { // C4 大範圍掃蕩
      createSlash(p, angle, 200, Math.PI*2, "#ecc94b", p.atk*3.5, 15);
    }
    p.comboSeq = 0; // 重置
  }
}

function handleSkills(p) {
  if (p.atkCd > 0 || p.musouTimer > 0) return;
  
  if (keys.k && p.sys.useEnergy("skill", 30)) { // 戰技
    p.atkCd = 20; p.inv = 20;
    createExplosion(p.x, p.y, 180, p.atk*4, "#4aa3ff");
    showMsg(`【${p.base.skillName}】`, "#4aa3ff", "40px");
  }
  else if (keys.l && p.sys.equippedUltimate && p.sys.useEnergy("ultimate", 100)) { // 絕招
    p.atkCd = 40; p.inv = 40;
    createExplosion(p.x, p.y, 350, (p.sys.equippedUltimate.dmg||500) + p.atk*5, "#ff3300");
    showMsg(`必殺！${p.sys.equippedUltimate.name}`, "#ff3300", "50px");
  }
  else if (keys.u && p.sys.useEnergy("musou", 100)) { // 無雙亂舞
    p.musouTimer = 180; // 3秒無雙狀態
    p.inv = 180;
    showMsg("真·無雙亂舞！", "#ffd700", "60px");
  }
  else if (keys.space && p.dodge <= 0) { // 閃避
    p.dodge = 40; p.inv = 20;
    p.x += p.faceX * 120; p.y += p.faceY * 120;
  }
}

function updatePlayer(p, i) {
  if (p.hp <= 0) return;
  let dx=0, dy=0;
  if (i===active) {
    if(keys.w) dy--; if(keys.s) dy++; if(keys.a) dx--; if(keys.d) dx++;
    handleAttack(p); handleSkills(p);
  }
  
  let l = Math.hypot(dx,dy);
  if (l) {
    dx/=l; dy/=l; p.faceX=dx; p.faceY=dy;
    let spd = p.musouTimer > 0 ? p.speed * 1.5 : p.speed;
    p.x += dx * spd; p.y += dy * spd;
  }
  
  p.x = Math.max(30, Math.min(canvas.width-30, p.x));
  p.y = Math.max(30, Math.min(canvas.height-200, p.y));

  // 無雙狀態處理
  if (p.musouTimer > 0) {
    p.musouTimer--;
    if (p.musouTimer % 10 === 0) { // 期間不斷造成範圍傷害
      let wDmg = p.sys.equippedWeapon ? p.sys.equippedWeapon.atk * 2 : 0;
      createSlash(p, Math.atan2(p.faceY, p.faceX), 220, Math.PI*2, "#ffd700", p.atk*1.5 + wDmg, 10);
    }
    if (p.musouTimer === 1) { // 結束大爆發
      createExplosion(p.x, p.y, 400, p.atk*10, "#ffffff");
    }
  }

  if (p.comboTimer > 0) { p.comboTimer--; if(p.comboTimer===0) p.comboSeq=0; }
  ["atkCd","inv","dodge"].forEach(k => p[k] = Math.max(0,p[k]-1));
}

function updateEnemies() {
  let alivePlayers = players.filter(p=>p.hp>0);
  if(alivePlayers.length===0) return;
  
  enemies.forEach(e => {
    if (e.stun > 0) {
      e.stun--; e.x += e.vx; e.y += e.vy; e.vx *= 0.8; e.vy *= 0.8;
      return; // 硬直中不移動與攻擊
    }
    let target = alivePlayers[0];
    alivePlayers.forEach(p => { if(dis(p,e)<dis(target,e)) target=p; });
    
    let ang = Math.atan2(target.y-e.y, target.x-e.x);
    e.x += Math.cos(ang) * e.spd; e.y += Math.sin(ang) * e.spd;
    
    if (dis(e,target) < e.r + target.r && target.inv <= 0) {
      target.hp -= e.atk; target.sys.chargeEnergy("musou", 2); target.inv = 10;
    }
  });

  let oldLen = enemies.length;
  enemies = enemies.filter(e => e.hp > 0);
  let killed = oldLen - enemies.length;
  
  if (killed > 0) {
    KOs += killed;
    $("ko-counter").textContent = `擊破數: ${KOs}`;
    $("ko-counter").style.transform = "scale(1.5)";
    setTimeout(()=>$("ko-counter").style.transform = "scale(1)", 100);
    
    if (KOs > 0 && KOs % 100 === 0) showMsg(`${KOs} 人斬 !!`, "#ff0000", "70px");
    alivePlayers.forEach(p => p.sys.chargeEnergy("ultimate", killed*2));
  }

  // 持續生成保持同屏人數
  while(enemies.length < Math.min(40, 10 + state.stage*5)) spawnEnemy();
}

function drawHUD() {
  $("hud").innerHTML = players.map((p,i) => {
    if(p.hp<=0) return `<div style="color:red">${p.name} 敗退</div>`;
    return `
    <div style="font-size:16px; color:${i===active?'#d4af37':'#fff'}">${i===active?"▶":""} <b>${p.name}</b> (C${p.comboSeq})</div>
    <div class="bar-wrap"><span>HP</span><div class="bar"><div class="fill hp" style="width:${p.hp/p.maxHp*100}%"></div></div></div>
    <div class="bar-wrap"><span>戰技</span><div class="bar"><div class="fill skill" style="width:${p.sys.skillEnergy}%"></div></div></div>
    <div class="bar-wrap"><span>絕招</span><div class="bar"><div class="fill ult" style="width:${p.sys.ultimateEnergy}%"></div></div></div>
    <div class="bar-wrap"><span>無雙</span><div class="bar"><div class="fill musou" style="width:${p.sys.musouEnergy}%"></div></div></div>
    <div style="font-size:12px;color:#aaa">武: ${p.sys.equippedWeapon?p.sys.equippedWeapon.name:"無"} | 絕: ${p.sys.equippedUltimate?p.sys.equippedUltimate.name:"無"}</div>
    `;
  }).join("<hr style='border-color:#333;margin:8px 0'>");
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  
  // 網格地板
  ctx.strokeStyle="rgba(255,255,255,0.03)"; ctx.lineWidth=1;
  for(let x=0;x<canvas.width;x+=100){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke(); }
  for(let y=0;y<canvas.height;y+=100){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke(); }

  // 繪製刀光與爆發特效
  slashes.forEach((s, idx) => {
    ctx.globalAlpha = s.life / s.maxLife;
    ctx.fillStyle = s.color;
    ctx.beginPath();
    if(s.type === "circle") {
      ctx.arc(s.x, s.y, s.radius * (1 - s.life/s.maxLife), 0, Math.PI*2);
      ctx.fill();
    } else {
      ctx.moveTo(s.x, s.y);
      ctx.arc(s.x, s.y, s.radius, s.angle - s.spread/2, s.angle + s.spread/2);
      ctx.fill();
    }
    s.life--;
    if(s.life <= 0) slashes.splice(idx, 1);
  });
  ctx.globalAlpha = 1;

  // 繪製敵人
  enemies.forEach(e => {
    ctx.fillStyle = e.stun > 0 ? "#ffaaaa" : "#8b2020";
    ctx.beginPath(); ctx.arc(e.x,e.y,e.r,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = "#111"; ctx.fillRect(e.x-15, e.y-25, 30, 4);
    ctx.fillStyle = "#ff0000"; ctx.fillRect(e.x-15, e.y-25, 30*(e.hp/e.maxHp), 4);
  });

  // 繪製玩家
  players.forEach((p,i) => {
    if(p.hp<=0) return;
    // 無雙光環
    if (p.musouTimer > 0) {
      ctx.fillStyle = "rgba(255, 215, 0, 0.3)";
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r + 15 + Math.sin(Date.now()/50)*5, 0, Math.PI*2); ctx.fill();
    }
    ctx.fillStyle = i===active ? "#d4af37" : "#4299e1";
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    
    // 面朝方向指示器
    ctx.fillStyle = "#fff";
    ctx.beginPath(); ctx.arc(p.x + p.faceX*p.r, p.y + p.faceY*p.r, 5, 0, Math.PI*2); ctx.fill();

    ctx.fillStyle="#000"; ctx.font="24px serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText(p.icon, p.x, p.y);
    ctx.fillStyle="#fff"; ctx.font="bold 14px Microsoft JhengHei"; ctx.fillText(p.name, p.x, p.y-35);
  });

  drawHUD();
}

function battleLoop() {
  if (!gameOver) {
    if(players.every(p=>p.hp<=0)) { gameOver=true; showMsg("部隊敗退..."); setTimeout(exitBattle,200); }
    if(KOs >= state.stage * 150) { // 破關條件
      gameOver=true; state.coin+=1000; state.jade+=50; state.stage++; save();
      showMsg("戰功彪炳！關卡突破", "#00ff00"); setTimeout(exitBattle,2000);
    }
    players.forEach(updatePlayer); updateEnemies();
  }
  draw();
  loopId = requestAnimationFrame(battleLoop);
}

window.onload = function() {
  load(); updateTop();
  $("btnHome").onclick = showHome;
  $("btnAccount").onclick = showAccount;
  $("btnTeam").onclick = showTeam;
  $("btnSummon").onclick = showSummon;
  $("btnBattle").onclick = startBattle;
  $("btnReset").onclick = () => { if(confirm("確定重置？")){ localStorage.removeItem("wahlap_musou_v1"); location.reload(); }};
  showHome();
};
</script>
