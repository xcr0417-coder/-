class Card {
  constructor(o) {
    Object.assign(this, {
      lv:1,
      star:1,
      uid:o.id + "_" + Date.now() + "_" + Math.floor(Math.random() * 1000)
    }, o);
  }

  power() {
    let p = this.base;
    p += this.base * (this.lv - 1) * 0.1;
    p += this.base * (this.star - 1) * 0.3;
    p += this.base * this.rarity * 0.5;
    if (this.rarity === 4) p *= 100;
    return Math.floor(p);
  }
}

class Sys {
  constructor() {
    this.skillEnergy = 0;
    this.ultimateEnergy = 0;
    this.musouEnergy = 0;
  }

  charge(t, a) {
    this[t + "Energy"] = Math.min(100, this[t + "Energy"] + a);
  }

  use(t, cost) {
    if (this[t + "Energy"] >= cost) {
      this[t + "Energy"] -= cost;
      return true;
    }
    return false;
  }
}

function make(id, rarityOverride = null) {
  let t = DB.find(x => x.id === id);
  let c = new Card({...t});
  if (rarityOverride !== null) c.rarity = rarityOverride;
  return c;
}

function portrait(c) {
  return `<div class="portrait"><canvas data-uid="${c.uid}"></canvas></div>`;
}

function drawAllCards() {
  document.querySelectorAll("canvas[data-uid]").forEach(cv => {
    let c = state.cards.find(x => x.uid === cv.dataset.uid);
    if (!c) return;

    let ctx = cv.getContext("2d");
    cv.width = 200;
    cv.height = 200;

    let g = ctx.createLinearGradient(0, 0, 200, 200);
    g.addColorStop(0, "#222");
    g.addColorStop(0.45, c.color || "#ffe08a");
    g.addColorStop(1, "#111");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, 200, 200);

    if (c.rarity === 4) {
      ctx.strokeStyle = "#fff";
      ctx.lineWidth = 8;
      ctx.strokeRect(8, 8, 184, 184);
      ctx.fillStyle = "rgba(255,255,255,.25)";
      ctx.fillRect(0, 0, 200, 200);
    }

    drawCharacterArt(ctx, 100, 140, 60, c.color || "#fff", c.style || "blade", true);

    ctx.fillStyle = c.rarity === 4 ? "#111" : "#fff";
    ctx.font = "bold 18px Microsoft JhengHei";
    ctx.textAlign = "center";
    ctx.fillText(c.name, 100, 30);
  });
}

function upLv(uid, cost) {

}

function upStar(uid) {
  let c = state.cards.find(x => x.uid === uid);
  if (c.star >= 10) return alert("滿星");

  let idx = state.cards.findIndex(x => x.name === c.name && x.uid !== uid);
  if (idx === -1) return alert("需 1 張同名卡");

  state.cards.splice(idx, 1);
  c.star++;
  save();
  $("m_bag").onclick();
}

function upRank(uid) {
  let c = state.cards.find(x => x.uid === uid);
  if (c.rarity >= 3) return alert("最高階");

  let dupes = state.cards.filter(x => x.name === c.name && x.uid !== uid);
  if (dupes.length < 4) return alert("需 4 張同名卡");

  for (let i=0;i<4;i++) {
    state.cards.splice(state.cards.findIndex(x => x.name === c.name && x.uid !== uid), 1);
  }

  c.rarity++;
  save();
  $("m_bag").onclick();
}

function awaken(uid) {
  let c = state.cards.find(x => x.uid === uid);
  if (c.lv < 100 || c.star < 10 || c.rarity < 3) {
    return alert("未達 Lv100、10星、傳說");

  c.rarity = 4;

}

  state.jade -= cost;
  let got = [];

  for (let i=0;i<n;i++) {
    let r = Math.random() * 100;

    if (n === 10 && i === 9) rar = 2;
    else if (r <= 1) rar = 3;
    else if (r <= 10) rar = 2;
    else if (r <= 40) rar = 1;
    else rar = 0;

    let list = DB.filter(x => x.rarity === rar || (rar === 0 && x.rarity === 0));
    let c = make(list[Math.floor(Math.random() * list.length)].id, rar);
    state.cards.push(c);
    got.push(`${c.name}【${RN[c.rarity]}】`);

}

if ("ontouchstart" in window || navigator.maxTouchPoints > 0) {
  $("mobile").style.display = "block";
}

const joy = $("joy");
const stick = $("stick");
let joyTid = null;
let joyBaseX = 0;
let joyBaseY = 0;

document.addEventListener("touchstart", e => {
  if (e.target.closest("button") || e.target.closest(".tb")) return;

  for (let t of e.changedTouches) {
    if (t.clientX < innerWidth / 2 && joyTid === null && pData && !over) {
      joyTid = t.identifier;
      joyBaseX = t.clientX;
      joyBaseY = t.clientY;
      joy.style.display = "block";
      joy.style.left = (joyBaseX - 75) + "px";
      joy.style.top = (joyBaseY - 75) + "px";
      stick.style.transform = "translate(0px,0px)";
      mv(t);
    }
  }
}, {passive:false});

document.addEventListener("touchmove", e => {
  for (let t of e.changedTouches) {
    if (t.identifier === joyTid) {
      e.preventDefault();
      mv(t);
    }
  }
}, {passive:false});

document.addEventListener("touchend", e => {
  for (let t of e.changedTouches) {
    if (t.identifier === joyTid) {
      joyTid = null;
      joy.style.display = "none";
      touch.x = 0;
      touch.y = 0;
      stick.style.transform = "translate(0px,0px)";
    }
  }
});

function mv(t) {
  let dx = t.clientX - joyBaseX;
  let dy = t.clientY - joyBaseY;
  let len = Math.hypot(dx, dy);
  let max = 45;

  if (len > max) {
    dx = dx / len * max;
    dy = dy / len * max;
  }

  touch.x = dx / max;
  touch.y = dy / max;
  stick.style.transform = `translate(${dx}px, ${dy}px)`;
}

function initBattle(mType, param) {
  if (!state.team.hero) return alert("請先裝備武將！");
  if (state.coin < 30) return alert("金錢不足 30！");

  state.coin -= 30;
  save();
  topbar();

  difficultyKey = selectedDifficulty;
  diff = DIFFICULTY[difficultyKey];

  mode = { type:mType, param:param };

  let hc = state.cards.find(x => x.uid === state.team.hero);
  let pet = state.cards.find(x => x.uid === state.team.pet);
  let ult = state.cards.find(x => x.uid === state.team.ult);

  let pwr = hc.power();
  let atkBuff = pet ? (pet.buffA || 0) : 0;
  let defBuff = pet ? (pet.buffD || 0) : 0;
  let spdBuff = pet ? (pet.buffS || 0) : 0;

  pData = {
    sys:new Sys(),
    base:hc,
    name:hc.name,
    x:300,
    y:canvas.height / 2,
    r:28,
    hp:hc.hp + pwr,
    maxHp:hc.hp + pwr,
    atk:hc.atk + Math.floor(pwr * 0.1) + atkBuff,
    def:hc.def + defBuff,
    spd:5 + spdBuff,
    fx:1,
    fy:0,
    cd:0,
    cseq:0,
    ct:0,
    inv:0,
    dodge:0,
    musou:0,
    hitstun:0
  };

  pData.sys.ult = ult;

  es = [];
  slashes = [];
  texts = [];
  items = [];
  KOs = 0;
  bossOut = 0;
  over = 0;
  battleFrame = 0;
  screenShake = 0;

  timeLeft = mType === "online" ? (difficultyKey === "demonKing" ? 180 : difficultyKey === "hell" ? 210 : 300) : 0;

  if (diff.endless) {
    worldW = 3000;
    $("mission").textContent = `【除草模式】無限割草，盡情發洩！看能打死幾隻！`;
  } else if (mType === "story") {
    worldW = difficultyKey === "demonKing" ? 5000 : 6000;
    $("mission").textContent = difficultyKey === "demonKing"
      ? `【魔王級劇本】擊破 ${getKillRequirement()} 隻 Boss 小兵，引出白銀傳說 Boss`
      : `【劇本】擊破 ${getKillRequirement()} 兵引出大將`;
  } else if (mType === "online") {
    worldW = 2400;
    $("mission").textContent = difficultyKey === "demonKing"
      ? `【魔王級限時】打倒白銀傳說 Boss`
      : `【限時討伐】打倒大將`;
    $("timerUI").style.display = "block";
  } else {
    worldW = difficultyKey === "demonKing" ? 2400 : 2200;
    $("mission").textContent = difficultyKey === "demonKing"
      ? `【魔王級】擊破 ${getKillRequirement()} 隻 Boss 小兵，引出白銀傳說 Boss`
      : `【闖關】擊破 ${getKillRequirement()} 兵引出大將`;
  }

  $("diffUI").textContent = "難度：" + diff.name;
  $("ko").textContent = "擊破 0";
  $("wrap").style.display = "block";

  resize();

  let initSpawn = difficultyKey === "demonKing"
    ? 8
    : diff.endless ? 40 : Math.floor((mType === "story" ? 50 : 22) * diff.spawn);

  for (let i=0;i<initSpawn;i++) spawnE(true);

  cancelAnimationFrame(loop);
  battleLoop();

  if (difficultyKey === "demonKing") {
    msg("魔王級開始！小兵都是 Boss！", "#ffffff", "44px");
  } else if (diff.endless) {
    msg("割草開始！無限兵量！", "#4dff85", "44px");
  }
}

function getKillRequirement() {
  if (difficultyKey === "mowing" || diff.endless) return Infinity; // 除草無限

  let base = mode.type === "story" ? 150 : 30;

  if (difficultyKey === "easy") return Math.floor(base * 0.8);
  if (difficultyKey === "hard") return Math.floor(base * 1.15);
  if (difficultyKey === "shura") return Math.floor(base * 1.35);
  if (difficultyKey === "hell") return Math.floor(base * 1.55);
  if (difficultyKey === "demonKing") return mode.type === "story" ? 18 : 8;

  return base;
}

function exitBattle() {
  $("wrap").style.display = "none";
  $("timerUI").style.display = "none";
  cancelAnimationFrame(loop);
  showMap();
}

function timePowerScale() {
  let minute = battleFrame / 3600;
  return 1 + minute * 0.12 * diff.timeScale;
}

function chooseEnemyKind(isBoss) {
  if (isBoss) return "boss";

  if (difficultyKey === "demonKing") {
    let r = Math.random();
    if (r < 0.35) return "demonBoss";
    if (r < 0.55) return "demonArcher";
    if (r < 0.75) return "demonMage";
    if (r < 0.9) return "demonShield";
    return "demonElite";
  }

  let r = Math.random();

  if (r < diff.mage) return "mage";
  if (r < diff.mage + diff.ranged) return "archer";
  if (r < diff.mage + diff.ranged + diff.shield) return "shield";
  if (Math.random() < 0.12 + diff.spawn * 0.03) return "elite";

  return "soldier";
}

function createSilverLegendBoss() {
  const pool = ["silver_lubu", "silver_zhaoyun", "silver_guanyu"];
  let id = pool[Math.floor(Math.random() * pool.length)];
  let c = make(id);
  c.lv = 100;
  c.star = 10;
  c.rarity = 4;
  return c;
}

function spawnE(init=false, forceBoss=false) {
  let maxE = mode.type === "story" ? 80 : 34;

  if (difficultyKey === "demonKing") {
    maxE = mode.type === "story" ? 16 : 10;
  } else if (diff.endless) {
    maxE = 80;
  } else {
    maxE = Math.floor(maxE * diff.spawn);
  }

  if (es.length >= maxE) return;

  let kind = chooseEnemyKind(forceBoss);
  let isBoss = kind === "boss";
  let isDemonMob = kind.startsWith("demon");
  let silverCard = null;

  if (forceBoss && difficultyKey === "demonKing") {
    kind = "silverLegendBoss";
    isBoss = true;
    silverCard = createSilverLegendBoss();
  }

  let dist = init ? Math.random() * 800 + 200 : canvas.width / 2 + 100;
  let a = Math.random() * Math.PI * 2;
  let lv = pData.base.lv;
  let scale = timePowerScale();

  let baseHp = isBoss ? 3000 :
               kind === "elite" ? 480 :
               kind === "shield" ? 360 :
               kind === "mage" ? 220 :
               kind === "archer" ? 200 : 150;

  let baseAtk = isBoss ? 80 :
                kind === "elite" ? 28 :
                kind === "shield" ? 18 :
                kind === "mage" ? 24 :
                kind === "archer" ? 20 : 15;

  let baseDef = isBoss ? 25 :
                kind === "shield" ? 40 :
                kind === "elite" ? 12 : 0;

  if (isDemonMob) {
    baseHp = 1800;
    baseAtk = 70;
    baseDef = 45;

    if (kind === "demonArcher") {
      baseHp = 1500;
      baseAtk = 80;
      baseDef = 30;
    }

    if (kind === "demonMage") {
      baseHp = 1400;
      baseAtk = 95;
      baseDef = 25;
    }

    if (kind === "demonShield") {
      baseHp = 2500;
      baseAtk = 65;
      baseDef = 95;
    }

    if (kind === "demonElite") {
      baseHp = 3200;
      baseAtk = 105;
      baseDef = 80;
    }
  }

  if (kind === "silverLegendBoss") {
    baseHp = silverCard.hp + silverCard.power() * 0.35;
    baseAtk = silverCard.atk + silverCard.power() * 0.015;
    baseDef = silverCard.def + 200;
  }

  let hp = baseHp * Math.pow(1.02, lv) * diff.hp * scale;
  let atk = baseAtk * Math.pow(1.01, lv) * diff.atk * scale;
  let def = baseDef;

  if (kind === "silverLegendBoss") {
    hp *= 1.8;
    atk *= 1.25;
  }

  let color = "#999";

  if (mode.type === "stage") {
    color = mode.param === "火系" ? "#f44" : mode.param === "水系" ? "#44f" : "#4f4";
  }

  if (kind === "boss") color = "#b100ff";
  if (kind === "archer") color = "#c98b3b";
  if (kind === "mage") color = "#8844ff";
  if (kind === "shield") color = "#6b6b6b";
  if (kind === "elite") color = "#ff3333";

  if (isDemonMob) color = "#7f00ff";
  if (kind === "demonArcher") color = "#cc66ff";
  if (kind === "demonMage") color = "#4400ff";
  if (kind === "demonShield") color = "#999999";
  if (kind === "demonElite") color = "#ff0000";
  if (kind === "silverLegendBoss") color = "#ffffff";

  let radius = isBoss ? 45 :
               isDemonMob ? 42 :
               kind === "elite" ? 26 :
               kind === "shield" ? 24 : 20;

  if (kind === "silverLegendBoss") radius = 56;

  let speed = isBoss ? 1.8 :
              kind.includes("Shield") || kind === "shield" ? 1.25 :
              kind.includes("Archer") || kind === "archer" ? 1.75 :
              kind.includes("Mage") || kind === "mage" ? 1.45 :
              Math.random() * 1.5 + 1.5;

  if (kind === "silverLegendBoss") speed = 2.2;
  speed *= diff.spd;

  es.push({
    kind,
    isBoss,
    isDemonMob,
    silverCard,
    phase2:false,
    rage:false,
    skillCd:Math.floor(Math.random() * 120 + 120),
    shootCd:Math.floor(Math.random() * 90 + 90),
    color,
    x:Math.max(80, Math.min(worldW - 80, pData.x + Math.cos(a) * dist)),
    y:Math.max(140, Math.min(canvas.height - 140, pData.y + Math.sin(a) * dist)),
    r:radius,
    hp,
    maxHp:hp,
    atk,
    def,
    spd:speed,
    vx:0,
    vy:0,
    stun:0
  });
}

function maybeDropItem(x, y) {
  let chance = 0.14 * diff.drop;

  if (difficultyKey === "demonKing") {
    chance = 0.06;
  }

  if (Math.random() > chance) return;

  let pool = ["baozi","wine","coin"];
  if (difficultyKey === "easy" || difficultyKey === "normal" || diff.endless) pool.push("baozi");

  let type = pool[Math.floor(Math.random() * pool.length)];
  items.push({type, x, y, r:14, life:900});
}

function applyItem(it) {
  if (it.type === "baozi") {
    pData.hp = Math.min(pData.maxHp, pData.hp + pData.maxHp * 0.22);
    msg("肉包補血", "#4dff85", "34px");
  } else if (it.type === "wine") {
    pData.sys.musouEnergy = 100;
    msg("老酒：無雙滿", "#ffe35b", "34px");
  } else if (it.type === "coin") {
    state.coin += difficultyKey === "demonKing" ? 200 : 60;
    save();
    topbar();
    msg(difficultyKey === "demonKing" ? "+200 金錢" : "+60 金錢", "#ffe08a", "32px");
  }
  it.life = 0;
}

function slash(p, a, rad, sp, col, dmg, kb) {
  slashes.push({x:p.x, y:p.y, a, rad, sp, col, life:10, max:10});

  let hits = 0;

  es.forEach(e => {
    if (e.hp <= 0) return;

    let ang = Math.atan2(e.y - p.y, e.x - p.x);
    let ad = Math.abs(ang - a);
    if (ad > Math.PI) ad = Math.PI * 2 - ad;

    let dist = Math.hypot(e.x - p.x, e.y - p.y);

    if (dist <= rad && ad <= sp / 2) {
      let guardRate = 1;

      if (e.kind === "shield" || e.kind === "demonShield") {
        let front = Math.cos(ang - Math.atan2(p.fy, p.fx));
        if (front < 0.3) guardRate = 0.25;
      }

      if (e.kind === "silverLegendBoss") {
        guardRate *= 0.8;
      }

      let finalDmg = Math.max(1, (dmg * guardRate) - e.def);

      e.hp -= finalDmg;

      if (!e.isDemonMob && !e.isBoss) {
        e.stun = 15;
      } else {
        e.stun = Math.max(e.stun, difficultyKey === "demonKing" ? 2 : 5);
      }

      e.vx = Math.cos(ang) * kb;
      e.vy = Math.sin(ang) * kb;

      p.sys.charge("skill", difficultyKey === "demonKing" ? 1.5 : 3);
      p.sys.charge("musou", difficultyKey === "demonKing" ? 0.8 : difficultyKey === "hell" ? 1.2 : 2);

      addText(e.x, e.y, Math.floor(finalDmg), guardRate < 1 ? "#66ccff" : "#fff");
      hits++;
    }
  });

  if (hits) {
    screenShake = Math.min(18, screenShake + hits * 1.5);
  }
}

function boom(x, y, rad, dmg, col) {
  slashes.push({x, y, rad, type:"circle", col, life:15, max:15});

  es.forEach(e => {
    let d = Math.hypot(e.x - x, e.y - y);

    if (d <= rad) {
      let finalDmg = Math.max(1, dmg - e.def);
      e.hp -= finalDmg;
      e.stun = difficultyKey === "demonKing" ? 6 : 20;
      e.vx = (e.x - x) * 0.08;
      e.vy = (e.y - y) * 0.08;
      addText(e.x, e.y, Math.floor(finalDmg), "#ff4");
    }
  });

  screenShake = 18;
}

function enemyProjectile(e) {
  let a = Math.atan2(pData.y - e.y, pData.x - e.x);
  let speed = e.kind === "silverLegendBoss" ? 9 : 7;
  let size = e.kind === "silverLegendBoss" ? 22 : e.kind.includes("Mage") || e.kind === "mage" ? 18 : 10;

  slashes.push({
    x:e.x,
    y:e.y,
    vx:Math.cos(a) * speed,
    vy:Math.sin(a) * speed,
    r:size,
    dmg:e.atk * (e.kind.includes("Mage") || e.kind === "mage" ? 1.3 : 1),
    type:"projectile",
    col:e.kind === "silverLegendBoss" ? "#ffffff" : e.kind.includes("Mage") || e.kind === "mage" ? "#8844ff" : "#ffcc66",
    life:100,
    max:100
  });
}

function bossSkill(e) {
  if (!e.isBoss && !e.isDemonMob) return;

  let rageBonus = e.rage ? 1.4 : 1;
  let radius = e.kind === "silverLegendBoss" ? 220 : 130 * rageBonus;
  let damage = e.kind === "silverLegendBoss" ? e.atk * 3.2 : e.atk * 2.2;

  boom(pData.x, pData.y, radius, damage, e.kind === "silverLegendBoss" ? "#ffffff" : "#b100ff");

  if (e.phase2 || e.kind === "silverLegendBoss") {
    let count = e.kind === "silverLegendBoss" ? 12 : 6;

    for (let i=0;i<count;i++) {
      let ang = Math.PI * 2 * i / count;
      slashes.push({
        x:e.x,
        y:e.y,
        vx:Math.cos(ang) * (e.kind === "silverLegendBoss" ? 7 : 5),
        vy:Math.sin(ang) * (e.kind === "silverLegendBoss" ? 7 : 5),
        r:e.kind === "silverLegendBoss" ? 18 : 14,
        dmg:e.atk * (e.kind === "silverLegendBoss" ? 1.6 : 1.1),
        type:"projectile",
        col:e.kind === "silverLegendBoss" ? "#ffffff" : "#ff44ff",
        life:120,
        max:120
      });
    }
  }

  msg(e.kind === "silverLegendBoss" ? "白銀傳說 Boss 放招！" : e.rage ? "大將狂暴！" : "大將放招！", e.kind === "silverLegendBoss" ? "#ffffff" : "#ff44ff", "42px");
}

function updateP(p) {
  if (p.hitstun > 0) {
    p.hitstun--;
    return;
  }

  let dx = 0;
  let dy = 0;
  let pr = keys.j || act.atk;

  if (keys.w) dy--;
  if (keys.s) dy++;
  if (keys.a) dx--;
  if (keys.d) dx++;

  dx += touch.x;
  dy += touch.y;

  if (p.cd <= 0 && !p.musou) {
    let ang = Math.atan2(p.fy, p.fx);

    if (pr) {
      p.cd = 12;
      p.ct = 50;
      p.cseq = p.cseq % 4 + 1;

      let radius = 150 + p.cseq * 12;
      let damage = p.atk * (1 + p.cseq * 0.1);

      slash(p, ang, radius, Math.PI, p.base.color, damage, 6);

      p.x += p.fx * 12;
      p.y += p.fy * 12;

    } else if ((keys.i || act.ch) && p.cseq) {
      p.cd = 25;

      if (p.cseq === 1) {
        slash(p, ang, 210, Math.PI * 1.1, p.base.color, p.atk * 2, 10);
      } else if (p.cseq === 2) {
        slash(p, ang, 260, Math.PI * 1.4, p.base.color, p.atk * 2.5, 14);
      } else {
        slash(p, ang, 300, Math.PI * 2, p.base.color, p.atk * 3.2, 18);
      }

      p.cseq = 0;

    } else if ((keys.k || act.sk) && p.sys.use("skill", 30)) {
      p.cd = 20;
      p.inv = 20;

      let healSkill = p.base.id === "liubei";
      boom(p.x, p.y, 210, p.atk * 3.5, p.base.color);

      if (healSkill) {
        p.hp = Math.min(p.maxHp, p.hp + p.maxHp * 0.12);
      }

      msg("特技！" + p.base.skill, p.base.color, "36px");

    } else if ((keys.l || act.ul) && p.sys.ult && p.sys.use("ultimate", 100)) {
      p.cd = 40;
      p.inv = 45;
      boom(p.x, p.y, 430, (p.sys.ult.dmg || 500) + p.atk * 5, p.sys.ult.color);
      msg("絕招！" + p.sys.ult.name, "#f33");

    } else if ((keys.u || act.ms) && p.sys.use("musou", 100)) {
      p.musou = 150;
      p.inv = 150;
      msg("無雙亂舞！", "#ff4");

    } else if ((keys.space || act.dg) && p.dodge <= 0) {
      p.dodge = difficultyKey === "demonKing" ? 60 : difficultyKey === "hell" ? 48 : 34;
      p.inv = 15;
      p.x += p.fx * 120;
      p.y += p.fy * 120;
    }
  }

  let len = Math.hypot(dx, dy);

  if (len) {
    p.fx = dx / len;
    p.fy = dy / len;
    let spd = p.musou ? p.spd * 1.5 : p.spd;
    p.x += p.fx * spd;
    p.y += p.fy * spd;
  }

  p.x = Math.max(40, Math.min(worldW - 40, p.x));
  p.y = Math.max(90, Math.min(canvas.height - 90, p.y));

  if (p.musou) {
    p.musou--;

    if (p.musou % 10 === 0) {
      slash(p, Math.atan2(p.fy, p.fx), 270, Math.PI * 2, p.base.color, p.atk * 2.5, 12);
    }

    if (p.musou === 1) {
      boom(p.x, p.y, 520, p.atk * 10, "#fff");
    }
  }

  items.forEach(it => {
    if (Math.hypot(p.x - it.x, p.y - it.y) < p.r + it.r) {
      applyItem(it);
    }
  });

  if (p.ct > 0) {
    p.ct--;
    if (!p.ct) p.cseq = 0;
  }

  p.cd = Math.max(0, p.cd - 1);
  p.inv = Math.max(0, p.inv - 1);
  p.dodge = Math.max(0, p.dodge - 1);
}

function updateProjectiles() {
  slashes.forEach(s => {
    if (s.type !== "projectile") return;

    s.x += s.vx;
    s.y += s.vy;

    if (pData && pData.inv <= 0) {
      let d = Math.hypot(s.x - pData.x, s.y - pData.y);

      if (d < s.r + pData.r) {
        pData.hp -= Math.max(1, s.dmg - pData.def * 0.3);
        pData.sys.charge("musou", 4);
        pData.inv = 10;

        if (difficultyKey === "shura" || difficultyKey === "hell" || difficultyKey === "demonKing") {
          pData.hitstun = difficultyKey === "demonKing" ? 12 : 6;
        }

        s.life = 0;
        screenShake = 10;
      }
    }
  });
}

function updateE() {
  es.forEach(e => {
    if (e.hp <= 0) return;

    if ((e.isBoss || e.isDemonMob) && diff.bossPhase) {
      if (!e.phase2 && e.hp < e.maxHp * 0.5) {
        e.phase2 = true;
        e.spd *= e.kind === "silverLegendBoss" ? 1.45 : 1.25;
        e.atk *= e.kind === "silverLegendBoss" ? 1.45 : 1.25;
        msg(e.kind === "silverLegendBoss" ? "白銀傳說 Boss 第二階段！" : "大將第二階段！", e.kind === "silverLegendBoss" ? "#ffffff" : "#ff44ff", "44px");
      }

      if (!e.rage && diff.bossRage && e.hp < e.maxHp * 0.25) {
        e.rage = true;
        e.spd *= e.kind === "silverLegendBoss" ? 1.6 : 1.35;
        e.atk *= e.kind === "silverLegendBoss" ? 1.8 : 1.5;
        e.skillCd = 40;
        msg(e.kind === "silverLegendBoss" ? "白銀傳說 Boss 狂暴！" : "大將狂暴！", e.kind === "silverLegendBoss" ? "#ffffff" : "#ff0000", "50px");
      }
    }

    if (e.stun > 0) {
      e.stun--;
      e.x += e.vx;
      e.y += e.vy;
      e.vx *= 0.8;
      e.vy *= 0.8;
      return;
    }

    let dx = pData.x - e.x;
    let dy = pData.y - e.y;
    let dist = Math.hypot(dx, dy);
    let a = Math.atan2(dy, dx);

    let rangedEnemy = e.kind === "archer" || e.kind === "mage" || e.kind === "demonArcher" || e.kind === "demonMage";

    if (rangedEnemy) {
      e.shootCd--;

      let preferred = e.kind.includes("Mage") || e.kind === "mage" ? 320 : 380;

      if (dist < preferred - 80) {
        e.x -= Math.cos(a) * e.spd;
        e.y -= Math.sin(a) * e.spd;
      } else if (dist > preferred + 80) {
        e.x += Math.cos(a) * e.spd;
        e.y += Math.sin(a) * e.spd;
      }

      if (e.shootCd <= 0) {
        enemyProjectile(e);
        e.shootCd = e.kind.includes("Mage") || e.kind === "mage" ? 130 : 90;
        if (difficultyKey === "demonKing") e.shootCd = Math.floor(e.shootCd * 0.65);
      }

      return;
    }

    if (e.isBoss || e.isDemonMob) {
      e.skillCd--;
      if (e.skillCd <= 0) {
        bossSkill(e);
        e.skillCd = e.rage ? 90 : e.phase2 ? 130 : 180;

        if (e.kind === "silverLegendBoss") e.skillCd = e.rage ? 55 : e.phase2 ? 75 : 100;
        if (difficultyKey === "demonKing") e.skillCd = Math.floor(e.skillCd * 0.75);
      }
    }

    if (dist > e.r + pData.r) {
      let surroundOffset = 0;

      if (difficultyKey === "shura" || difficultyKey === "hell" || difficultyKey === "demonKing") {
        surroundOffset = Math.sin((battleFrame + e.x) / 30) * 0.7;
      }

      e.x += Math.cos(a + surroundOffset) * e.spd;
      e.y += Math.sin(a + surroundOffset) * e.spd;

    } else if (pData.inv <= 0) {
      pData.hp -= Math.max(1, e.atk - pData.def);
      pData.sys.charge("musou", 4);
      pData.inv = 12;

      if (difficultyKey === "hard" || difficultyKey === "shura" || difficultyKey === "hell" || difficultyKey === "demonKing") {
        pData.hitstun = difficultyKey === "demonKing" ? 14 : difficultyKey === "hell" ? 10 : 6;
      }

      screenShake = 8;
    }
  });

  let old = es.length;

  es = es.filter(e => {
    if (e.hp <= 0) {
      maybeDropItem(e.x, e.y);
      return false;
    }
    return true;
  });

  let killed = old - es.length;

  if (killed) {
    KOs += killed;
    $("ko").textContent = "擊破 " + KOs;
    pData.sys.charge("ultimate", difficultyKey === "demonKing" ? killed * 2 : killed * 4);

    if (bossOut && !es.some(e => e.isBoss)) {
      over = 1;

      let rewardCoin = 200;
      let rewardJade = 50;

      if (difficultyKey === "hard") {
        rewardCoin = 320;
        rewardJade = 80;
      } else if (difficultyKey === "shura") {
        rewardCoin = 450;
        rewardJade = 110;
      } else if (difficultyKey === "hell") {
        rewardCoin = 600;
        rewardJade = 160;
      } else if (difficultyKey === "demonKing") {
        rewardCoin = 3000;
        rewardJade = 800;
      }

      state.coin += rewardCoin;
      state.jade += rewardJade;
      save();
      topbar();

      msg(difficultyKey === "demonKing" ? "擊敗白銀傳說 Boss！" : "戰役勝利！", difficultyKey === "demonKing" ? "#ffffff" : "#4f4", "46px");
      setTimeout(exitBattle, 2000);
    }

    let req = getKillRequirement();

    if (KOs >= req && !bossOut && !diff.endless) {
      bossOut = 1;
      spawnE(false, true);
      msg(difficultyKey === "demonKing" ? "白銀傳說 Boss 降臨！" : "敵方大將出現！", difficultyKey === "demonKing" ? "#ffffff" : "#f33", "50px");
    }
  }

  if (!bossOut || difficultyKey === "shura" || difficultyKey === "hell" || difficultyKey === "demonKing" || diff.endless) {
    let target = mode.type === "story" ? 60 : 25;

    if (difficultyKey === "demonKing") {
      target = mode.type === "story" ? 12 : 7;
    } else if (diff.endless) {
      target = 60; 
    } else {
      target = Math.floor(target * diff.spawn);
    }

    while (es.length < target) {
      spawnE();
    }
  }
}

function handleOnline() {
  if (mode.type === "online") {
    timeLeft -= 1 / 60;

    let m = Math.floor(timeLeft / 60);
    let s = Math.floor(timeLeft % 60).toString().padStart(2, "0");

    $("timerUI").textContent = `${m}:${s}`;

    if (timeLeft <= 0 && !over) {
      over = 1;
      let cost = diff.revive;

      if (confirm(`時間到！花費 ${cost} 金錢接關加時？`)) {
        if (state.coin >= cost) {
          state.coin -= cost;
          timeLeft = difficultyKey === "demonKing" ? 45 : 60;
          over = 0;
          save();
        } else {
          alert("金錢不足");
          exitBattle();
        }
      } else {
        exitBattle();
      }
    }
  }
}

function drawCharacterArt(ctx, x, y, r, color, style, isHero=false, faceX=1) {
  ctx.save();
  ctx.translate(x, y);
  if (faceX < 0) ctx.scale(-1, 1);

  ctx.fillStyle = "rgba(0,0,0,.35)";
  ctx.beginPath();
  ctx.ellipse(0, r * 0.75, r * 0.75, r * 0.18, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.ellipse(0, -r * 0.1, r * 0.48, r * 0.75, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = "#f1c89b";
  ctx.beginPath();
  ctx.arc(0, -r * 0.82, r * 0.36, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = "#1b1b1b";
  ctx.beginPath();
  ctx.moveTo(-r * 0.45, -r * 1.05);
  ctx.lineTo(0, -r * 1.38);
  ctx.lineTo(r * 0.45, -r * 1.05);
  ctx.closePath();
  ctx.fill();

  if (color === "#ffffff") {
    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth = 4;
    ctx.strokeRect(-r * 0.5, -r * 1.25, r, r * 1.7);
  }

  ctx.fillStyle = "#000";
  ctx.beginPath();
  ctx.arc(-r * 0.13, -r * 0.86, r * 0.045, 0, Math.PI * 2);
  ctx.arc(r * 0.13, -r * 0.86, r * 0.045, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = "#111";
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(-r * 0.28, -r * 0.1);
  ctx.lineTo(-r * 0.85, r * 0.25);
  ctx.moveTo(r * 0.28, -r * 0.1);
  ctx.lineTo(r * 0.85, r * 0.25);
  ctx.stroke();

  ctx.strokeStyle = "#222";
  ctx.beginPath();
  ctx.moveTo(-r * 0.22, r * 0.45);
  ctx.lineTo(-r * 0.35, r * 0.9);
  ctx.moveTo(r * 0.22, r * 0.45);
  ctx.lineTo(r * 0.35, r * 0.9);
  ctx.stroke();

  ctx.strokeStyle = isHero ? "#fff" : "#ccc";
  ctx.lineWidth = isHero ? 5 : 3;

  if (style === "spear") {
    ctx.beginPath();
    ctx.moveTo(r * 0.2, r * 0.1);
    ctx.lineTo(r * 1.25, -r * 1.25);
    ctx.stroke();
  } else if (style === "halberd") {
    ctx.beginPath();
    ctx.moveTo(r * 0.25, r * 0.25);
    ctx.lineTo(r * 1.35, -r * 1.25);
    ctx.stroke();
    ctx.fillStyle = "#ddd";
    ctx.beginPath();
    ctx.moveTo(r * 1.3, -r * 1.25);
    ctx.lineTo(r * 1.55, -r * 1.0);
    ctx.lineTo(r * 1.18, -r * 1.05);
    ctx.closePath();
    ctx.fill();
  } else if (style === "glaive") {
    ctx.beginPath();
    ctx.moveTo(r * 0.2, r * 0.2);
    ctx.lineTo(r * 1.25, -r * 1.1);
    ctx.stroke();
    ctx.fillStyle = "#e8ffe8";
    ctx.beginPath();
    ctx.arc(r * 1.2, -r * 1.1, r * 0.18, 0, Math.PI * 2);
    ctx.fill();
  } else if (style === "mage" || style === "fan") {
    ctx.fillStyle = "rgba(255,255,255,.65)";
    ctx.beginPath();
    ctx.arc(r * 0.85, -r * 0.25, r * 0.28, 0, Math.PI * 2);
    ctx.fill();
  } else {
    ctx.beginPath();
    ctx.moveTo(r * 0.28, r * 0.05);
    ctx.lineTo(r * 1.0, -r * 0.95);
    ctx.stroke();
  }

  ctx.restore();
}

function drawEnemy(ctx, e) {
  let sx = e.x - camX;
  let style = "blade";

  if (e.kind === "archer" || e.kind === "demonArcher") style = "bow";
  if (e.kind === "mage" || e.kind === "demonMage") style = "mage";
  if (e.kind === "shield" || e.kind === "demonShield") style = "shield";
  if (e.kind === "boss" || e.kind === "demonBoss" || e.kind === "demonElite" || e.kind === "silverLegendBoss") style = e.silverCard ? e.silverCard.style : "halberd";

  drawCharacterArt(ctx, sx, e.y, e.r, e.color, style, false, e.x < pData.x ? 1 : -1);

  if (e.kind === "shield" || e.kind === "demonShield") {
    ctx.fillStyle = "#333";
    ctx.fillRect(sx - e.r * 0.8, e.y - e.r * 0.3, e.r * 0.45, e.r * 0.9);
  }

  if (e.kind === "archer" || e.kind === "demonArcher") {
    ctx.strokeStyle = "#f5c16c";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(sx + e.r * 0.3, e.y - e.r * 0.2, e.r * 0.5, -1.2, 1.2);
    ctx.stroke();
  }

  let hpWidth = e.kind === "silverLegendBoss" ? 120 : 50;
  let hpX = sx - hpWidth / 2;

  ctx.fillStyle = "#111";
  ctx.fillRect(hpX, e.y - e.r - 25, hpWidth, 6);
  ctx.fillStyle = e.kind === "silverLegendBoss" ? "#ffffff" : e.isBoss || e.isDemonMob ? "#ff44ff" : "#f33";
  ctx.fillRect(hpX, e.y - e.r - 25, hpWidth * Math.max(0, e.hp / e.maxHp), 6);

  ctx.fillStyle = e.kind === "silverLegendBoss" ? "#ffffff" : "#fff";
  ctx.font = "bold 11px Arial";
  ctx.textAlign = "center";

  if (e.kind === "silverLegendBoss") {
    ctx.fillText(e.silverCard ? e.silverCard.name : "白銀傳說BOSS", sx, e.y - e.r - 34);
  } else if (e.isDemonMob) {
    ctx.fillText("魔王兵", sx, e.y - e.r - 32);
  } else if (e.isBoss) {
    ctx.fillText(e.rage ? "狂暴BOSS" : e.phase2 ? "二階BOSS" : "BOSS", sx, e.y - e.r - 32);
  } else if (e.kind === "archer") {
    ctx.fillText("弓", sx, e.y - e.r - 32);
  } else if (e.kind === "mage") {
    ctx.fillText("法", sx, e.y - e.r - 32);
  } else if (e.kind === "shield") {
    ctx.fillText("盾", sx, e.y - e.r - 32);
  } else if (e.kind === "elite") {
    ctx.fillText("將", sx, e.y - e.r - 32);
  }
}

function drawItems() {
  items.forEach(it => {
    ctx.fillStyle = it.type === "baozi" ? "#4dff85" :
                    it.type === "wine" ? "#ffe35b" : "#ffe08a";
    ctx.beginPath();
    ctx.arc(it.x - camX, it.y, it.r, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "#111";
    ctx.font = "14px serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(it.type === "baozi" ? "🥟" : it.type === "wine" ? "🍶" : "錢", it.x - camX, it.y);
  });
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!pData) return;

  camX = Math.max(0, Math.min(worldW - canvas.width, pData.x - canvas.width / 2));

  ctx.save();

  if (screenShake > 0) {
    ctx.translate((Math.random() * 2 - 1) * screenShake, (Math.random() * 2 - 1) * screenShake);
    screenShake *= 0.85;
    if (screenShake < 0.5) screenShake = 0;
  }

  ctx.fillStyle = difficultyKey === "demonKing" ? "#120018" : "#1e1308";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = difficultyKey === "demonKing" ? "rgba(255,255,255,0.12)" : "rgba(255,255,255,0.05)";
  for (let i = -camX % 100; i < canvas.width; i += 100) {
    ctx.beginPath();
    ctx.moveTo(i, 0);
    ctx.lineTo(i, canvas.height);
    ctx.stroke();
  }

  ctx.fillStyle = difficultyKey === "demonKing" ? "rgba(255,255,255,.08)" : "rgba(255,255,255,.04)";
  for (let x = -camX % 240; x < canvas.width; x += 240) {
    ctx.fillRect(x, canvas.height - 130, 140, 20);
  }

  slashes.forEach(s => {
    ctx.globalAlpha = s.life / s.max;
    ctx.fillStyle = s.col;
    ctx.beginPath();

    if (s.type === "circle") {
      ctx.arc(s.x - camX, s.y, s.rad, 0, Math.PI * 2);
      ctx.fill();
    } else if (s.type === "projectile") {
      ctx.arc(s.x - camX, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.moveTo(s.x - camX, s.y);
      ctx.arc(s.x - camX, s.y, s.rad, s.a - s.sp / 2, s.a + s.sp / 2);
      ctx.fill();
    }
  });

  ctx.globalAlpha = 1;

  drawItems();

  es.forEach(e => drawEnemy(ctx, e));

  if (pData && pData.hp > 0) {
    if (pData.musou) {
      ctx.fillStyle = "rgba(255,215,0,0.3)";
      ctx.beginPath();
      ctx.arc(pData.x - camX, pData.y, pData.r * 2.1, 0, Math.PI * 2);
      ctx.fill();
    }

    drawCharacterArt(ctx, pData.x - camX, pData.y, pData.r, pData.base.color, pData.base.style, true, pData.fx);

    ctx.fillStyle = "#fff";
    ctx.font = "bold 14px Microsoft JhengHei";
    ctx.textAlign = "center";
    ctx.fillText(pData.name, pData.x - camX, pData.y - pData.r - 36);
  }

  texts.forEach(t => {
    t.y -= 1.5;
    ctx.globalAlpha = t.life / 30;
    ctx.fillStyle = t.c;
    ctx.font = "bold 20px Arial";
    ctx.fillText(t.t, t.x - camX, t.y);
  });

  ctx.globalAlpha = 1;

  texts = texts.filter(t => t.life-- > 0);
  slashes = slashes.filter(s => s.life-- > 0);

  ctx.restore();

  drawHUD();
}

function drawHUD() {
  if (!pData) return;

  $("hud").innerHTML = `
  <b style="color:#ffe08a">${pData.name} C${pData.cseq}</b>
  <div class="barrow"><span>HP</span><div class="bar"><div class="fill hp" style="width:${Math.max(0, pData.hp / pData.maxHp * 100)}%"></div></div></div>
  <div class="barrow"><span>特技</span><div class="bar"><div class="fill sk" style="width:${pData.sys.skillEnergy}%"></div></div></div>
  <div class="barrow"><span>絕招</span><div class="bar"><div class="fill ul" style="width:${pData.sys.ultimateEnergy}%"></div></div></div>
  <div class="barrow"><span>無雙</span><div class="bar"><div class="fill ms" style="width:${pData.sys.musouEnergy}%"></div></div></div>
  <div style="font-size:11px;color:#aaa">難度：${diff.name}${diff.endless ? '' : '｜敵人成長：'+timePowerScale().toFixed(2)+'x'}</div>
  `;
}

function battleLoop() {
  if (!over && pData) {
    battleFrame++;

    if (pData.hp <= 0) {
      over = 1;

      let cost = diff.revive;

      if ((mode.type === "online" || difficultyKey === "shura" || difficultyKey === "hell" || difficultyKey === "demonKing") && confirm(`戰死！花費 ${cost} 金錢接關？`)) {
        if (state.coin >= cost) {
          state.coin -= cost;
          pData.hp = pData.maxHp;
          pData.inv = 120;
          over = 0;
          save();
        } else {
          alert("金錢不足");
          exitBattle();
        }
      } else {
        msg("敗退...", "#f44");
        setTimeout(exitBattle, 1500);
      }
    }

    updateP(pData);
    updateE();
    updateProjectiles();
    handleOnline();

    items.forEach(it => it.life--);
    items = items.filter(it => it.life > 0);
  }

  draw();
  loop = requestAnimationFrame(battleLoop);
}

function getHeroLookByColor(color, style) {
  if (!pData || !pData.base) {
    return {
      skin:"#e0ad83",
      hair:"#161616",
      armor:color || "#777",
      cloth:color || "#999",
      eye:"#111",
      beard:false,
      crown:"#ffe08a"
    };
  }

  let baseId = pData.base.id;
  if (REAL_HERO_FACE[baseId]) return REAL_HERO_FACE[baseId];

  return {
    skin:"#e0ad83",
    hair:"#161616",
    armor:color || "#777",
    cloth:color || "#999",
    eye:"#111",
    beard:style === "glaive",
    crown:"#ffe08a"
  };
}

function roundedRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

/* 覆蓋原本 drawCharacterArt：真人感比例版 */
drawCharacterArt = function(ctx, x, y, r, color, style, isHero=false, faceX=1) {
  const look = isHero ? getHeroLookByColor(color, style) : {
    skin:"#c79a75",
    hair:"#141414",
    armor:color || "#777",
    cloth:color || "#777",
    eye:"#111",
    beard:style === "halberd",
    crown:"#999"
  };

  ctx.save();
  ctx.translate(x, y);
  if (faceX < 0) ctx.scale(-1, 1);

  // 陰影
  ctx.fillStyle = "rgba(0,0,0,.42)";
  ctx.beginPath();
  ctx.ellipse(0, r * .92, r * .9, r * .22, 0, 0, Math.PI * 2);
  ctx.fill();

  // 白銀角色氣場
  if (color === "#ffffff" || look.cloth === "#ffffff") {
    let aura = ctx.createRadialGradient(0, -r*.2, r*.2, 0, -r*.2, r*2.3);
    aura.addColorStop(0, "rgba(255,255,255,.35)");
    aura.addColorStop(1, "rgba(255,255,255,0)");
    ctx.fillStyle = aura;
    ctx.beginPath();
    ctx.arc(0, -r * .2, r * 2.2, 0, Math.PI * 2);
    ctx.fill();
  }

  // 腿
  ctx.strokeStyle = "#161616";
  ctx.lineWidth = Math.max(3, r * .13);
  ctx.lineCap = "round";
  ctx.beginPath();
  ctx.moveTo(-r*.22, r*.45);
  ctx.lineTo(-r*.38, r*.95);
  ctx.moveTo(r*.22, r*.45);
  ctx.lineTo(r*.38, r*.95);
  ctx.stroke();

  // 靴
  ctx.strokeStyle = "#050505";
  ctx.lineWidth = Math.max(4, r * .16);
  ctx.beginPath();
  ctx.moveTo(-r*.38, r*.95);
  ctx.lineTo(-r*.62, r*1.02);
  ctx.moveTo(r*.38, r*.95);
  ctx.lineTo(r*.62, r*1.02);
  ctx.stroke();

  // 身體盔甲
  let armorG = ctx.createLinearGradient(-r, -r*.45, r, r*.45);
  armorG.addColorStop(0, "#111");
  armorG.addColorStop(.28, look.armor);
  armorG.addColorStop(.58, look.cloth);
  armorG.addColorStop(1, "#111");

  ctx.fillStyle = armorG;
  roundedRect(ctx, -r*.55, -r*.35, r*1.1, r*1.08, r*.18);
  ctx.fill();

  ctx.strokeStyle = "rgba(255,255,255,.5)";
  ctx.lineWidth = Math.max(2, r*.05);
  ctx.stroke();

  // 胸甲
  ctx.fillStyle = "rgba(255,255,255,.22)";
  ctx.beginPath();
  ctx.moveTo(-r*.38, -r*.23);
  ctx.lineTo(0, r*.1);
  ctx.lineTo(r*.38, -r*.23);
  ctx.lineTo(r*.25, r*.38);
  ctx.lineTo(-r*.25, r*.38);
  ctx.closePath();
  ctx.fill();

  // 腰帶
  ctx.fillStyle = "#111";
  roundedRect(ctx, -r*.58, r*.25, r*1.16, r*.18, r*.06);
  ctx.fill();

  ctx.fillStyle = "#ffe08a";
  ctx.beginPath();
  ctx.arc(0, r*.34, r*.12, 0, Math.PI*2);
  ctx.fill();

  // 手臂
  ctx.strokeStyle = look.armor;
  ctx.lineWidth = Math.max(5, r*.18);
  ctx.lineCap = "round";
  ctx.beginPath();
  ctx.moveTo(-r*.42, -r*.12);
  ctx.lineTo(-r*.82, r*.28);
  ctx.moveTo(r*.42, -r*.12);
  ctx.lineTo(r*.82, r*.18);
  ctx.stroke();

  // 手掌
  ctx.fillStyle = look.skin;
  ctx.beginPath();
  ctx.arc(-r*.86, r*.3, r*.11, 0, Math.PI*2);
  ctx.arc(r*.86, r*.2, r*.11, 0, Math.PI*2);
  ctx.fill();

  // 脖子
  ctx.fillStyle = look.skin;
  roundedRect(ctx, -r*.17, -r*.73, r*.34, r*.32, r*.08);
  ctx.fill();

  // 臉型
  let faceG = ctx.createLinearGradient(-r*.35, -r*1.18, r*.35, -r*.55);
  faceG.addColorStop(0, "#fff0d4");
  faceG.addColorStop(.42, look.skin);
  faceG.addColorStop(1, "#a96f4c");

  ctx.fillStyle = faceG;
  ctx.beginPath();
  ctx.ellipse(0, -r*.88, r*.38, r*.46, 0, 0, Math.PI*2);
  ctx.fill();

  // 頭髮
  ctx.fillStyle = look.hair;
  ctx.beginPath();
  ctx.moveTo(-r*.42, -r*.98);
  ctx.quadraticCurveTo(-r*.24, -r*1.42, r*.05, -r*1.36);
  ctx.quadraticCurveTo(r*.42, -r*1.26, r*.42, -r*.95);
  ctx.quadraticCurveTo(r*.1, -r*1.1, -r*.42, -r*.98);
  ctx.fill();

  // 髮束
  ctx.strokeStyle = look.hair;
  ctx.lineWidth = Math.max(2, r*.06);
  ctx.beginPath();
  ctx.moveTo(-r*.34, -r*.88);
  ctx.lineTo(-r*.48, -r*.48);
  ctx.moveTo(r*.34, -r*.88);
  ctx.lineTo(r*.46, -r*.48);
  ctx.stroke();

  // 頭冠
  ctx.fillStyle = look.crown;
  roundedRect(ctx, -r*.24, -r*1.32, r*.48, r*.16, r*.05);
  ctx.fill();

  if (isHero) {
    ctx.strokeStyle = "#fff8";
    ctx.lineWidth = Math.max(1, r*.035);
    ctx.stroke();
  }

  // 眉毛
  ctx.strokeStyle = "#111";
  ctx.lineWidth = Math.max(1.5, r*.045);
  ctx.beginPath();
  ctx.moveTo(-r*.27, -r*.94);
  ctx.lineTo(-r*.09, -r*.98);
  ctx.moveTo(r*.09, -r*.98);
  ctx.lineTo(r*.27, -r*.94);
  ctx.stroke();

  // 眼睛
  ctx.fillStyle = look.eye;
  ctx.beginPath();
  ctx.ellipse(-r*.16, -r*.87, r*.045, r*.03, 0, 0, Math.PI*2);
  ctx.ellipse(r*.16, -r*.87, r*.045, r*.03, 0, 0, Math.PI*2);
  ctx.fill();

  // 鼻子
  ctx.strokeStyle = "rgba(80,40,20,.55)";
  ctx.lineWidth = Math.max(1, r*.03);
  ctx.beginPath();
  ctx.moveTo(0, -r*.82);
  ctx.lineTo(r*.04, -r*.74);
  ctx.lineTo(-r*.03, -r*.72);
  ctx.stroke();

  // 嘴
  ctx.strokeStyle = "#6b1f1f";
  ctx.lineWidth = Math.max(1, r*.03);
  ctx.beginPath();
  ctx.moveTo(-r*.09, -r*.63);
  ctx.quadraticCurveTo(0, -r*.59, r*.09, -r*.63);
  ctx.stroke();

  // 鬍子
  if (look.beard) {
    ctx.fillStyle = look.hair;
    ctx.beginPath();
    ctx.moveTo(-r*.18, -r*.59);
    ctx.quadraticCurveTo(0, -r*.22, r*.18, -r*.59);
    ctx.quadraticCurveTo(0, -r*.5, -r*.18, -r*.59);
    ctx.fill();

    ctx.strokeStyle = look.hair;
    ctx.lineWidth = Math.max(2, r*.05);
    ctx.beginPath();
    ctx.moveTo(-r*.22, -r*.62);
    ctx.quadraticCurveTo(-r*.45, -r*.48, -r*.48, -r*.28);
    ctx.moveTo(r*.22, -r*.62);
    ctx.quadraticCurveTo(r*.45, -r*.48, r*.48, -r*.28);
    ctx.stroke();
  }

  // 武器
  ctx.lineCap = "round";
  ctx.lineJoin = "round";

  if (style === "spear") {
    ctx.strokeStyle = "#dfefff";
    ctx.lineWidth = Math.max(4, r*.11);
    ctx.beginPath();
    ctx.moveTo(r*.48, r*.28);
    ctx.lineTo(r*1.42, -r*1.28);
    ctx.stroke();

    ctx.fillStyle = "#e8ffff";
    ctx.beginPath();
    ctx.moveTo(r*1.42, -r*1.28);
    ctx.lineTo(r*1.68, -r*1.08);
    ctx.lineTo(r*1.32, -r*1.0);
    ctx.closePath();
    ctx.fill();

  } else if (style === "halberd") {
    ctx.strokeStyle = "#ddd";
    ctx.lineWidth = Math.max(5, r*.12);
    ctx.beginPath();
    ctx.moveTo(r*.42, r*.34);
    ctx.lineTo(r*1.42, -r*1.26);
    ctx.stroke();

    ctx.fillStyle = color === "#ffffff" ? "#fff" : "#d9d9d9";
    ctx.beginPath();
    ctx.moveTo(r*1.4, -r*1.25);
    ctx.lineTo(r*1.78, -r*.98);
    ctx.lineTo(r*1.28, -r*.94);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = "#ff3333";
    ctx.lineWidth = Math.max(2, r*.04);
    ctx.beginPath();
    ctx.moveTo(r*1.25, -r*.96);
    ctx.lineTo(r*1.08, -r*.78);
    ctx.stroke();

  } else if (style === "glaive") {
    ctx.strokeStyle = "#e8ffe8";
    ctx.lineWidth = Math.max(5, r*.12);
    ctx.beginPath();
    ctx.moveTo(r*.42, r*.28);
    ctx.lineTo(r*1.36, -r*1.18);
    ctx.stroke();

    ctx.fillStyle = "#caffc8";
    ctx.beginPath();
    ctx.ellipse(r*1.34, -r*1.16, r*.26, r*.15, -.7, 0, Math.PI*2);
    ctx.fill();

  } else if (style === "mage" || style === "fan") {
    ctx.fillStyle = "rgba(255,255,255,.72)";
    ctx.beginPath();
    ctx.arc(r*.9, -r*.22, r*.3, 0, Math.PI*2);
    ctx.fill();

    ctx.strokeStyle = look.cloth;
    ctx.lineWidth = Math.max(2, r*.05);
    for (let i=-2;i<=2;i++) {
      ctx.beginPath();
      ctx.moveTo(r*.9, -r*.22);
      ctx.lineTo(r*(.9+i*.13), -r*.58);
      ctx.stroke();
    }

  } else {
    ctx.strokeStyle = "#f8f8f8";
    ctx.lineWidth = Math.max(5, r*.12);
    ctx.beginPath();
    ctx.moveTo(r*.44, r*.16);
    ctx.lineTo(r*1.15, -r*.92);
    ctx.stroke();

    ctx.fillStyle = "#ffffff";
    ctx.beginPath();
    ctx.moveTo(r*1.15, -r*.92);
    ctx.lineTo(r*1.24, -r*1.12);
    ctx.lineTo(r*1.03, -r*.98);
    ctx.closePath();
    ctx.fill();
  }

  // 英雄名字氣質光
  if (isHero) {
    ctx.strokeStyle = "rgba(255,224,138,.6)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, -r*.2, r*1.12, 0, Math.PI*2);
    ctx.stroke();
  }

  ctx.restore();
};


/* 保留原本 slash 的傷害邏輯，但增加揮刀殘光 */
const oldSlash_forRealHero = slash;

slash = function(p, a, rad, sp, col, dmg, kb) {
  // 先執行原本傷害與判定
  oldSlash_forRealHero(p, a, rad, sp, col, dmg, kb);

  // 新增：揮刀光刃
  let bladeColor = col || "#ffe08a";

  slashes.push({
    type:"bladeArc",
    x:p.x,
    y:p.y,
    a:a,
    rad:rad * 0.78,
    sp:sp * 0.85,
    col:bladeColor,
    life:14,
    max:14,
    width:28
  });

  slashes.push({
    type:"bladeArcThin",
    x:p.x + Math.cos(a) * 20,
    y:p.y + Math.sin(a) * 20,
    a:a,
    rad:rad * 0.96,
    sp:sp * 0.55,
    col:"#ffffff",
    life:9,
    max:9,
    width:10
  });

  // 普攻時追加刀風粒子
  for (let i=0;i<6;i++) {
    let aa = a + (Math.random() - .5) * sp;
    let rr = rad * (.35 + Math.random() * .55);
    slashes.push({
      type:"spark",
      x:p.x + Math.cos(aa) * rr,
      y:p.y + Math.sin(aa) * rr,
      vx:Math.cos(aa) * (2 + Math.random()*3),
      vy:Math.sin(aa) * (2 + Math.random()*3),
      r:3 + Math.random()*4,
      col:Math.random() < .5 ? "#fff7c2" : bladeColor,
      life:18,
      max:18
    });
  }
};


/* 覆蓋 draw：加入 bladeArc / spark 支援 */
draw = function() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!pData) return;

  camX = Math.max(0, Math.min(worldW - canvas.width, pData.x - canvas.width / 2));

  ctx.save();

  if (screenShake > 0) {
    ctx.translate((Math.random() * 2 - 1) * screenShake, (Math.random() * 2 - 1) * screenShake);
    screenShake *= 0.85;
    if (screenShake < 0.5) screenShake = 0;
  }

  // 背景
  let bg = ctx.createLinearGradient(0, 0, 0, canvas.height);
  if (difficultyKey === "demonKing") {
    bg.addColorStop(0, "#17001f");
    bg.addColorStop(.5, "#120018");
    bg.addColorStop(1, "#050008");
  } else if (diff && diff.endless) {
    bg.addColorStop(0, "#082b13");
    bg.addColorStop(.55, "#12331d");
    bg.addColorStop(1, "#050805");
  } else {
    bg.addColorStop(0, "#26180d");
    bg.addColorStop(.55, "#1e1308");
    bg.addColorStop(1, "#080402");
  }
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 地面格線
  ctx.strokeStyle = difficultyKey === "demonKing" ? "rgba(255,255,255,0.12)" : "rgba(255,255,255,0.05)";
  for (let i = -camX % 100; i < canvas.width; i += 100) {
    ctx.beginPath();
    ctx.moveTo(i, 0);
    ctx.lineTo(i, canvas.height);
    ctx.stroke();
  }

  ctx.fillStyle = difficultyKey === "demonKing" ? "rgba(255,255,255,.08)" : "rgba(255,255,255,.04)";
  for (let x = -camX % 240; x < canvas.width; x += 240) {
    ctx.fillRect(x, canvas.height - 130, 140, 20);
  }

  // 攻擊光效與投射物
  slashes.forEach(s => {
    ctx.save();

    let alpha = Math.max(0, s.life / s.max);
    ctx.globalAlpha = alpha;

    if (s.type === "circle") {
      let grd = ctx.createRadialGradient(s.x - camX, s.y, 0, s.x - camX, s.y, s.rad);
      grd.addColorStop(0, s.col);
      grd.addColorStop(.45, s.col);
      grd.addColorStop(1, "rgba(255,255,255,0)");
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(s.x - camX, s.y, s.rad, 0, Math.PI * 2);
      ctx.fill();

    } else if (s.type === "projectile") {
      ctx.shadowColor = s.col;
      ctx.shadowBlur = 20;
      ctx.fillStyle = s.col;
      ctx.beginPath();
      ctx.arc(s.x - camX, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();

    } else if (s.type === "bladeArc") {
      ctx.translate(s.x - camX, s.y);
      ctx.rotate(s.a);

      let g = ctx.createRadialGradient(0, 0, s.rad*.25, 0, 0, s.rad);
      g.addColorStop(0, "rgba(255,255,255,0)");
      g.addColorStop(.45, s.col);
      g.addColorStop(.75, "rgba(255,255,255,.9)");
      g.addColorStop(1, "rgba(255,255,255,0)");

      ctx.strokeStyle = g;
      ctx.lineWidth = s.width;
      ctx.lineCap = "round";
      ctx.shadowColor = s.col;
      ctx.shadowBlur = 26;

      ctx.beginPath();
      ctx.arc(0, 0, s.rad, -s.sp/2, s.sp/2);
      ctx.stroke();

    } else if (s.type === "bladeArcThin") {
      ctx.translate(s.x - camX, s.y);
      ctx.rotate(s.a);

      ctx.strokeStyle = s.col;
      ctx.lineWidth = s.width;
      ctx.lineCap = "round";
      ctx.shadowColor = "#ffffff";
      ctx.shadowBlur = 18;

      ctx.beginPath();
      ctx.arc(0, 0, s.rad, -s.sp/2, s.sp/2);
      ctx.stroke();

    } else if (s.type === "spark") {
      s.x += s.vx;
      s.y += s.vy;
      s.vx *= .94;
      s.vy *= .94;

      ctx.shadowColor = s.col;
      ctx.shadowBlur = 12;
      ctx.fillStyle = s.col;
      ctx.beginPath();
      ctx.arc(s.x - camX, s.y, s.r, 0, Math.PI*2);
      ctx.fill();

    } else {
      // 原本的扇形攻擊區也保留
      ctx.fillStyle = s.col;
      ctx.beginPath();
      ctx.moveTo(s.x - camX, s.y);
      ctx.arc(s.x - camX, s.y, s.rad, s.a - s.sp / 2, s.a + s.sp / 2);
      ctx.fill();
    }

    ctx.restore();
  });

  ctx.globalAlpha = 1;

  drawItems();

  // 敵人
  es.forEach(e => drawEnemy(ctx, e));

  // 玩家
  if (pData && pData.hp > 0) {
    if (pData.musou) {
      let aura = ctx.createRadialGradient(pData.x - camX, pData.y, 0, pData.x - camX, pData.y, pData.r * 3);
      aura.addColorStop(0, "rgba(255,255,255,.6)");
      aura.addColorStop(.45, "rgba(255,215,0,.3)");
      aura.addColorStop(1, "rgba(255,215,0,0)");
      ctx.fillStyle = aura;
      ctx.beginPath();
      ctx.arc(pData.x - camX, pData.y, pData.r * 3, 0, Math.PI * 2);
      ctx.fill();
    }

    // 受傷無敵閃爍
    if (pData.inv > 0 && Math.floor(pData.inv / 4) % 2 === 0) {
      ctx.globalAlpha = .45;
    }

    drawCharacterArt(ctx, pData.x - camX, pData.y, pData.r, pData.base.color, pData.base.style, true, pData.fx);

    ctx.globalAlpha = 1;

    ctx.fillStyle = "#fff";
    ctx.font = "bold 14px Microsoft JhengHei";
    ctx.textAlign = "center";
    ctx.fillText(pData.name, pData.x - camX, pData.y - pData.r - 40);
  }

  // 傷害文字
  texts.forEach(t => {
    t.y -= 1.5;
    ctx.globalAlpha = t.life / 30;
    ctx.fillStyle = t.c;
    ctx.font = "bold 20px Arial";
    ctx.textAlign = "center";
    ctx.fillText(t.t, t.x - camX, t.y);
  });

  ctx.globalAlpha = 1;

  texts = texts.filter(t => t.life-- > 0);
  slashes = slashes.filter(s => s.life-- > 0);

  ctx.restore();

  drawHUD();
};


/* 卡片立繪也升級：讓卡庫裡的武將比較像人物，不只是色塊 */
drawAllCards = function() {
  document.querySelectorAll("canvas[data-uid]").forEach(cv => {
    let c = state.cards.find(x => x.uid === cv.dataset.uid);
    if (!c) return;

    let ctx2 = cv.getContext("2d");
    cv.width = 220;
    cv.height = 240;

    let g = ctx2.createLinearGradient(0, 0, 220, 240);
    g.addColorStop(0, "#111");
    g.addColorStop(0.45, c.color || "#ffe08a");
    g.addColorStop(1, "#050505");
    ctx2.fillStyle = g;
    ctx2.fillRect(0, 0, 220, 240);

    // 稀有度邊框
    if (c.rarity === 4) {
      ctx2.strokeStyle = "#fff";
      ctx2.lineWidth = 8;
      ctx2.strokeRect(8, 8, 204, 224);

      let aura = ctx2.createRadialGradient(110, 120, 10, 110, 120, 130);
      aura.addColorStop(0, "rgba(255,255,255,.45)");
      aura.addColorStop(1, "rgba(255,255,255,0)");
      ctx2.fillStyle = aura;
      ctx2.fillRect(0, 0, 220, 240);
    } else if (c.rarity === 3) {
      ctx2.strokeStyle = "#ffe08a";
      ctx2.lineWidth = 5;
      ctx2.strokeRect(8, 8, 204, 224);
    } else if (c.rarity === 2) {
      ctx2.strokeStyle = "#bf68ff";
      ctx2.lineWidth = 4;
      ctx2.strokeRect(8, 8, 204, 224);
    } else if (c.rarity === 1) {
      ctx2.strokeStyle = "#4ba3ff";
      ctx2.lineWidth = 4;
      ctx2.strokeRect(8, 8, 204, 224);
    } else {
      ctx2.strokeStyle = "#aaa";
      ctx2.lineWidth = 3;
      ctx2.strokeRect(8, 8, 204, 224);
    }

    // 卡片人物
    let fakeHero = {
      base:c
    };

    let oldP = pData;
    pData = fakeHero;
    drawCharacterArt(ctx2, 110, 170, 65, c.color || "#fff", c.style || "blade", true, 1);
    pData = oldP;

    // 名字
    ctx2.fillStyle = c.rarity === 4 ? "#111" : "#fff";
    ctx2.font = "bold 19px Microsoft JhengHei";
    ctx2.textAlign = "center";
    ctx2.shadowColor = c.rarity === 4 ? "#fff" : "#000";
    ctx2.shadowBlur = 8;
    ctx2.fillText(c.name, 110, 34);

    // 品質
    ctx2.font = "bold 13px Microsoft JhengHei";
    ctx2.fillStyle = c.rarity === 4 ? "#111" : "#ffe08a";
    ctx2.fillText(RN[c.rarity], 110, 218);

    ctx2.shadowBlur = 0;
  });
};

    old_initBattle_goMode(mType, param);

  save();

  difficultyKey = selectedDifficulty;

  mode = { type:"go", param:"圍棋模式" };

  let ult = state.cards.find(x => x.uid === state.team.ult);

  let atkBuff = pet ? (pet.buffA || 0) : 0;
  let defBuff = pet ? (pet.buffD || 0) : 0;

    name:"白棋武將",

    atk:hc.atk + Math.floor(pwr * 0.1) + atkBuff,
    def:hc.def + defBuff,
    spd:5.2 + spdBuff,
    fx:1,
    fy:0,
    cd:0,
    cseq:0,
    ct:0,
    inv:0,
    dodge:0,
    musou:0,
    hitstun:0,
    goPlayer:true
  };

  pData.sys.ult = ult;

  es = [];
  slashes = [];
  texts = [];
  items = [];
  KOs = 0;

  $("timerUI").style.display = "none";

/* 保留你原本 spawnE，圍棋模式改走黑棋生成 */
const old_spawnE_goMode = spawnE;

spawnE = function(init=false, forceBoss=false) {
  if (GO_MODE || mode.type === "go") {
    if (forceBoss) {
      spawnGoBoss();
    } else {
      spawnGoSoldier(init);
    }
    return;
  }

  old_spawnE_goMode(init, forceBoss);
};


/* 保留你原本 updateE，圍棋模式改成無限黑棋小兵＋Boss 不會被一般大將邏輯干擾 */
const old_updateE_goMode = updateE;

updateE = function() {
  if (!GO_MODE && mode.type !== "go") {
    old_updateE_goMode();
    return;
  }

  es.forEach(e => {
    if (e.hp <= 0) return;

    if (e.goBoss) {
      if (!e.phase2 && e.hp < e.maxHp * 0.5) {
        e.phase2 = true;
        e.spd *= 1.25;
        e.atk *= 1.3;
        e.skillCd = 60;
        msg("黑棋 Boss 第二階段！", "#111", "42px");
      }

      if (!e.rage && e.hp < e.maxHp * 0.25) {
        e.rage = true;
        e.spd *= 1.35;
        e.atk *= 1.45;
        e.skillCd = 35;
        msg("黑棋 Boss 狂暴！", "#000", "46px");
      }
    }

    if (e.stun > 0) {
      e.stun--;
      e.x += e.vx;
      e.y += e.vy;
      e.vx *= 0.8;
      e.vy *= 0.8;
      return;
    }

    let dx = pData.x - e.x;
    let dy = pData.y - e.y;
    let dist = Math.hypot(dx, dy);
    let a = Math.atan2(dy, dx);

    if (e.goBoss) {
      e.skillCd--;

      if (e.skillCd <= 0) {
        boom(pData.x, pData.y, e.rage ? 230 : e.phase2 ? 190 : 150, e.atk * 2.2, "#111111");

        for (let i = 0; i < 8; i++) {
          let aa = Math.PI * 2 * i / 8;
          slashes.push({
            x:e.x,
            y:e.y,
            vx:Math.cos(aa) * 5.5,
            vy:Math.sin(aa) * 5.5,
            r:15,
            dmg:e.atk * 1.15,
            type:"projectile",
            col:"#111111",
            life:120,
            max:120
          });
        }

        e.skillCd = e.rage ? 60 : e.phase2 ? 90 : 130;
        msg("黑棋 Boss 放棋壓！", "#111", "38px");
      }
    }

    if (dist > e.r + pData.r) {
      let surroundOffset = Math.sin((battleFrame + e.x) / 28) * 0.45;
      e.x += Math.cos(a + surroundOffset) * e.spd;
      e.y += Math.sin(a + surroundOffset) * e.spd;

    } else if (pData.inv <= 0) {
      pData.hp -= Math.max(1, e.atk - pData.def);
      pData.sys.charge("musou", 4);
      pData.inv = 12;
      screenShake = e.goBoss ? 12 : 6;

      if (e.goBoss) {
        pData.hitstun = 8;
      }
    }
  });

  let old = es.length;

  es = es.filter(e => {
    if (e.hp <= 0) {
      maybeDropItem(e.x, e.y);
      return false;
    }
    return true;
  });

  let killed = old - es.length;

  if (killed) {
    KOs += killed;
    $("ko").textContent = "擊破 " + KOs;
    pData.sys.charge("ultimate", killed * 4);

    let bossAlive = es.some(e => e.goBoss);

    if (!bossAlive) {
      over = 1;

      let rewardCoin = 1000;
      let rewardJade = 250;

      state.coin += rewardCoin;
      state.jade += rewardJade;
      save();
      topbar();

      msg("擊敗黑棋 Boss！", "#ffffff", "46px");
      setTimeout(exitBattle, 2200);
      return;
    }
  }

  while (es.filter(e => e.goSoldier).length < 46) {
    spawnGoSoldier();
  }
};


/* 圍棋人物繪圖：白棋玩家、黑棋 Boss、黑棋小兵 */
function drawGoStoneCharacter(ctx, x, y, r, type="soldier", faceX=1) {
  ctx.save();
  ctx.translate(x, y);
  if (faceX < 0) ctx.scale(-1, 1);

  let isPlayer = type === "player";
  let isBoss = type === "boss";

  ctx.fillStyle = "rgba(0,0,0,.35)";
  ctx.beginPath();
  ctx.ellipse(0, r * 0.95, r * 0.95, r * 0.25, 0, 0, Math.PI * 2);
  ctx.fill();

  if (isPlayer) {
    let aura = ctx.createRadialGradient(0, 0, r * 0.2, 0, 0, r * 2.4);
    aura.addColorStop(0, "rgba(255,255,255,.65)");
    aura.addColorStop(1, "rgba(255,255,255,0)");
    ctx.fillStyle = aura;
    ctx.beginPath();
    ctx.arc(0, 0, r * 2.25, 0, Math.PI * 2);
    ctx.fill();
  }

  if (isBoss) {
    let aura = ctx.createRadialGradient(0, 0, r * 0.3, 0, 0, r * 2.2);
    aura.addColorStop(0, "rgba(0,0,0,.7)");
    aura.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = aura;
    ctx.beginPath();
    ctx.arc(0, 0, r * 2.1, 0, Math.PI * 2);
    ctx.fill();
  }

  let bodyG = ctx.createRadialGradient(-r * .25, -r * .35, r * .1, 0, 0, r);
  if (isPlayer) {
    bodyG.addColorStop(0, "#ffffff");
    bodyG.addColorStop(.55, "#f4f4f4");
    bodyG.addColorStop(1, "#cfcfcf");
  } else {
    bodyG.addColorStop(0, "#555555");
    bodyG.addColorStop(.55, "#1a1a1a");
    bodyG.addColorStop(1, "#000000");
  }

  ctx.fillStyle = bodyG;
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = isPlayer ? "#111" : "#777";
  ctx.lineWidth = Math.max(3, r * 0.08);
  ctx.stroke();

  if (!isPlayer) {
    ctx.fillStyle = "#ffe08a";
    ctx.strokeStyle = "#111";
    ctx.lineWidth = 2;

    ctx.beginPath();
    ctx.moveTo(0, -r * 1.35);
    ctx.lineTo(-r * .22, -r * .75);
    ctx.lineTo(r * .22, -r * .75);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  } else {
    ctx.fillStyle = "#111";
    ctx.beginPath();
    ctx.moveTo(-r * .25, -r * 1.15);
    ctx.lineTo(0, -r * 1.65);
    ctx.lineTo(r * .25, -r * 1.15);
    ctx.closePath();
    ctx.fill();
  }

  ctx.strokeStyle = isPlayer ? "#111" : "#eeeeee";
  ctx.lineWidth = Math.max(3, r * 0.08);
  ctx.lineCap = "round";

  ctx.beginPath();
  ctx.moveTo(-r * .28, -r * .2);
  ctx.lineTo(-r * .08, -r * .42);
  ctx.moveTo(r * .08, -r * .42);
  ctx.lineTo(r * .28, -r * .2);
  ctx.stroke();

  ctx.fillStyle = isPlayer ? "#111" : "#ffffff";
  ctx.beginPath();
  ctx.ellipse(-r * .18, -r * .08, r * .08, r * .16, 0, 0, Math.PI * 2);
  ctx.ellipse(r * .18, -r * .08, r * .08, r * .16, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = isPlayer ? "#111" : "#ffffff";
  ctx.lineWidth = Math.max(2, r * .06);
  ctx.beginPath();

  if (isPlayer) {
    ctx.moveTo(-r * .25, r * .35);
    ctx.quadraticCurveTo(0, r * .52, r * .25, r * .35);
  } else {
    ctx.moveTo(-r * .28, r * .35);
    ctx.lineTo(0, r * .55);
    ctx.lineTo(r * .28, r * .35);
  }

  ctx.stroke();

  ctx.strokeStyle = isPlayer ? "#111" : "#eeeeee";
  ctx.lineWidth = Math.max(4, r * .11);

  ctx.beginPath();
  ctx.moveTo(-r * .72, r * .15);
  ctx.lineTo(-r * 1.25, r * .45);
  ctx.moveTo(r * .72, r * .15);
  ctx.lineTo(r * 1.25, r * .45);
  ctx.stroke();

  ctx.strokeStyle = isPlayer ? "#eeeeee" : "#dddddd";
  ctx.lineWidth = Math.max(4, r * .09);

  ctx.beginPath();
  ctx.moveTo(r * .85, r * .25);
  ctx.lineTo(r * 1.55, -r * .45);
  ctx.stroke();

  ctx.fillStyle = "#ffffff";
  ctx.beginPath();
  ctx.moveTo(r * 1.55, -r * .45);
  ctx.lineTo(r * 1.72, -r * .58);
  ctx.lineTo(r * 1.62, -r * .28);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}


/* 保留原本 drawEnemy，圍棋敵人改畫黑棋 */
const old_drawEnemy_goMode = drawEnemy;

drawEnemy = function(ctx, e) {
  if (GO_MODE || mode.type === "go") {
    if (e.goBoss) {
      drawGoStoneCharacter(ctx, e.x - camX, e.y, e.r, "boss", e.x < pData.x ? 1 : -1);

      ctx.fillStyle = "#111";
      ctx.fillRect(e.x - camX - 70, e.y - e.r - 35, 140, 8);
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(e.x - camX - 70, e.y - e.r - 35, 140 * Math.max(0, e.hp / e.maxHp), 8);

      ctx.fillStyle = "#fff";
      ctx.font = "bold 13px Microsoft JhengHei";
      ctx.textAlign = "center";
      ctx.fillText(e.rage ? "狂暴黑棋 Boss" : e.phase2 ? "二階黑棋 Boss" : "黑棋 Boss", e.x - camX, e.y - e.r - 44);
      return;
    }

    if (e.goSoldier) {
      drawGoStoneCharacter(ctx, e.x - camX, e.y, e.r, "soldier", e.x < pData.x ? 1 : -1);

      ctx.fillStyle = "#111";
      ctx.fillRect(e.x - camX - 28, e.y - e.r - 18, 56, 5);
      ctx.fillStyle = "#f33";
      ctx.fillRect(e.x - camX - 28, e.y - e.r - 18, 56 * Math.max(0, e.hp / e.maxHp), 5);
      return;
    }
  }

  old_drawEnemy_goMode(ctx, e);
};


/* 保留原本 drawCharacterArt，圍棋玩家改畫白棋 */
const old_drawCharacterArt_goMode = drawCharacterArt;

drawCharacterArt = function(ctx, x, y, r, color, style, isHero=false, faceX=1) {
  if ((GO_MODE || mode.type === "go") && isHero) {
    drawGoStoneCharacter(ctx, x, y, r + 6, "player", faceX);
    return;
  }

  old_drawCharacterArt_goMode(ctx, x, y, r, color, style, isHero, faceX);
};


/* 保留原本 draw，再把圍棋模式背景改成棋盤 */
const old_draw_goMode = draw;

draw = function() {
  if (!GO_MODE && mode.type !== "go") {
    old_draw_goMode();
    return;
  }

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!pData) return;

  camX = Math.max(0, Math.min(worldW - canvas.width, pData.x - canvas.width / 2));

  ctx.save();

  if (screenShake > 0) {
    ctx.translate((Math.random() * 2 - 1) * screenShake, (Math.random() * 2 - 1) * screenShake);
    screenShake *= 0.85;
    if (screenShake < 0.5) screenShake = 0;
  }

  let bg = ctx.createLinearGradient(0, 0, 0, canvas.height);
  bg.addColorStop(0, "#d6a85c");
  bg.addColorStop(.5, "#bd8740");
  bg.addColorStop(1, "#8b5b28");
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = "rgba(0,0,0,.38)";
  ctx.lineWidth = 1;

  let grid = 70;

  for (let x = -camX % grid; x < canvas.width; x += grid) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, canvas.height);
    ctx.stroke();
  }

  for (let y = 40; y < canvas.height; y += grid) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(canvas.width, y);
    ctx.stroke();
  }

  ctx.fillStyle = "rgba(0,0,0,.55)";
  for (let gx = -camX % (grid * 4); gx < canvas.width; gx += grid * 4) {
    for (let gy = 110; gy < canvas.height; gy += grid * 4) {
      ctx.beginPath();
      ctx.arc(gx, gy, 5, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  slashes.forEach(s => {
    ctx.save();

    let alpha = Math.max(0, s.life / s.max);
    ctx.globalAlpha = alpha;

    if (s.type === "circle") {
      let grd = ctx.createRadialGradient(s.x - camX, s.y, 0, s.x - camX, s.y, s.rad);
      grd.addColorStop(0, s.col);
      grd.addColorStop(.45, s.col);
      grd.addColorStop(1, "rgba(255,255,255,0)");
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(s.x - camX, s.y, s.rad, 0, Math.PI * 2);
      ctx.fill();

    } else if (s.type === "projectile") {
      ctx.shadowColor = s.col;
      ctx.shadowBlur = 20;
      ctx.fillStyle = s.col;
      ctx.beginPath();
      ctx.arc(s.x - camX, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();

    } else if (s.type === "bladeArc") {
      ctx.translate(s.x - camX, s.y);
      ctx.rotate(s.a);
      ctx.strokeStyle = s.col;
      ctx.lineWidth = s.width;
      ctx.lineCap = "round";
      ctx.shadowColor = s.col;
      ctx.shadowBlur = 26;
      ctx.beginPath();
      ctx.arc(0, 0, s.rad, -s.sp / 2, s.sp / 2);
      ctx.stroke();

    } else if (s.type === "bladeArcThin") {
      ctx.translate(s.x - camX, s.y);
      ctx.rotate(s.a);
      ctx.strokeStyle = s.col;
      ctx.lineWidth = s.width;
      ctx.lineCap = "round";
      ctx.shadowColor = "#ffffff";
      ctx.shadowBlur = 18;
      ctx.beginPath();
      ctx.arc(0, 0, s.rad, -s.sp / 2, s.sp / 2);
      ctx.stroke();

    } else if (s.type === "spark") {
      s.x += s.vx;
      s.y += s.vy;
      s.vx *= .94;
      s.vy *= .94;
      ctx.shadowColor = s.col;
      ctx.shadowBlur = 12;
      ctx.fillStyle = s.col;
      ctx.beginPath();
      ctx.arc(s.x - camX, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();

    } else {
      ctx.fillStyle = s.col;
      ctx.beginPath();
      ctx.moveTo(s.x - camX, s.y);
      ctx.arc(s.x - camX, s.y, s.rad, s.a - s.sp / 2, s.a + s.sp / 2);
      ctx.fill();
    }

    ctx.restore();
  });

  ctx.globalAlpha = 1;

  drawItems();

  es.forEach(e => drawEnemy(ctx, e));

  if (pData && pData.hp > 0) {
    if (pData.musou) {
      let aura = ctx.createRadialGradient(pData.x - camX, pData.y, 0, pData.x - camX, pData.y, pData.r * 3);
      aura.addColorStop(0, "rgba(255,255,255,.7)");
      aura.addColorStop(.45, "rgba(255,255,255,.35)");
      aura.addColorStop(1, "rgba(255,255,255,0)");
      ctx.fillStyle = aura;
      ctx.beginPath();
      ctx.arc(pData.x - camX, pData.y, pData.r * 3, 0, Math.PI * 2);
      ctx.fill();
    }

    if (pData.inv > 0 && Math.floor(pData.inv / 4) % 2 === 0) {
      ctx.globalAlpha = .45;
    }

    drawGoStoneCharacter(ctx, pData.x - camX, pData.y, pData.r + 8, "player", pData.fx);

    ctx.globalAlpha = 1;

    ctx.fillStyle = "#fff";
    ctx.font = "bold 14px Microsoft JhengHei";
    ctx.textAlign = "center";
    ctx.strokeStyle = "#000";
    ctx.lineWidth = 4;
    ctx.strokeText("白棋玩家", pData.x - camX, pData.y - pData.r - 48);
    ctx.fillText("白棋玩家", pData.x - camX, pData.y - pData.r - 48);
  }

  texts.forEach(t => {
    t.y -= 1.5;
    ctx.globalAlpha = t.life / 30;
    ctx.fillStyle = t.c;
    ctx.font = "bold 20px Arial";
    ctx.textAlign = "center";
    ctx.strokeStyle = "#000";
    ctx.lineWidth = 3;
    ctx.strokeText(t.t, t.x - camX, t.y);
    ctx.fillText(t.t, t.x - camX, t.y);
  });

  ctx.globalAlpha = 1;

  texts = texts.filter(t => t.life-- > 0);
  slashes = slashes.filter(s => s.life-- > 0);

  ctx.restore();

  drawHUD();
};


/* 圍棋模式 HUD 顯示 */
const old_drawHUD_goMode = drawHUD;

drawHUD = function() {
  if (!pData) return;

  if (!GO_MODE && mode.type !== "go") {
    old_drawHUD_goMode();
    return;
  }

  let boss = es.find(e => e.goBoss);

  $("hud").innerHTML = `
  <b style="color:#fff">白棋玩家 C${pData.cseq}</b>
  <div class="barrow"><span>HP</span><div class="bar"><div class="fill hp" style="width:${Math.max(0, pData.hp / pData.maxHp * 100)}%"></div></div></div>
  <div class="barrow"><span>特技</span><div class="bar"><div class="fill sk" style="width:${pData.sys.skillEnergy}%"></div></div></div>
  <div class="barrow"><span>絕招</span><div class="bar"><div class="fill ul" style="width:${pData.sys.ultimateEnergy}%"></div></div></div>
  <div class="barrow"><span>無雙</span><div class="bar"><div class="fill ms" style="width:${pData.sys.musouEnergy}%"></div></div></div>
  ${boss ? `<div class="barrow"><span>黑王</span><div class="bar"><div class="fill ms" style="width:${Math.max(0, boss.hp / boss.maxHp * 100)}%"></div></div></div>` : ""}
  <div style="font-size:11px;color:#ccc">圍棋模式｜白棋打黑棋｜小兵數：${es.filter(e => e.goSoldier).length}</div>
  `;
};
</script>
</script>

<script>
const $ = id => document.getElementById(id);

/*
  重要：
  你的那張大圖請存成 sanguo_sprite_sheet.jpg
  並且跟這個 HTML 放在同一個資料夾。
*/
const SHEET = new Image();
SHEET.src = "sanguo_sprite_sheet.jpg";
let sheetReady = false;
SHEET.onload = () => {
  sheetReady = true;
  drawAllPortraits();
};

/*
  這裡就是把「大圖中的角色」加入遊戲。

  sx, sy, sw, sh 的意思：
  sx = 從大圖左邊算起第幾像素開始裁
  sy = 從大圖上方算起第幾像素開始裁
  sw = 裁切寬度
  sh = 裁切高度

  你的原圖是 1536 x 1024。
  下面座標是依照你上傳那張圖的大概位置抓的。
  如果某些角色切到旁邊，可以微調 sx / sy / sw / sh。
*/

const heroes = [

function drawSprite(ctx, obj, dx, dy, dw, dh){
  if(!sheetReady){
    ctx.fillStyle = "#333";
    ctx.fillRect(dx,dy,dw,dh);
    ctx.fillStyle = "#fff";
    ctx.font = "12px Microsoft JhengHei";
    ctx.textAlign = "center";
    ctx.fillText("圖片讀取中", dx+dw/2, dy+dh/2);
    return;
  }
  ctx.drawImage(SHEET, obj.sx, obj.sy, obj.sw, obj.sh, dx, dy, dw, dh);
}

function portrait(c){
  return `<div class="portrait"><canvas data-id="${c.id}"></canvas></div>`;
}

function drawAllPortraits(){
  document.querySelectorAll("canvas[data-id]").forEach(cv=>{
    const c = allCards.find(x=>x.id===cv.dataset.id);
    if(!c) return;

    const ctx = cv.getContext("2d");
    cv.width = 220;
    cv.height = 150;

    ctx.fillStyle = "#080808";
    ctx.fillRect(0,0,220,150);

    ctx.strokeStyle = c.type==="boss" ? "#ff4444" : c.type==="soldier" ? "#4dff85" : "#ffe08a";
    ctx.lineWidth = 4;
    ctx.strokeRect(4,4,212,142);

    const ratio = c.sw / c.sh;
    let h = c.type==="soldier" ? 76 : 126;
    let w = h * ratio;
    if(w > 135){
      w = 135;
      h = w / ratio;
    }

    drawSprite(ctx, c, 110-w/2, 16, w, h);

    ctx.fillStyle = "#fff";
    ctx.font = "bold 18px Microsoft JhengHei";
    ctx.textAlign = "center";
    ctx.shadowColor = "#000";
    ctx.shadowBlur = 5;
    ctx.fillText(c.name,110,140);
    ctx.shadowBlur = 0;
  });
}

/* =========================
   戰鬥系統
========================= */

const canvas = $("game");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

let keys = {};
let touch = {x:0,y:0};
let act = {};
let player = null;
let enemies = [];
let effects = [];
let texts = [];
let loop = null;
let ko = 0;
let bossOut = false;
let gameOver = false;
let camX = 0;
let worldW = 2600;
let frame = 0;

addEventListener("keydown", e=>{
  keys[e.key.toLowerCase()] = true;
  if(e.key === " ") keys.space = true;
  if(e.key === "Escape") exitBattle();
});
addEventListener("keyup", e=>{
  keys[e.key.toLowerCase()] = false;
  if(e.key === " ") keys.space = false;
});

if("ontouchstart" in window || navigator.maxTouchPoints > 0){
  $("mobile").style.display = "block";
}

const joy = $("joy");
const stick = $("stick");
let joyTid = null;
let joyBaseX = 0;
let joyBaseY = 0;

document.addEventListener("touchstart", e=>{
  if(e.target.closest("button") || e.target.closest(".tb")) return;
  for(let t of e.changedTouches){
    if(t.clientX < innerWidth/2 && joyTid === null && player && !gameOver){
      joyTid = t.identifier;
      joyBaseX = t.clientX;
      joyBaseY = t.clientY;
      joy.style.display = "block";
      joy.style.left = (joyBaseX - 75) + "px";
      joy.style.top = (joyBaseY - 75) + "px";
      moveJoy(t);
    }
  }
},{passive:false});

document.addEventListener("touchmove", e=>{
  for(let t of e.changedTouches){
    if(t.identifier === joyTid){
      e.preventDefault();
      moveJoy(t);
    }
  }
},{passive:false});

document.addEventListener("touchend", e=>{
  for(let t of e.changedTouches){
    if(t.identifier === joyTid){
      joyTid = null;
      joy.style.display = "none";
      touch.x = 0;
      touch.y = 0;
      stick.style.transform = "translate(0px,0px)";
    }
  }
});

function moveJoy(t){
  let dx = t.clientX - joyBaseX;
  let dy = t.clientY - joyBaseY;
  let len = Math.hypot(dx,dy);
  let max = 45;
  if(len > max){
    dx = dx / len * max;
    dy = dy / len * max;
  }
  touch.x = dx / max;
  touch.y = dy / max;
  stick.style.transform = `translate(${dx}px,${dy}px)`;
}

[
  ["ta","atk"],
  ["ts","skill"],
  ["tm","musou"],
  ["td","dash"]
].forEach(([id,k])=>{
  $(id).addEventListener("touchstart", e=>{
    e.preventDefault();
    act[k] = true;
  },{passive:false});
  $(id).addEventListener("touchend", e=>{
    e.preventDefault();
    act[k] = false;
  },{passive:false});
});

function initBattle(){

    def: chosen.def,
    spd: 5,
    fx: 1,
    fy: 0,
    cd: 0,
    skill: 0,
    musou: 0,
    inv: 0,
    dash: 0
  };

  enemies = [];
  effects = [];
  texts = [];
  ko = 0;
  bossOut = false;
  gameOver = false;
  frame = 0;

  $("ko").textContent = "擊破 0";
  $("mission").textContent = "擊破 40 隻小兵後 Boss 出現";

function exitBattle(){
  $("wrap").style.display = "none";
  cancelAnimationFrame(loop);
  showMap();
}

function spawnEnemy(init=false, forceBoss=false){
  let card;
  if(forceBoss){
    card = bosses[Math.floor(Math.random()*bosses.length)];
  }else{
    card = soldiers[Math.floor(Math.random()*soldiers.length)];
  }

  let dist = init ? Math.random()*800 + 200 : canvas.width/2 + 120;
  let a = Math.random() * Math.PI * 2;

  let hpScale = forceBoss ? 1 : 1 + frame / 9000;
  let atkScale = forceBoss ? 1 : 1 + frame / 12000;

  enemies.push({
    card,
    isBoss: forceBoss,
    x: Math.max(80, Math.min(worldW-80, player.x + Math.cos(a)*dist)),
    y: Math.max(110, Math.min(canvas.height-100, player.y + Math.sin(a)*dist)),
    r: forceBoss ? 48 : 24,
    hp: card.hp * hpScale,
    maxHp: card.hp * hpScale,
    atk: card.atk * atkScale,
    def: card.def,
    spd: forceBoss ? 2.1 : 1.6 + Math.random()*1.1,
    cd: 0,
    stun: 0,
    vx: 0,
    vy: 0
  });
}

function playerAttack(radius, dmg, color="#ffe08a"){
  effects.push({
    type:"arc",
    x:player.x,
    y:player.y,
    a:Math.atan2(player.fy,player.fx),
    rad:radius,
    sp:Math.PI*1.15,
    color,
    life:12,
    max:12
  });

  enemies.forEach(e=>{
    let dx = e.x - player.x;
    let dy = e.y - player.y;
    let d = Math.hypot(dx,dy);
    if(d < radius + e.r){
      let final = Math.max(1, dmg - e.def);
      e.hp -= final;
      e.stun = 10;
      e.vx = dx / Math.max(1,d) * 8;
      e.vy = dy / Math.max(1,d) * 8;
      addText(e.x,e.y,Math.floor(final),"#fff");
      player.skill = Math.min(100, player.skill + 3);
      player.musou = Math.min(100, player.musou + 2);
    }
  });
}

function updatePlayer(){
  if(!player) return;

  let dx = 0;
  let dy = 0;

  if(keys.w) dy--;
  if(keys.s) dy++;
  if(keys.a) dx--;
  if(keys.d) dx++;

  dx += touch.x;
  dy += touch.y;

  let len = Math.hypot(dx,dy);
  if(len){
    player.fx = dx / len;
    player.fy = dy / len;
    player.x += player.fx * player.spd;
    player.y += player.fy * player.spd;
  }

  if(player.cd <= 0){
    if(keys.j || act.atk){
      player.cd = 12;
      playerAttack(145, player.atk, "#ffe08a");
    }else if((keys.k || act.skill) && player.skill >= 30){
      player.skill -= 30;
      player.cd = 28;
      player.inv = 20;
      playerAttack(260, player.atk * 2.8, "#58b7ff");
      msg(chosen.skill, "#58b7ff", "36px");
    }else if((keys.u || act.musou) && player.musou >= 100){
      player.musou = 0;
      player.cd = 45;
      player.inv = 60;
      playerAttack(450, player.atk * 6, "#ffe35b");
      msg("無雙亂舞！", "#ffe35b", "46px");
    }else if((keys.space || act.dash) && player.dash <= 0){
      player.dash = 35;
      player.inv = 14;
      player.x += player.fx * 120;
      player.y += player.fy * 120;
    }
  }

  player.x = Math.max(40, Math.min(worldW-40, player.x));
  player.y = Math.max(90, Math.min(canvas.height-80, player.y));

  player.cd = Math.max(0, player.cd-1);
  player.inv = Math.max(0, player.inv-1);
  player.dash = Math.max(0, player.dash-1);
}

function updateEnemies(){
  enemies.forEach(e=>{
    if(e.hp <= 0) return;

    if(e.stun > 0){
      e.stun--;
      e.x += e.vx;
      e.y += e.vy;
      e.vx *= 0.82;
      e.vy *= 0.82;
      return;
    }

    let dx = player.x - e.x;
    let dy = player.y - e.y;
    let d = Math.hypot(dx,dy);
    let a = Math.atan2(dy,dx);

    if(d > e.r + player.r){
      e.x += Math.cos(a) * e.spd;
      e.y += Math.sin(a) * e.spd;
    }else if(player.inv <= 0){
      let hurt = Math.max(1, e.atk - player.def);
      player.hp -= hurt;
      player.inv = 18;
      addText(player.x,player.y,Math.floor(hurt),"#ff4444");
    }
  });

  let old = enemies.length;
  enemies = enemies.filter(e=>e.hp > 0);
  let killed = old - enemies.length;

  if(killed){
    ko += killed;
    $("ko").textContent = "擊破 " + ko;

    if(ko >= 40 && !bossOut){
      bossOut = true;
      spawnEnemy(false,true);
      $("mission").textContent = "Boss 已出現，擊敗 Boss！";
      msg("Boss 出現！", "#ff4444", "48px");
    }

    if(bossOut && !enemies.some(e=>e.isBoss)){
      gameOver = true;
      coin += 500;
      topbar();
      msg("勝利！獲得 500 金錢", "#4dff85", "42px");
      setTimeout(exitBattle,2000);
    }
  }

  let target = bossOut ? 18 : 28;
  while(enemies.length < target){
    spawnEnemy(false,false);
  }
}

function updateEffects(){
  effects = effects.filter(e=>e.life-- > 0);
  texts.forEach(t=>{t.y-=1.3;t.life--;});
  texts = texts.filter(t=>t.life > 0);
}

function drawGameSprite(obj,x,y,r,isBoss=false){
  const ratio = obj.sw / obj.sh;
  let h = isBoss ? r*2.6 : r*2.3;
  let w = h * ratio;
  drawSprite(ctx, obj, x-w/2, y-h/2, w, h);
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(!player) return;

  camX = Math.max(0, Math.min(worldW-canvas.width, player.x - canvas.width/2));

  let bg = ctx.createLinearGradient(0,0,0,canvas.height);
  bg.addColorStop(0,"#26180d");
  bg.addColorStop(0.6,"#1e1308");
  bg.addColorStop(1,"#080402");
  ctx.fillStyle = bg;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.strokeStyle = "rgba(255,255,255,0.05)";
  for(let i=-camX%100;i<canvas.width;i+=100){
    ctx.beginPath();
    ctx.moveTo(i,0);
    ctx.lineTo(i,canvas.height);
    ctx.stroke();
  }

  effects.forEach(e=>{
    ctx.save();
    ctx.globalAlpha = e.life / e.max;
    if(e.type === "arc"){
      ctx.translate(e.x-camX,e.y);
      ctx.rotate(e.a);
      ctx.strokeStyle = e.color;
      ctx.lineWidth = 28;
      ctx.lineCap = "round";
      ctx.shadowColor = e.color;
      ctx.shadowBlur = 20;
      ctx.beginPath();
      ctx.arc(0,0,e.rad,-e.sp/2,e.sp/2);
      ctx.stroke();
    }
    ctx.restore();
  });

  enemies.forEach(e=>{
    let sx = e.x - camX;

    ctx.fillStyle = "rgba(0,0,0,.35)";
    ctx.beginPath();
    ctx.ellipse(sx,e.y+e.r*0.75,e.r*0.8,e.r*0.22,0,0,Math.PI*2);
    ctx.fill();

    drawGameSprite(e.card, sx, e.y, e.r, e.isBoss);

    let bw = e.isBoss ? 100 : 48;
    ctx.fillStyle = "#111";
    ctx.fillRect(sx-bw/2,e.y-e.r-22,bw,6);
    ctx.fillStyle = e.isBoss ? "#ff4444" : "#f33";
    ctx.fillRect(sx-bw/2,e.y-e.r-22,bw*Math.max(0,e.hp/e.maxHp),6);

    ctx.fillStyle = "#fff";
    ctx.font = "bold 11px Microsoft JhengHei";
    ctx.textAlign = "center";
    ctx.fillText(e.card.name, sx, e.y-e.r-30);
  });

  ctx.fillStyle = "rgba(0,0,0,.35)";
  ctx.beginPath();
  ctx.ellipse(player.x-camX,player.y+player.r*0.75,player.r*0.8,player.r*0.22,0,0,Math.PI*2);
  ctx.fill();

  if(player.inv > 0 && Math.floor(player.inv/4)%2===0){
    ctx.globalAlpha = .45;
  }
  drawGameSprite(player.card, player.x-camX, player.y, player.r, false);
  ctx.globalAlpha = 1;

  ctx.fillStyle = "#fff";
  ctx.font = "bold 14px Microsoft JhengHei";
  ctx.textAlign = "center";
  ctx.fillText(player.card.name, player.x-camX, player.y-player.r-36);

  texts.forEach(t=>{
    ctx.globalAlpha = t.life/35;
    ctx.fillStyle = t.c;
    ctx.font = "bold 20px Arial";
    ctx.textAlign = "center";
    ctx.fillText(t.t,t.x-camX,t.y);
  });
  ctx.globalAlpha = 1;

  drawHUD();
}

function drawHUD(){
  if(!player) return;

  $("hud").innerHTML = `
  <b style="color:#ffe08a">${player.card.name}</b>
  <div class="barrow"><span>HP</span><div class="bar"><div class="fill hp" style="width:${Math.max(0,player.hp/player.maxHp*100)}%"></div></div></div>
  <div class="barrow"><span>絕招</span><div class="bar"><div class="fill sk" style="width:${player.skill}%"></div></div></div>
  <div class="barrow"><span>無雙</span><div class="bar"><div class="fill ms" style="width:${player.musou}%"></div></div></div>
  <div style="font-size:11px;color:#aaa">WASD移動｜J攻擊｜K絕招｜U無雙｜空白閃避</div>
  `;
}

function battleLoop(){
  if(!gameOver && player){
    frame++;

    if(player.hp <= 0){
      gameOver = true;
      msg("敗退...", "#ff4444", "42px");
      setTimeout(exitBattle,1600);
    }

    updatePlayer();
    updateEnemies();
    updateEffects();
  }

  draw();
  loop = requestAnimationFrame(battleLoop);
}

window.onload = ()=>{
  topbar();
  showBag();
};
</script>
