<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>三國志 Web v21.0：大回歸版</title>
    <style>
        :root { --gold: #f1c40f; --bg: #0d0d0d; --panel: #1e272e; --ink: #2f3542; --pk: #8e44ad; }
        body { font-family: "Noto Serif TC", "Microsoft JhengHei", serif; background: var(--bg); color: #dff9fb; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* 彈窗系統 */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .modal { background: var(--panel); padding: 30px; border: 2px solid var(--gold); border-radius: 8px; width: 750px; max-height: 85vh; overflow-y: auto; box-shadow: 0 0 30px rgba(0,0,0,0.8); }
        .modal h2 { color: var(--gold); text-align: center; border-bottom: 1px solid #555; padding-bottom: 10px; }
        
        /* 多勢力選擇卡 */
        .fac-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin: 20px 0; }
        .fac-card { background: #2c3e50; padding: 12px; border-radius: 6px; text-align: center; border: 2px solid transparent; cursor: pointer; transition: 0.2s; }
        .fac-card:hover { filter: brightness(1.2); transform: scale(1.05); }
        .fac-card.active { border-color: var(--gold); background: #34495e; box-shadow: 0 0 15px var(--gold); }

        .header { background: var(--ink); padding: 8px 20px; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .resource-bar { display: flex; gap: 15px; font-size: 13px; align-items: center; }
        .res-item b { color: var(--gold); }

        .game-main { display: flex; flex-grow: 1; overflow: hidden; }
        .map-container { flex-grow: 1; overflow: auto; background: #111; padding: 20px; position: relative; }
        .grid { display: grid; grid-template-columns: repeat(30, 60px); grid-template-rows: repeat(30, 60px); gap: 1px; background: #444; }
        
        /* 地形樣式 */
        .cell { width: 60px; height: 60px; background: #2f3640; display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; }
        .cell.plain { background: #353b48; }
        .cell.forest { background: #1b3022; color: #2ecc71; }
        .cell.marsh { background: #212121; border: 1px inset #3498db; }
        .cell.city { background: #4b6584; border: 2px solid var(--gold); box-sizing: border-box; }
        .cell.in-range { background: rgba(241, 196, 15, 0.3) !important; }

        /* 部隊與建築圖示 */
        .unit { width: 50px; height: 50px; border-radius: 4px; border: 2px solid #fff; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; position: relative; }
        .unit.act-done { filter: grayscale(1) opacity(0.5); }
        .unit.confused { animation: shake 0.2s infinite; filter: hue-rotate(90deg); }
        .unit.selected { border-color: var(--gold); box-shadow: 0 0 15px var(--gold); z-index: 20; }
        .unit-hp { position: absolute; bottom: 0; width: 100%; height: 4px; background: #000; }
        .unit-hp-fill { height: 100%; background: #2ecc71; }
        
        .bldg-icon { font-size: 24px; position: relative; z-index: 5; }
        .bldg-lvl { position: absolute; bottom: -5px; right: -5px; background: #e74c3c; color: white; border-radius: 50%; width: 16px; height: 16px; font-size: 10px; display: flex; align-items: center; justify-content: center; border: 1px solid white; }

        .sidebar { width: 340px; background: var(--panel); border-left: 2px solid var(--gold); display: flex; flex-direction: column; }
        .menu-box { padding: 15px; flex-grow: 1; display: none; }
        .log { height: 220px; background: #000; padding: 10px; font-size: 12px; color: #1dd1a1; overflow-y: auto; border-top: 2px solid #444; line-height: 1.5; }
        
        button { background: #485460; color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; font-weight: bold; margin: 2px; font-size: 13px; }
        button:hover { brightness(1.2); }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        button.primary { background: #27ae60; }
        button.pk-btn { background: var(--pk); }
        button.fire-btn { background: #e67e22; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        
        .dmg-text { position: absolute; color: #ff4757; font-weight: bold; font-size: 22px; text-shadow: 2px 2px #000; pointer-events: none; animation: floatUp 1s forwards; z-index: 1000; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-40px); } }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -1px); } 100% { transform: translate(1px, 1px); } }
    </style>
</head>
<body>

<div id="setupOverlay" class="overlay">
    <div class="modal">
        <h2>📜 三國志 Web：全功能大回歸版</h2>
        <p style="text-align:center;">選擇你的開局勢力，各勢力武將已全數歸位</p>
        <div class="fac-grid" id="facList">
            <div class="fac-card active" onclick="selectFac(this, 'shu')"><b>蜀漢</b><br><small>劉/關/張/諸葛</small></div>
            <div class="fac-card" onclick="selectFac(this, 'wei')"><b>曹魏</b><br><small>曹/夏/遼/司馬</small></div>
            <div class="fac-card" onclick="selectFac(this, 'wu')"><b>東吳</b><br><small>孫/周/陸/甘</small></div>
            <div class="fac-card" onclick="selectFac(this, 'lu')"><b>呂布</b><br><small>呂/玲綺/高順/宮</small></div>
            <div class="fac-card" onclick="selectFac(this, 'yuan')"><b>袁紹</b><br><small>袁/顏/文/田</small></div>
        </div>
        <button class="primary" style="width:100%; height:50px; font-size:18px;" onclick="initGame()">天下布武 (進入遊戲)</button>
    </div>
</div>

<div class="header">
    <div id="uiFac" style="padding:4px 12px; border-radius:4px; font-weight:bold;">等待中</div>
    <div class="resource-bar">
        <div class="res-item">📅 第 <b id="uiTurn">1</b> 旬</div>
        <div class="res-item">💰 金 <b id="uiGold">0</b></div>
        <div class="res-item">🌾 糧 <b id="uiFood">0</b></div>
        <div class="res-item">⚡ AP <b id="uiAP">0</b></div>
        <div class="res-item">🧪 技巧 <b id="uiTech">0</b></div>
    </div>
    <button class="primary" onclick="endTurn()">⏳ 結束回合</button>
</div>

<div class="game-main">
    <div class="map-container"><div id="map" class="grid"></div></div>
    <div class="sidebar">
        <div id="menu" class="menu-box">
            <h3 id="mTitle" style="margin:0 0 5px 0; color:var(--gold);"></h3>
            <div id="mInfo" style="font-size:12px; margin-bottom:12px; color:#bdc3c7;"></div>
            
            <div id="unitCmd" style="display:none;">
                <div class="btn-grid">
                    <button style="background:#c0392b;" onclick="doAtk()">⚔️ 攻擊</button>
                    <button class="fire-btn" onclick="showSub('tactics')">🔥 戰法</button>
                    <button style="background:#8e44ad;" onclick="showSub('plots')">🌀 計謀</button>
                    <button onclick="unitWait()">⌛ 待命</button>
                    <button class="pk-btn" style="grid-column: span 2;" onclick="showSub('build')">🏗️ 建設 / 吸收合併</button>
                    <button id="detonateBtn" class="fire-btn" style="grid-column: span 2; display:none;" onclick="detonateFire()">💥 引爆火種</button>
                </div>
            </div>

            <div id="cityCmd" style="display:none;">
                <div class="btn-grid">
                    <button onclick="showSub('draft')">📯 徵兵</button>
                    <button class="pk-btn" onclick="showSub('tech')">🧪 技巧研究</button>
                </div>
                <div style="margin-top:15px; color:var(--gold); font-size:12px;">城內預備兵出陣 (需 10 AP)：</div>
                <div id="heroList" style="border:1px solid #444; background:#000; max-height:150px; overflow-y:auto; margin-top:5px;"></div>
            </div>
            <div id="subMenu" class="btn-grid" style="margin-top:15px; border-top:1px dashed #7f8c8d; padding-top:10px; display:none;"></div>
        </div>
        <div class="log" id="logBox">> 系統重啟，所有功能已強制加回。</div>
    </div>
</div>

<script>
    // 1. 擴充武將庫
    const HEROES = {
        '劉備': {a:80, i:90, sk:'魅力'}, '關羽': {a:98, i:82, sk:'神將'}, '張飛': {a:97, i:32, sk:'鬥神'}, '諸葛亮': {a:35, i:100, sk:'神算'},
        '曹操': {a:75, i:94, sk:'虛實'}, '夏侯惇': {a:92, i:70, sk:'騎將'}, '張遼': {a:94, i:85, sk:'威風'}, '司馬懿': {a:65, i:98, sk:'深謀'},
        '孫權': {a:70, i:88, sk:'指導'}, '周瑜': {a:72, i:96, sk:'火神'}, '陸遜': {a:68, i:95, sk:'極火'}, '甘寧': {a:95, i:60, sk:'威風'},
        '呂布': {a:100, i:20, sk:'飛將'}, '陳宮': {a:50, i:92, sk:'百出'}, '高順': {a:90, i:65, sk:'攻城'}, '呂玲綺': {a:88, i:55, sk:'疾馳'},
        '袁紹': {a:78, i:75, sk:'名聲'}, '顏良': {a:94, i:40, sk:'猛者'}, '文醜': {a:93, i:35, sk:'猛者'}, '田豐': {a:45, i:93, sk:'剛膽'}
    };

    const UNIT_TYPES = {
        '槍': { tactics: ['突刺 (20氣)', '槍陣 (30氣)'] },
        '騎': { tactics: ['突擊 (25氣)', '突破 (35氣)'] },
        '弓': { tactics: ['火矢 (20氣)', '亂射 (40氣)'] },
        '智': { tactics: ['伏兵 (30氣)'] }
    };

    let GS = null;
    let sel = null;
    let selFacId = 'shu';

    function selectFac(el, id) {
        document.querySelectorAll('.fac-card').forEach(c => c.classList.remove('active'));
        el.classList.add('active'); selFacId = id;
    }

    function initGame() {
        document.getElementById('setupOverlay').style.display = 'none';
        const facConfigs = [
            { id:'shu', n:'蜀漢', c:'#e74c3c', x:5, y:25, h:["劉備","關羽","張飛","諸葛亮"] },
            { id:'wei', n:'曹魏', c:'#3498db', x:15, y:5, h:["曹操","夏侯惇","張遼","司馬懿"] },
            { id:'wu', n:'東吳', c:'#2ecc71', x:25, y:22, h:["孫權","周瑜","陸遜","甘寧"] },
            { id:'lu', n:'呂布', c:'#f1c40f', x:10, y:12, h:["呂布","陳宮","高順","呂玲綺"] },
            { id:'yuan', n:'袁紹', c:'#95a5a6', x:20, y:8, h:["袁紹","顏良","文醜","田豐"] }
        ];

        GS = {
            t: 1, idx: facConfigs.findIndex(f => f.id === selFacId),
            facs: facConfigs.map(f => ({ ...f, gold:3000, food:10000, ap:60, tp:0, tech:{} })),
            cities: [], units: [], bldgs: [],
            terrain: Array.from({length:30}, () => Array.from({length:30}, () => {
                const r = Math.random();
                if(r > 0.95) return 'marsh';
                if(r > 0.85) return 'forest';
                return 'plain';
            }))
        };

        GS.facs.forEach(f => {
            GS.cities.push({ x:f.x, y:f.y, f:f.id, n:f.n[0]+"城", tr:8000 }); // 8000 預備兵
            f.h.forEach((h, i) => {
                GS.units.push({ id:GS.units.length, n:h, f:f.id, t:['槍','騎','弓','智'][i%4], x:0, y:0, tr:0, s:100, isD:false, act:false, conf:false });
            });
        });
        log("全勢力部署完畢，預備兵、箭樓、火種系統加載完成。");
        updateUI(); draw();
    }

    function draw() {
        if(!GS) return;
        const map = document.getElementById('map'); map.innerHTML = '';
        for(let y=0; y<30; y++) {
            for(let x=0; x<30; x++) {
                const cell = document.createElement('div');
                cell.className = `cell ${GS.terrain[y][x]}`;
                const city = GS.cities.find(c => c.x===x && c.y===y);
                const bldg = GS.bldgs.find(b => b.x===x && b.y===y);
                const unit = GS.units.find(u => u.x===x && u.y===y && u.isD);

                if(city) { cell.classList.add('city'); cell.innerHTML = `<small style="background:${GS.facs.find(fa=>fa.id===city.f).c}">${city.n}</small>`; }
                if(bldg) { cell.innerHTML += `<span class="bldg-icon">${bldg.i}<div class="bldg-lvl">${bldg.lvl}</div></span>`; }
                if(sel && !sel.act && (Math.abs(x-sel.x)+Math.abs(y-sel.y) <= (sel.t==='騎'?3:2))) cell.classList.add('in-range');

                if(unit) {
                    const ue = document.createElement('div');
                    ue.className = `unit ${sel===unit?'selected':''} ${unit.act?'act-done':''} ${unit.conf?'confused':''}`;
                    ue.style.backgroundColor = GS.facs.find(fa=>fa.id===unit.f).c;
                    ue.innerHTML = `<span>${unit.n[0]}</span><div class="unit-hp"><div class="unit-hp-fill" style="width:${(unit.tr/5000)*100}%"></div></div>`;
                    cell.appendChild(ue);
                }
                cell.onclick = () => handleClick(x,y);
                map.appendChild(cell);
            }
        }
    }

    function handleClick(x,y) {
        const f = GS.facs[GS.idx];
        const unit = GS.units.find(u => u.x===x && u.y===y && u.isD);
        const city = GS.cities.find(c => c.x===x && c.y===y);

        if(unit && unit.f === f.id && !unit.act) { sel = unit; showUnit(unit); draw(); return; }

        if(sel && !sel.act) {
            const dist = Math.abs(x-sel.x) + Math.abs(y-sel.y);
            const cost = GS.terrain[y][x] === 'marsh' ? 2 : 1;
            if(dist > 0 && dist <= (sel.t==='騎'?3:2) && !unit) {
                if(f.ap < 5) return log("AP不足！", "#e74c3c");
                f.ap -= 5; sel.x = x; sel.y = y;
                if(city && city.f !== sel.f) { city.f = sel.f; log(`🏰 ${sel.n} 攻佔了 ${city.n}！`); }
                showUnit(sel); draw(); updateUI(); return;
            }
        }
        if(city && city.f === f.id) { sel = null; showCity(city); draw(); return; }
        sel = null; document.getElementById('menu').style.display='none'; draw();
    }

    function showUnit(u) {
        const data = HEROES[u.n];
        document.getElementById('menu').style.display = 'block';
        document.getElementById('mTitle').innerText = `🚩 ${u.n} (${u.t}兵)`;
        document.getElementById('mInfo').innerText = `兵力: ${u.tr} | 氣力: ${u.s} | 武:${data.a} 智:${data.i} | 特技:${data.sk}`;
        document.getElementById('unitCmd').style.display = 'block'; 
        document.getElementById('cityCmd').style.display = 'none';
        document.getElementById('subMenu').style.display = 'none';
        // 檢查火種
        const b = GS.bldgs.find(b => b.x===u.x && b.y===u.y && b.n==='火種');
        document.getElementById('detonateBtn').style.display = b ? 'block' : 'none';
    }

    function showCity(c) {
        document.getElementById('menu').style.display = 'block';
        document.getElementById('mTitle').innerText = `🏰 ${c.n}`;
        document.getElementById('mInfo').innerText = `預備兵: ${c.tr}`;
        document.getElementById('unitCmd').style.display = 'none'; document.getElementById('cityCmd').style.display = 'block';
        document.getElementById('subMenu').style.display = 'none';
        const hList = document.getElementById('heroList'); hList.innerHTML = '';
        GS.units.filter(u => u.f === c.f && !u.isD).forEach(u => {
            hList.innerHTML += `<div style="padding:8px; border-bottom:1px solid #333; cursor:pointer;" onclick="deploy(${u.id}, ${c.x}, ${c.y})">➤ ${u.n} [${u.t}] (武:${HEROES[u.n].a})</div>`;
        });
    }

    function showSub(type) {
        const sub = document.getElementById('subMenu'); sub.style.display = 'grid'; sub.innerHTML = '';
        if(type === 'build') {
            const ext = GS.bldgs.find(b => b.x === sel.x && b.y === sel.y);
            if(ext && ext.lvl < 3 && ['市場','農場'].includes(ext.n)) {
                sub.innerHTML = `<button class="pk-btn" style="grid-column:span 2;" onclick="upgradeBldg()">✨ 吸收合併 (升級 Lv${ext.lvl+1})<br>300金 / 15AP</button>`;
            } else {
                [
                    {n:'市場', i:'💰', g:300, a:10}, {n:'農場', i:'🌾', g:300, a:10},
                    {n:'箭樓', i:'🏹', g:500, a:15}, {n:'投石台', i:'☄️', g:800, a:20},
                    {n:'火種', i:'💣', g:200, a:10}
                ].forEach(b => {
                    sub.innerHTML += `<button onclick="buildBldg('${b.n}','${b.i}',${b.g},${b.a})">建${b.n}<br>${b.a}AP</button>`;
                });
            }
        } else if(type === 'tactics') {
            UNIT_TYPES[sel.t].tactics.forEach(t => {
                const cost = parseInt(t.match(/\d+/)[0]);
                sub.innerHTML += `<button class="fire-btn" ${sel.s < cost ? 'disabled' : ''} onclick="execTactic('${t}', ${cost})">${t}</button>`;
            });
        } else if(type === 'plots') {
            ['🔥火計 (15AP)', '🌀偽報 (20AP)'].forEach(p => {
                const cost = parseInt(p.match(/\d+/)[0]);
                sub.innerHTML += `<button style="background:#8e44ad;" onclick="execPlot('${p.split('(')[0]}', ${cost})">${p}</button>`;
            });
        } else if(type === 'draft') {
            sub.innerHTML = `<button onclick="draft()" style="grid-column:span 2; background:#2980b9;">招募 2000 預備兵<br>(300金, 20AP)</button>`;
        }
    }

    function deploy(id, x, y) {
        const f = GS.facs[GS.idx]; const c = GS.cities.find(ci => ci.x===x && ci.y===y);
        if(f.ap < 10) return log("AP不足！", "#e74c3c");
        if(c.tr < 3000) return log("預備兵不足 3000，無法出陣！", "#e74c3c");
        const u = GS.units.find(u => u.id === id);
        f.ap -= 10; c.tr -= 3000; u.x = x; u.y = y; u.tr = 3000; u.isD = true; u.act = true;
        log(`🚩 ${u.n} 帶領 3000 兵馬從 ${c.n} 出陣！`); draw(); updateUI(); showCity(c);
    }

    function buildBldg(n, i, g, ap) {
        const f = GS.facs[GS.idx]; if(f.gold < g || f.ap < ap) return log("資源不足！", "#e74c3c");
        f.gold -= g; f.ap -= ap; GS.bldgs.push({ x:sel.x, y:sel.y, n, i, f:f.id, lvl:1 });
        log(`🏗️ ${sel.n} 在此建設了 ${n}。`); unitWait();
    }
    
    function upgradeBldg() {
        const f = GS.facs[GS.idx]; const b = GS.bldgs.find(b => b.x === sel.x && b.y === sel.y);
        f.gold -= 300; f.ap -= 15; b.lvl++; log(`✨ 吸收合併成功！${b.n} 升級至 Lv${b.lvl}！`); unitWait();
    }

    function detonateFire() {
        const bIdx = GS.bldgs.findIndex(b => b.x===sel.x && b.y===sel.y && b.n==='火種');
        GS.bldgs.splice(bIdx, 1);
        log(`💥 ${sel.n} 引爆了腳下的火種！`, "#e67e22");
        GS.units.filter(u => u.isD && Math.abs(u.x-sel.x)+Math.abs(u.y-sel.y) <= 1).forEach(u => {
            u.tr -= 1000; showDmg(u.x, u.y, "-1000"); log(`${u.n} 受到爆炸波及！`);
        });
        unitWait();
    }

    function doAtk() { 
        const tar = GS.units.find(u => u.f !== sel.f && u.isD && Math.abs(u.x-sel.x)+Math.abs(u.y-sel.y) === 1);
        if(!tar) return log("範圍內無敵軍。");
        const dmg = Math.floor(HEROES[sel.n].a * (sel.tr/500));
        tar.tr -= dmg; showDmg(tar.x, tar.y, `-${dmg}`);
        log(`⚔️ ${sel.n} 攻擊 ${tar.n}，造成 ${dmg} 傷害。`);
        if(tar.tr <= 0) { tar.isD = false; log(`💀 ${tar.n} 潰敗！`); }
        unitWait();
    }

    function execTactic(name, cost) {
        sel.s -= cost; log(`🔥 ${sel.n} 發動戰法：${name}！`);
        const tar = GS.units.find(u => u.f !== sel.f && u.isD && Math.abs(u.x-sel.x)+Math.abs(u.y-sel.y) === 1);
        if(tar) {
            let dmg = Math.floor(HEROES[sel.n].a * (sel.tr/400) * 1.5);
            tar.tr -= dmg; showDmg(tar.x, tar.y, `CRIT -${dmg}`);
        }
        unitWait();
    }

    function draft() {
        const f = GS.facs[GS.idx]; const c = GS.cities.find(c => c.f === f.id);
        if(f.gold < 300 || f.ap < 20) return log("資源不足！");
        f.gold -= 300; f.ap -= 20; c.tr += 2000; log(`📯 ${c.n} 招募了 2000 名預備兵。`);
        updateUI(); showCity(c);
    }

    function showDmg(x, y, txt) {
        const d = document.createElement('div'); d.className = 'dmg-text'; d.innerText = txt;
        d.style.left = (x*61+10)+'px'; d.style.top = (y*61+10)+'px';
        document.getElementById('map').appendChild(d); setTimeout(() => d.remove(), 1000);
    }

    function unitWait() { if(sel) sel.act = true; sel = null; document.getElementById('menu').style.display='none'; draw(); }

    function endTurn() {
        GS.idx = (GS.idx + 1) % GS.facs.length;
        if(GS.idx === 0) {
            GS.t++; 
            GS.facs.forEach(f => {
                f.ap = 60;
                GS.cities.filter(c => c.f===f.id).forEach(c => { f.gold += 500; f.food += 2000; });
                GS.bldgs.filter(b => b.f===f.id).forEach(b => {
                    if(b.n === '市場') f.gold += 300 * b.lvl;
                    if(b.n === '農場') f.food += 1000 * b.lvl;
                    // 箭樓自動攻擊
                    if(b.n === '箭樓') {
                        const tar = GS.units.find(u => u.f !== f.id && u.isD && Math.abs(u.x-b.x)+Math.abs(u.y-b.y) <= 1);
                        if(tar) { tar.tr -= 300; log(`🏹 箭樓自動射擊 ${tar.n}！`); showDmg(tar.x, tar.y, "-300"); }
                    }
                });
            });
            log(`--- 第 ${GS.t} 旬 ---`);
        }
        GS.units.filter(u => u.f === GS.facs[GS.idx].id).forEach(u => u.act = false);
        updateUI(); draw();
    }

    function updateUI() {
        const f = GS.facs[GS.idx];
        const ui = document.getElementById('uiFac'); ui.innerText = f.n + " 回合"; ui.style.background = f.c;
        document.getElementById('uiTurn').innerText = GS.t;
        document.getElementById('uiGold').innerText = f.gold;
        document.getElementById('uiFood').innerText = f.food;
        document.getElementById('uiAP').innerText = f.ap;
        document.getElementById('uiTech').innerText = f.tp;
    }

    function log(m, c="#1dd1a1") {
        const b = document.getElementById('logBox'); b.innerHTML += `<br><span style="color:${c}">> ${m}</span>`;
        b.scrollTop = b.scrollHeight;
    }
</script>
</body>
</html>
