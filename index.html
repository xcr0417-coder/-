<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>三國志 Web 策略版</title>
<style>
body{margin:0;background:#111;color:#fff;font-family:Microsoft JhengHei,Arial}
button{padding:8px;margin:4px;background:#2b2b2b;color:white;border:1px solid #d4af37;cursor:pointer}
button:hover{background:#444}
#titleScreen{position:fixed;inset:0;background:linear-gradient(#050505,#1b1304);z-index:99;display:flex;flex-direction:column;align-items:center;justify-content:center}
h1{color:#d4af37;font-size:46px}
.topbar{padding:10px;background:#151515;border-bottom:2px solid #d4af37;display:flex;gap:14px;flex-wrap:wrap}
.layout{display:flex;height:calc(100vh - 48px)}
.panel{width:300px;background:#1b1b1b;padding:10px;overflow:auto;border-right:1px solid #604b16}
.right{border-left:1px solid #604b16;border-right:0}
.mapWrap{flex:1;padding:10px;overflow:auto;background:#111}
.grid{display:grid;grid-template-columns:repeat(14,70px);gap:4px}
.cell{width:70px;height:70px;border:1px solid #333;border-radius:6px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:12px;cursor:pointer;position:relative}
.city{box-shadow:0 0 0 2px #d4af37 inset}
.unit{font-weight:bold;text-shadow:1px 1px #000}
.selected{outline:3px solid #fff}
.hero,.card{background:#242424;border:1px solid #555;border-radius:6px;margin:6px 0;padding:8px}
.log{height:190px;background:#000;margin-top:10px;padding:8px;overflow:auto;border:1px solid #444}
.plain{background:#3c8f3c}
.forest{background:#17633a}
.mountain{background:#6b6254}
.river{background:#226caa}
.road{background:#9b7b3b}
.desert{background:#b38b3c}
.cityName{color:#ffe082;font-weight:bold}
.small{font-size:12px;color:#ccc}
</style>
</head>

<body>

<div id="titleScreen">
<h1>三國志 Web 策略版</h1>
<div id="factionSelect"></div>
</div>

<div class="topbar">
回合:<span id="turn">1</span>
年份:<span id="year">184</span>
玩家:<span id="playerFaction">未選</span>
金:<span id="gold">3000</span>
糧:<span id="food">10000</span>
名聲:<span id="rep">50</span>
模式:<span id="mode">idle</span>
</div>

<div class="layout">
<div class="panel">
<h3>我方武將</h3>
<div id="heroList"></div>
<button onclick="recruitTroops()">徵兵</button>
<button onclick="trainTroops()">訓練</button>
<button onclick="developCity()">開發城池</button>
<button onclick="searchHero()">探索登用</button>
<button onclick="saveGame()">存檔</button>
<button onclick="loadGame()">讀檔</button>
<button onclick="endTurn()">結束回合</button>
</div>

<div class="mapWrap">
<h3>天下地圖</h3>
<div id="map" class="grid"></div>
<div id="log" class="log"></div>
</div>

<div class="panel right">
<h3>操作</h3>
<div id="unitDetail" class="card">未選擇部隊</div>
<div id="cityPanel" class="card">未選擇城池</div>
<button onclick="setMode('move')">移動</button>
<button onclick="setMode('attack')">攻擊</button>
<button onclick="setMode('strategy')">計略</button>
<button onclick="setMode('siege')">攻城</button>
<button onclick="triggerEvent()">劇情事件</button>
</div>
</div>

<script>
const FACTIONS=[
{name:'曹操',color:'#3f7cff',capital:'許昌'},
{name:'劉備',color:'#2ecc71',capital:'成都'},
{name:'孫權',color:'#ff4b4b',capital:'建業'},
{name:'袁紹',color:'#c084fc',capital:'鄴'},
{name:'馬騰',color:'#f59e0b',capital:'武威'},
{name:'劉表',color:'#22d3ee',capital:'襄陽'},
{name:'劉璋',color:'#84cc16',capital:'江州'},
{name:'公孫瓚',color:'#93c5fd',capital:'北平'},
{name:'呂布',color:'#ef4444',capital:'小沛'},
{name:'張角',color:'#facc15',capital:'平原'}
];

const CITY_DATA=[
['襄平','公孫瓚',12,0,'軍馬'],['北平','公孫瓚',10,1,'軍馬'],['薊','袁紹',9,1,'戟'],['南皮','袁紹',8,2,'兵器'],
['平原','張角',7,3,'弩'],['鄴','袁紹',7,2,'大都市'],['晉陽','袁紹',6,1,'軍馬'],['北海','曹操',9,4,'戟'],
['濮陽','曹操',6,4,'槍'],['陳留','曹操',5,5,'兵器'],['許昌','曹操',5,6,'大都市'],['洛陽','曹操',4,5,'大都市'],
['長安','馬騰',3,5,'大都市'],['安定','馬騰',2,3,'軍馬'],['天水','馬騰',2,5,'軍馬'],['武威','馬騰',1,2,'軍馬'],
['小沛','呂布',7,5,'兵器'],['下邳','呂布',8,6,'大都市'],['汝南','曹操',6,7,'戟'],['壽春','孫權',8,7,'弩'],
['廬江','孫權',9,8,'水軍'],['建業','孫權',11,8,'大都市'],['吳','孫權',12,8,'水軍'],['會稽','孫權',13,9,'弩'],
['柴桑','孫權',9,9,'水軍'],['江夏','劉表',7,9,'戟'],['襄陽','劉表',5,8,'大都市'],['新野','劉表',5,7,'槍'],
['宛','曹操',4,7,'槍'],['上庸','劉備',4,8,'兵器'],['江陵','劉表',5,9,'水軍'],['長沙','劉表',6,10,'水軍'],
['武陵','劉表',5,10,'戟'],['桂陽','劉表',7,10,'槍'],['零陵','劉表',6,11,'弩'],['永安','劉備',3,9,'弩'],
['漢中','劉備',3,7,'戟'],['梓潼','劉璋',2,8,'弩'],['成都','劉備',1,9,'大都市'],['江州','劉璋',2,10,'槍'],
['建寧','劉璋',1,11,'槍'],['雲南','劉璋',0,11,'兵器']
];

const HERO_POOL=[
['曹操','曹操',72,92,96,'奸雄'],['夏侯惇','曹操',92,65,70,'剛勇'],['夏侯淵','曹操',91,60,62,'疾馳'],['張遼','曹操',95,78,72,'威風'],['許褚','曹操',96,36,25,'虎痴'],['郭嘉','曹操',32,98,86,'鬼謀'],['荀彧','曹操',22,95,99,'王佐'],
['劉備','劉備',78,88,82,'仁德'],['關羽','劉備',98,75,62,'神將'],['張飛','劉備',99,35,30,'鬥神'],['趙雲','劉備',96,78,70,'洞察'],['諸葛亮','劉備',38,100,98,'神算'],['龐統','劉備',34,97,88,'連環'],['黃忠','劉備',93,66,55,'弓神'],['魏延','劉備',92,69,46,'猛將'],
['孫權','孫權',70,83,89,'制衡'],['周瑜','孫權',80,96,86,'火神'],['陸遜','孫權',70,97,90,'火攻'],['甘寧','孫權',94,72,48,'強襲'],['太史慈','孫權',93,67,58,'勇將'],['呂蒙','孫權',81,89,78,'攻心'],['黃蓋','孫權',82,68,65,'苦肉'],
['袁紹','袁紹',70,69,75,'名門'],['顏良','袁紹',94,35,25,'猛者'],['文醜','袁紹',93,32,22,'猛者'],['田豐','袁紹',29,94,87,'智囊'],['沮授','袁紹',35,90,90,'軍師'],
['馬騰','馬騰',88,56,52,'騎將'],['馬超','馬騰',97,55,42,'錦馬超'],['龐德','馬騰',94,70,61,'白馬'],['韓遂','馬騰',75,78,72,'離間'],
['劉表','劉表',48,72,82,'名士'],['蔡瑁','劉表',70,58,64,'水軍'],['黃祖','劉表',72,50,42,'守將'],['蒯良','劉表',28,86,90,'內政'],['文聘','劉表',84,72,70,'鐵壁'],
['劉璋','劉璋',35,62,70,'守成'],['張任','劉璋',88,75,64,'弓將'],['嚴顏','劉璋',86,69,55,'老當'],['法正','劉璋',40,94,82,'奇謀'],
['公孫瓚','公孫瓚',84,65,52,'白馬'],['趙雲','公孫瓚',96,78,70,'洞察'],['田楷','公孫瓚',70,55,45,'守備'],
['呂布','呂布',100,26,15,'飛將'],['陳宮','呂布',55,92,76,'智謀'],['高順','呂布',88,72,65,'陷陣'],['張遼','呂布',95,78,72,'威風'],
['張角','張角',30,90,82,'妖術'],['張寶','張角',60,78,55,'幻術'],['張梁','張角',75,48,35,'黃巾'],['管亥','張角',82,35,22,'猛攻']
];

const GAME={
started:false,playerFaction:null,selected:null,selectedCity:null,mode:'idle',
turn:1,year:184,gold:3000,food:10000,reputation:50,
cities:[],units:[]
};

function setupFactionSelect(){
const box=document.getElementById('factionSelect');
box.innerHTML='<h3>選擇勢力</h3>';
FACTIONS.forEach(f=>{
const b=document.createElement('button');
b.style.width='180px';
b.innerText=f.name+'｜本城:'+f.capital;
b.onclick=()=>startGame(f.name);
box.appendChild(b);
});
}

function startGame(faction){
GAME.playerFaction=faction;
document.getElementById('titleScreen').style.display='none';
initGame();
log('你選擇了 '+faction+' 勢力。目標：消滅其他勢力，統一天下。');
}

function initGame(){
GAME.cities=CITY_DATA.map(c=>({
name:c[0],owner:c[1],x:c[2],y:c[3],special:c[4],
hp:8000+(c[4]==='大都市'?4000:0),agri:50,commerce:50,people:70
}));

GAME.units=[];
HERO_POOL.forEach(h=>{
let city=GAME.cities.find(c=>c.owner===h[1]);
if(!city)return;
let offset=GAME.units.filter(u=>u.faction===h[1]).length%3;
GAME.units.push({
hero:{name:h[0],war:h[2],int:h[3],pol:h[4],skill:h[5]},
faction:h[1],
x:Math.min(13,city.x+offset),
y:city.y,
troops:2500+Math.floor(Math.random()*1000),
morale:90,
food:2500
});
});

GAME.gold=3000;
GAME.food=10000;
GAME.reputation=50;
renderHeroes();
drawMap();
updateUI();
}

function terrain(x,y){
if(y>=9&&x<=2)return ['desert','🏜️','南蠻'];
if((x+y)%7===0)return ['river','🌊','河流'];
if((x*y)%11===0)return ['mountain','⛰️','山地'];
if((x+y)%5===0)return ['forest','🌲','森林'];
if((x+y)%3===0)return ['road','🛤️','官道'];
return ['plain','🌾','平原'];
}

function drawMap(){
const map=document.getElementById('map');
map.innerHTML='';
for(let y=0;y<12;y++){
for(let x=0;x<14;x++){
const cell=document.createElement('div');
const t=terrain(x,y);
cell.className='cell '+t[0];
let city=GAME.cities.find(c=>c.x===x&&c.y===y);
let unit=GAME.units.find(u=>u.x===x&&u.y===y);

if(city){
let f=FACTIONS.find(f=>f.name===city.owner);
cell.classList.add('city');
cell.style.borderColor=f?f.color:'#999';
cell.innerHTML=`🏯<br><span class="cityName">${city.name}</span><br><span style="color:${f?f.color:'#fff'}">${city.owner}</span>`;
cell.onclick=()=>openCity(city);
}else if(unit){
let f=FACTIONS.find(f=>f.name===unit.faction);
cell.classList.add('unit');
cell.style.background=f?f.color:'#555';
cell.innerHTML=`⚔️<br>${unit.hero.name}<br>${unit.troops}`;
if(GAME.units[GAME.selected]===unit)cell.classList.add('selected');
cell.onclick=()=>cellClick(x,y);
}else{
cell.innerHTML=`${t[1]}<br>${t[2]}`;
cell.onclick=()=>cellClick(x,y);
}
map.appendChild(cell);
}
}
}

function renderHeroes(){
const box=document.getElementById('heroList');
box.innerHTML='';
GAME.units.forEach((u,i)=>{
if(u.faction!==GAME.playerFaction)return;
const div=document.createElement('div');
div.className='hero';
div.innerHTML=`<b>${u.hero.name}</b><br>武:${u.hero.war} 智:${u.hero.int} 政:${u.hero.pol}<br>兵:${u.troops} 士氣:${u.morale}<br>技:${u.hero.skill}`;
div.onclick=()=>selectUnit(i);
box.appendChild(div);
});
}

function selectUnit(i){
GAME.selected=i;
const u=GAME.units[i];
document.getElementById('unitDetail').innerHTML=
`<b>${u.hero.name}</b><br>勢力:${u.faction}<br>武:${u.hero.war} 智:${u.hero.int} 政:${u.hero.pol}<br>兵力:${u.troops}<br>士氣:${u.morale}<br>糧食:${u.food}<br>特技:${u.hero.skill}`;
log('選擇 '+u.hero.name);
drawMap();
}

function openCity(city){
GAME.selectedCity=city;
document.getElementById('cityPanel').innerHTML=
`<b>${city.name}</b><br>勢力:${city.owner}<br>特色:${city.special}<br>耐久:${city.hp}<br>農業:${city.agri}<br>商業:${city.commerce}<br>民心:${city.people}`;
}

function cellClick(x,y){
if(GAME.selected===null)return log('請先選擇武將');
const unit=GAME.units[GAME.selected];
if(!unit || unit.faction!==GAME.playerFaction)return log('只能操作我方部隊');

const targetUnit=GAME.units.find(u=>u.x===x&&u.y===y);
const targetCity=GAME.cities.find(c=>c.x===x&&c.y===y);
const dist=Math.abs(unit.x-x)+Math.abs(unit.y-y);

if(GAME.mode==='move'){
if(targetUnit)return log('該格已有部隊');
if(dist>2)return log('移動距離太遠，最多 2 格');
unit.x=x;unit.y=y;unit.food-=50;
log(unit.hero.name+' 移動完成');
}

else if(GAME.mode==='attack'){
if(!targetUnit || targetUnit.faction===GAME.playerFaction)return log('請點敵軍');
if(dist>1)return log('攻擊距離需相鄰');
battle(unit,targetUnit);
}

else if(GAME.mode==='strategy'){
if(!targetUnit || targetUnit.faction===GAME.playerFaction)return log('請點敵軍施展計略');
if(dist>3)return log('計略距離太遠');
strategy(unit,targetUnit);
}

else if(GAME.mode==='siege'){
if(!targetCity || targetCity.owner===GAME.playerFaction)return log('請點敵方城池');
if(dist>1)return log('攻城需相鄰');
siege(unit,targetCity);
}

else log('請先選擇操作模式');

renderHeroes();drawMap();updateUI();checkWin();
}

function setMode(m){
GAME.mode=m;
document.getElementById('mode').innerText=m;
log('模式切換：'+m);
}

function battle(a,d){
let terrainBonus=terrain(d.x,d.y)[0]==='mountain'?0.8:1;
let damage=Math.max(150,Math.floor((a.hero.war*12-d.hero.war*5+Math.random()*400)*terrainBonus));
d.troops-=damage;
a.morale=Math.max(0,a.morale-5);
log(`${a.hero.name} 攻擊 ${d.hero.name}，造成 ${damage} 傷害`);
if(d.troops<=0){
log(d.hero.name+' 部隊潰滅');
GAME.units=GAME.units.filter(u=>u!==d);
GAME.reputation+=3;
}
}

function strategy(a,d){
let success=a.hero.int+Math.random()*60>d.hero.int+Math.random()*50;
if(success){
d.morale-=25;
d.troops-=250;
log(`${a.hero.name} 發動 ${a.hero.skill} 成功，敵軍混亂`);
}else{
a.morale-=10;
log(`${a.hero.name} 計略失敗`);
}
if(d.troops<=0)GAME.units=GAME.units.filter(u=>u!==d);
}

function siege(u,c){
let damage=Math.floor(u.hero.war*20+u.troops*0.08);
c.hp-=damage;
u.morale-=8;
log(`${u.hero.name} 攻打 ${c.name}，城耐久 -${damage}`);
if(c.hp<=0){
log(`${c.name} 被 ${u.faction} 佔領！`);
c.owner=u.faction;
c.hp=6000;
GAME.reputation+=10;
}
openCity(c);
}

function recruitTroops(){
if(GAME.selected===null)return log('請先選武將');
let u=GAME.units[GAME.selected];
if(u.faction!==GAME.playerFaction)return;
if(GAME.gold<300)return log('金不足');
GAME.gold-=300;
u.troops+=500;
log(u.hero.name+' 徵兵 +500');
renderHeroes();drawMap();updateUI();
}

function trainTroops(){
if(GAME.selected===null)return log('請先選武將');
let u=GAME.units[GAME.selected];
u.morale=Math.min(120,u.morale+15);
log(u.hero.name+' 訓練完成');
renderHeroes();updateUI();
}

function developCity(){
let c=GAME.selectedCity || GAME.cities.find(c=>c.owner===GAME.playerFaction);
if(!c || c.owner!==GAME.playerFaction)return log('請先選我方城池');
if(GAME.gold<400)return log('金不足');
GAME.gold-=400;
c.agri+=5;c.commerce+=5;c.people+=2;
log(c.name+' 開發完成，農業商業提升');
openCity(c);updateUI();
}

function searchHero(){
if(GAME.gold<500)return log('金不足');
GAME.gold-=500;
const names=['徐庶','魯肅','姜維','鄧艾','陸抗','鍾會','文鴦','張郃','于禁','程普'];
const n=names[Math.floor(Math.random()*names.length)]+'';
let city=GAME.cities.find(c=>c.owner===GAME.playerFaction);
let hero={name:n,war:60+Math.floor(Math.random()*35),int:55+Math.floor(Math.random()*40),pol:50+Math.floor(Math.random()*40),skill:'新星'};
GAME.units.push({hero,faction:GAME.playerFaction,x:city.x,y:city.y,troops:2000,morale:80,food:2000});
log('探索成功，登用 '+n);
renderHeroes();drawMap();updateUI();
}

function aiTurn(){
FACTIONS.forEach(f=>{
if(f.name===GAME.playerFaction)return;
let units=GAME.units.filter(u=>u.faction===f.name);
units.forEach(u=>{
let enemy=GAME.units.find(e=>e.faction!==u.faction);
if(!enemy)return;
let dist=Math.abs(u.x-enemy.x)+Math.abs(u.y-enemy.y);
if(dist<=1){
battle(u,enemy);
}else{
if(enemy.x>u.x)u.x++; else if(enemy.x<u.x)u.x--;
if(enemy.y>u.y)u.y++; else if(enemy.y<u.y)u.y--;
}
});
});
log('其他勢力行動完成');
}

function endTurn(){
GAME.turn++;
GAME.year++;
let myCities=GAME.cities.filter(c=>c.owner===GAME.playerFaction);
GAME.gold+=500+myCities.length*120;
GAME.food+=800+myCities.length*180;

GAME.units.forEach(u=>{
u.food-=100;
if(u.food<=0){u.troops-=100;log(u.hero.name+' 缺糧損兵');}
});

log('回合結束，進入敵方行動');
aiTurn();
renderHeroes();drawMap();updateUI();checkWin();
}

function triggerEvent(){
const events=['黃巾蜂起','桃園結義','官渡激戰','赤壁火攻','空城計','五虎將奮起'];
const e=events[Math.floor(Math.random()*events.length)];
log('劇情事件：'+e);
if(e==='赤壁火攻'){
GAME.units.forEach(u=>{if(u.faction==='曹操')u.troops-=400;});
log('曹操軍受到火攻損失');
}
if(e==='五虎將奮起'){
GAME.units.forEach(u=>{if(u.faction==='劉備')u.morale+=20;});
log('劉備軍士氣提升');
}
drawMap();
}

function checkWin(){
let alive=[...new Set(GAME.cities.map(c=>c.owner))];
if(alive.length===1){
alert(alive[0]+' 統一天下！');
log(alive[0]+' 統一天下！');
}
let myUnits=GAME.units.filter(u=>u.faction===GAME.playerFaction);
let myCities=GAME.cities.filter(c=>c.owner===GAME.playerFaction);
if(myUnits.length===0&&myCities.length===0){
alert('敗北！你的勢力滅亡');
}
}

function saveGame(){
localStorage.setItem('san_strategy_save',JSON.stringify(GAME));
log('存檔完成');
}

function loadGame(){
let data=localStorage.getItem('san_strategy_save');
if(!data)return log('沒有存檔');
Object.assign(GAME,JSON.parse(data));
document.getElementById('titleScreen').style.display='none';
renderHeroes();drawMap();updateUI();
log('讀檔完成');
}

function updateUI(){
document.getElementById('turn').innerText=GAME.turn;
document.getElementById('year').innerText=GAME.year;
