<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>三國志 Web v17.0：PK 威力加強版</title>
    <style>
        :root { --gold: #f1c40f; --bg: #0d0d0d; --panel: #1e272e; --ink: #2f3542; }
        body { font-family: "Noto Serif TC", "Microsoft JhengHei", serif; background: var(--bg); color: #dff9fb; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* 介面與地圖 */
        .header { background: var(--ink); padding: 8px 20px; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        .resource-bar { display: flex; gap: 15px; font-size: 14px; }
        .game-main { display: flex; flex-grow: 1; overflow: hidden; }
        .map-container { flex-grow: 1; overflow: auto; background: #111; padding: 20px; position: relative; }
        .grid { display: grid; grid-template-columns: repeat(30, 60px); grid-template-rows: repeat(30, 60px); gap: 1px; background: #333; }
        
        /* 地形與格子 */
        .cell { width: 60px; height: 60px; background: #2f3640; display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; font-size: 10px; }
        .cell:hover { filter: brightness(1.2); outline: 1px solid white; z-index: 5; }
        .cell.plain { background: #353b48; }
        .cell.forest { background: #1b3022; color: #2ecc71; }
        .cell.city { background: #4b6584; border: 2px solid var(--gold); box-sizing: border-box; }
        .cell.in-range { background: rgba(241, 196, 15, 0.3) !important; border: 1px dashed var(--gold); }

        /* 部隊與建築 */
        .unit { width: 50px; height: 50px; border-radius: 4px; border: 2px solid #fff; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; position: relative; box-shadow: 0 4px 6px rgba(0,0,0,0.5); }
        .unit.act-done { filter: grayscale(0.8) opacity(0.6); }
        .unit.selected { border-color: var(--gold); transform: scale(1.1); z-index: 20; box-shadow: 0 0 15px var(--gold); }
        .unit-hp { position: absolute; bottom: 0; width: 100%; height: 4px; background: #000; }
        .unit-hp-fill { height: 100%; background: #2ecc71; }
        
        .bldg-icon { font-size: 20px; position: relative; }
        .bldg-lvl { position: absolute; bottom: -5px; right: -10px; background: #e74c3c; color: white; border-radius: 50%; width: 16px; height: 16px; font-size: 10px; font-weight: bold; display: flex; align-items: center; justify-content: center; border: 1px solid white; }

        /* 側邊欄 */
        .sidebar { width: 340px; background: var(--panel); border-left: 2px solid var(--gold); display: flex; flex-direction: column; }
        .menu-box { padding: 15px; flex-grow: 1; display: none; }
        .log { height: 220px; background: #000; padding: 10px; font-size: 12px; color: #1dd1a1; overflow-y: auto; border-top: 1px solid #444; line-height: 1.5; }
        
        button { background: #485460; color: white; border: none; padding: 8px; border-radius: 2px; cursor: pointer; font-weight: bold; margin: 2px; transition: 0.2s; }
        button:hover { background: #808e9b; }
        button.primary { background: #27ae60; }
        button.pk-btn { background: #8e44ad; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
        
        .dmg-text { position: absolute; color: #ff4757; font-weight: bold; font-size: 20px; text-shadow: 1px 1px 2px #000; z-index: 100; pointer-events: none; animation: floatUp 1s ease-out forwards; }
        @keyframes floatUp { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-30px) scale(1.5); opacity: 0; } }
    </style>
</head>
<body>

<div class="header">
    <div id="uiFac" style="padding:4px 12px; border-radius:4px; font-weight:bold; background:#e74c3c;">蜀漢 (玩家)</div>
    <div class="resource-bar">
        <span>📅 第 <b id="uiTurn">1</b> 旬</span>
        <span style="color:#f1c40f;">💰 金：<b id="uiGold">2000</b></span>
        <span style="color:#2ecc71;">🌾 糧：<b id="uiFood">10000</b></span>
        <span style="color:#3498db;">⚡ AP：<b id="uiAP">40</b></span>
        <span style="color:#9b59b6;">🧪 技巧分：<b id="uiTech">0</b></span>
    </div>
    <button class="primary" onclick="endTurn()">結束旬次</button>
</div>

<div class="game-main">
    <div class="map-container"><div id="map" class="grid"></div></div>
    <div class="sidebar">
        <div id="menu" class="menu-box">
            <h3 id="mTitle" style="margin:0 0 5px 0; color:var(--gold);"></h3>
            <div id="mInfo" style="font-size:12px; margin-bottom:10px; color:#bdc3c7;"></div>
            
            <div id="unitCmd" style="display:none;">
                <div class="btn-grid">
                    <button style="background:#e74c3c;" onclick="doAtk()">⚔️ 攻擊</button>
                    <button onclick="showSub('tactics')">🔥 戰法</button>
                    <button class="pk-btn" onclick="showSub('build')">🏗️ 建設/增築</button>
                    <button onclick="unitWait()">⌛ 待命</button>
                </div>
            </div>

            <div id="cityCmd" style="display:none;">
                <div class="btn-grid">
                    <button onclick="showSub('draft')">📯 徵兵</button>
                    <button class="pk-btn" onclick="showSub('tech')">🧪 技巧研究</button>
                </div>
                <div id="heroList" style="margin-top:10px; border:1px solid #444; background:#000; max-height:150px; overflow-y:auto;"></div>
            </div>
            
            <div id="subMenu" class="btn-grid" style="margin-top:10px; border-top:1px solid #555; padding-top:10px; display:none;"></div>
        </div>
        <div class="log" id="logBox">> 【威力加強版】系統啟動。開放設施增築與技巧研究。</div>
    </div>
</div>

<script>
    const SKILLS = { '關羽':'神將', '諸葛亮':'神算', '張飛':'鬥神', '曹操':'虛實', '夏侯惇':'騎將', '周瑜':'火神' };
    const TECH_TREE = {
        'atk': { n: '槍兵鍛鍊', costG: 1000, costAP: 30, desc: '部隊攻擊力 +15%' },
        'logi': { n: '軍制改革', costG: 1000, costAP: 30, desc: '部隊糧草消耗減少 30%' }
    };

    let GS = {
        t: 1, idx: 0,
        facs: [
            { id:'shu', n:'蜀漢', c:'#e74c3c', x:5, y:25, h:["劉備","關羽","張飛","諸葛亮"], gold:2000, food:10000, ap:40, tp:0, tech:{atk:false, logi:false} },
            { id:'wei', n:'曹魏', c:'#3498db', x:15, y:5, h:["曹操","夏侯惇","張遼","司馬懿"], gold:2000, food:10000, ap:40, tp:0, tech:{atk:false, logi:false} },
            { id:'wu', n:'東吳', c:'#2ecc71', x:25, y:22, h:["孫權","周瑜","陸遜","甘寧"], gold:2000, food:10000, ap:40, tp:0, tech:{atk:false, logi:false} }
        ],
        cities: [], units: [], bldgs: [],
        terrain: Array.from({length:30}, () => Array.from({length:30}, () => Math.random() > 0.85 ? 'forest' : 'plain'))
    };

    let sel = null;

    function init() {
        GS.facs.forEach(f => {
            GS.cities.push({ x:f.x, y:f.y, f:f.id, n:f.n[0]+"城", tr:8000 });
            f.h.forEach((h, i) => {
                GS.units.push({ 
                    id: GS.units.length, n: h, f: f.id, t: ['槍','騎','弓','智'][i%4], 
                    x: f.x, y: f.y, tr: 0, s: 100, isD: false, act: false, 
                    a: 85 + Math.floor(Math.random()*15), sk: SKILLS[h]||'無'
                });
            });
        });
        draw();
    }

    function draw() {
        const map = document.getElementById('map'); map.innerHTML = '';
        const f = GS.facs[GS.idx];
        
        for(let y=0; y<30; y++) {
            for(let x=0; x<30; x++) {
                const cell = document.createElement('div');
                cell.className = `cell ${GS.terrain[y][x]}`;
                
                const city = GS.cities.find(c => c.x===x && c.y===y);
                const bldg = GS.bldgs.find(b => b.x===x && b.y===y);
                const unit = GS.units.find(u => u.x===x && u.y===y && u.isD && u.tr > 0);

                if(city) { cell.classList.add('city'); cell.innerHTML = `<div style="background:${GS.facs.find(fa=>fa.id===city.f).c}; color:white; font-size:9px; padding:1px;">${city.n}</div>`; }
                if(bldg) { cell.innerHTML = `<span class="bldg-icon">${bldg.i}<div class="bldg-lvl">${bldg.lvl}</div></span>`; }
                
                if(sel && !sel.act && Math.abs(x-sel.x)+Math.abs(y-sel.y) <= (sel.t==='騎'?3:2)) { cell.classList.add('in-range'); }

                if(unit) {
                    const ue = document.createElement('div');
                    ue.className = `unit ${sel===unit?'selected':''} ${unit.act?'act-done':''}`;
                    ue.style.backgroundColor = GS.facs.find(fa=>fa.id===unit.f).c;
                    ue.innerHTML = `<span>${unit.n[0]}</span><div class="unit-hp"><div class="unit-hp-fill" style="width:${(unit.tr/5000)*100}%"></div></div>`;
                    cell.appendChild(ue);
                }

                cell.onclick = () => handleClick(x,y);
                map.appendChild(cell);
            }
        }
    }

    function handleClick(x,y) {
        const f = GS.facs[GS.idx];
        const unit = GS.units.find(u => u.x===x && u.y===y && u.isD && u.tr > 0);
        const city = GS.cities.find(c => c.x===x && c.y===y);

        if(unit && unit.f === f.id && !unit.act) { sel = unit; showUnit(unit); draw(); return; }

        if(sel && !sel.act) {
            const dist = Math.abs(x-sel.x) + Math.abs(y-sel.y);
            const range = (sel.t === '騎' ? 3 : 2);
            if(dist > 0 && dist <= range && !unit) {
                if(f.ap < 5) { log("AP不足以移動！", "#e74c3c"); return; }
                f.ap -= 5; sel.x = x; sel.y = y;
                if(city && city.f !== sel.f) { city.f = sel.f; log(`🏰 ${sel.n} 攻佔了 ${city.n}！`, "#f1c40f"); }
                showUnit(sel); draw(); updateUI(); return;
            }
        }

        if(city && city.f === f.id) { sel = null; showCity(city); draw(); return; }

        sel = null; document.getElementById('menu').style.display='none'; draw();
    }

    function showUnit(u) {
        document.getElementById('menu').style.display = 'block';
        document.getElementById('mTitle').innerText = `${u.n} (${u.t}兵)`;
        document.getElementById('mInfo').innerText = `兵力:${u.tr} | 武力:${u.a} | 特技:${u.sk}`;
        document.getElementById('unitCmd').style.display = 'block'; document.getElementById('cityCmd').style.display = 'none';
        document.getElementById('subMenu').style.display = 'none';
    }

    function showCity(c) {
        document.getElementById('menu').style.display = 'block';
        document.getElementById('mTitle').innerText = c.n;
        document.getElementById('mInfo').innerText = `預備兵: ${c.tr}`;
        document.getElementById('unitCmd').style.display = 'none'; document.getElementById('cityCmd').style.display = 'block';
        document.getElementById('subMenu').style.display = 'none';
        
        const hList = document.getElementById('heroList'); hList.innerHTML = '';
        GS.units.filter(u => u.f === c.f && !u.isD).forEach(u => {
            hList.innerHTML += `<div style="padding:5px; border-bottom:1px solid #333; cursor:pointer;" onclick="deploy(${u.id}, ${c.x}, ${c.y})">${u.n} [${u.t}] (武:${u.a})</div>`;
        });
    }

    function showSub(type) {
        const sub = document.getElementById('subMenu'); sub.style.display = 'grid'; sub.innerHTML = '';
        if(type === 'build') {
            const ext = GS.bldgs.find(b => b.x === sel.x && b.y === sel.y);
            if(ext) {
                if(ext.lvl < 3) sub.innerHTML = `<button class="pk-btn" onclick="upgradeBldg()">吸收合併 (升級Lv${ext.lvl+1})<br>耗費:300金/15AP</button>`;
                else sub.innerHTML = `<div style="grid-column:span 2; font-size:12px; text-align:center;">此設施已達最高等級</div>`;
            } else {
                [{n:'市場', i:'💰', g:300, a:10}, {n:'農場', i:'🌾', g:300, a:10}].forEach(b => {
                    sub.innerHTML += `<button onclick="buildBldg('${b.n}','${b.i}',${b.g},${b.a})">建${b.n}<br>${b.a}AP</button>`;
                });
            }
        } else if(type === 'tech') {
            const f = GS.facs[GS.idx];
            Object.keys(TECH_TREE).forEach(k => {
                const t = TECH_TREE[k];
                if(f.tech[k]) sub.innerHTML += `<button disabled style="background:#2c3e50;">${t.n} (已解鎖)</button>`;
                else sub.innerHTML += `<button class="pk-btn" onclick="research('${k}')">${t.n}<br>${t.costG}金/${t.costAP}AP</button>`;
            });
        } else if(type === 'draft') {
            sub.innerHTML = `<button onclick="draft()">徵兵 2000 (20AP, 300金)</button>`;
        }
    }

    function deploy(id, x, y) {
        const f = GS.facs[GS.idx]; if(f.ap < 10) { log("AP不足！"); return; }
        const c = GS.cities.find(ci => ci.x===x && ci.y===y); if(c.tr < 3000) { log("兵源不足！"); return; }
        const u = GS.units.find(u => u.id === id);
        f.ap -= 10; c.tr -= 3000; u.x = x; u.y = y; u.tr = 3000; u.isD = true; u.act = true;
        log(`🚩 ${u.n} 出陣！`); updateUI(); draw();
    }

    function buildBldg(n, i, g, ap) {
        const f = GS.facs[GS.idx]; if(f.gold < g || f.ap < ap) { log("資源或AP不足！"); return; }
        f.gold -= g; f.ap -= ap; GS.bldgs.push({ x:sel.x, y:sel.y, n, i, f:f.id, lvl:1 });
        log(`🏗️ ${sel.n} 建造了 ${n} Lv1。`); unitWait();
    }

    function upgradeBldg() {
        const f = GS.facs[GS.idx]; if(f.gold < 300 || f.ap < 15) { log("資源不足！"); return; }
        const b = GS.bldgs.find(b => b.x === sel.x && b.y === sel.y);
        f.gold -= 300; f.ap -= 15; b.lvl++;
        log(`✨ ${sel.n} 執行吸收合併，${b.n} 升級至 Lv${b.lvl}！`, "#f1c40f"); unitWait();
    }

    function research(k) {
        const f = GS.facs[GS.idx]; const t = TECH_TREE[k];
        if(f.gold < t.costG || f.ap < t.costAP) { log("資源不足！"); return; }
        f.gold -= t.costG; f.ap -= t.costAP; f.tech[k] = true;
        log(`🧪 研究完成：【${t.n}】！${t.desc}`, "#9b59b6"); updateUI(); draw();
    }

    function draft() {
        const f = GS.facs[GS.idx]; if(f.ap < 20 || f.gold < 300) { log("資源不足！"); return; }
        const c = GS.cities.find(c => c.f === f.id && c.n[0] === document.getElementById('mTitle').innerText[0]);
        f.ap -= 20; f.gold -= 300; c.tr += 2000;
        log(`📯 ${c.n} 完成募兵。`); showCity(c); updateUI();
    }

    function doAtk() {
        const f = GS.facs[GS.idx];
        const tar = GS.units.find(u => u.f !== f.id && u.isD && Math.abs(u.x-sel.x)+Math.abs(u.y-sel.y) === 1);
        if(tar) {
            let baseAtk = sel.a;
            if(f.tech['atk']) baseAtk = Math.floor(baseAtk * 1.15); // 科技加成
            
            let dmg = Math.floor(baseAtk * (sel.tr/500));
            let isCrit = false;

            // 暴擊判定：特技或武力壓制 (相差大於10)
            if(sel.sk === '神將' || sel.sk === '鬥神' || sel.a - tar.a > 10) {
                dmg = Math.floor(dmg * 1.5); isCrit = true;
            }

            tar.tr -= dmg; f.tp += 10; // 獲得技巧分
            
            if(isCrit) {
                log(`💥 暴擊！${sel.n} 看破敵陣，對 ${tar.n} 造成 ${dmg} 巨量傷害！`, "#ff4757");
                showDmgText(tar.x, tar.y, `CRIT -${dmg}`);
            } else {
                log(`⚔️ ${sel.n} 攻擊 ${tar.n}，造成 ${dmg} 傷害。`);
                showDmgText(tar.x, tar.y, `-${dmg}`);
            }

            if(tar.tr <= 0) { tar.isD = false; log(`💀 ${tar.n} 部隊潰散！`); }
            unitWait();
        } else log("範圍內無敵軍。");
    }

    function showDmgText(x, y, text) {
        const map = document.getElementById('map');
        const d = document.createElement('div');
        d.className = 'dmg-text'; d.innerText = text;
        d.style.left = (x * 61 + 10) + 'px'; d.style.top = (y * 61 + 10) + 'px';
        map.appendChild(d);
        setTimeout(() => d.remove(), 1000);
    }

    function unitWait() { if(sel) sel.act = true; sel = null; document.getElementById('menu').style.display='none'; draw(); }

    function endTurn() {
        GS.idx = (GS.idx + 1) % GS.facs.length;
        if(GS.idx === 0) {
            GS.t++;
            GS.facs.forEach(f => {
                f.ap = 40 + Math.floor(f.tp/50); // 技巧分可略微增加基礎 AP
                let iG = 500, iF = 2000;
                GS.bldgs.filter(b => b.f === f.id).forEach(b => {
                    if(b.n === '市場') iG += 300 * Math.pow(1.5, b.lvl-1); // Lv越高倍率越高
                    if(b.n === '農場') iF += 1000 * Math.pow(1.5, b.lvl-1);
                });
                f.gold += Math.floor(iG); f.food += Math.floor(iF);
                
                GS.units.filter(u => u.f === f.id && u.isD).forEach(u => {
                    let cost = Math.floor(u.tr / 10);
                    if(f.tech['logi']) cost = Math.floor(cost * 0.7); // 科技減耗
                    f.food -= cost;
                    if(f.food < 0) { u.tr -= 500; log(`⚠️ ${u.n} 缺糧逃亡！`, "#e74c3c"); }
                });
            });
            log(`--- 第 ${GS.t} 旬開始 ---`, "#f1c40f");
        }
        GS.units.forEach(u => u.act = false);
        sel = null; document.getElementById('menu').style.display='none';
        updateUI(); draw();
    }

    function updateUI() {
        const f = GS.facs[GS.idx];
        document.getElementById('uiFac').innerText = f.n; document.getElementById('uiFac').style.background = f.c;
        document.getElementById('uiTurn').innerText = GS.t;
        document.getElementById('uiGold').innerText = f.gold;
        document.getElementById('uiFood').innerText = f.food;
        document.getElementById('uiAP').innerText = f.ap;
        document.getElementById('uiTech').innerText = f.tp;
    }

    function log(m, c="#1dd1a1") {
        const b = document.getElementById('logBox');
        b.innerHTML += `<br><span style="color:${c}">> ${m}</span>`;
        b.scrollTop = b.scrollHeight;
    }

    window.onload = init;
</script>
</body>
</html>
