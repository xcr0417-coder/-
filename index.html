class Card {
  constructor(o) {
    Object.assign(this, {
      lv:1,
      star:1,
      uid:o.id + "_" + Date.now() + "_" + Math.floor(Math.random() * 1000)
    }, o);
  }

  power() {
    let p = this.base;
    p += this.base * (this.lv - 1) * 0.1;
    p += this.base * (this.star - 1) * 0.3;
    p += this.base * this.rarity * 0.5;
    if (this.rarity === 4) p *= 100;
    return Math.floor(p);
  }
}

class Sys {
  constructor() {
    this.skillEnergy = 0;
    this.ultimateEnergy = 0;
    this.musouEnergy = 0;
  }

  charge(t, a) {
    this[t + "Energy"] = Math.min(100, this[t + "Energy"] + a);
  }

  use(t, cost) {
    if (this[t + "Energy"] >= cost) {
      this[t + "Energy"] -= cost;
      return true;
    }
    return false;
  }
}

let state = {
  coin:300,
  jade:300,
  cards:[],
  team:{ hero:null, pet:null, ult:null, troop:null },
  gift:{},
  daily:""
};

function make(id, rarityOverride = null) {
  let t = DB.find(x => x.id === id);
  let c = new Card({...t});
  if (rarityOverride !== null) c.rarity = rarityOverride;
  return c;
}

function save() {
  localStorage.setItem("sango_demon_king_v1", JSON.stringify(state));
  topbar();
}

function load() {
  let d = localStorage.getItem("sango_demon_king_v1");
  if (d) {
    state = JSON.parse(d);
    state.cards = state.cards.map(x => new Card(x));
    if (!state.team) state.team = {hero:null, pet:null, ult:null, troop:null};
  }

  if (!state.cards.length) {
    state.cards.push(make("liaoyuanhuo", 0));
    state.cards.push(make("fireult", 2));
    state.cards.push(make("canglu", 1));
    state.team.hero = state.cards[0].uid;
    state.team.ult = state.cards[1].uid;
    state.team.pet = state.cards[2].uid;
    save();
  }
}

function portrait(c) {

}

function drawAllCards() {
  document.querySelectorAll("canvas[data-uid]").forEach(cv => {
    let c = state.cards.find(x => x.uid === cv.dataset.uid);
    if (!c) return;

    let ctx = cv.getContext("2d");
    cv.width = 200;
    cv.height = 200;

    let g = ctx.createLinearGradient(0, 0, 200, 200);
    g.addColorStop(0, "#222");
    g.addColorStop(0.45, c.color || "#ffe08a");
    g.addColorStop(1, "#111");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, 200, 200);

    if (c.rarity === 4) {
      ctx.strokeStyle = "#fff";
      ctx.lineWidth = 8;
      ctx.strokeRect(8, 8, 184, 184);
      ctx.fillStyle = "rgba(255,255,255,.25)";
      ctx.fillRect(0, 0, 200, 200);
    }

    drawCharacterArt(ctx, 100, 140, 60, c.color || "#fff", c.style || "blade", true);

    ctx.fillStyle = c.rarity === 4 ? "#111" : "#fff";
    ctx.font = "bold 18px Microsoft JhengHei";
    ctx.textAlign = "center";
    ctx.fillText(c.name, 100, 30);
  });
}

function upStar(uid) {
  let c = state.cards.find(x => x.uid === uid);
  if (c.star >= 10) return alert("滿星");

  let idx = state.cards.findIndex(x => x.name === c.name && x.uid !== uid);
  if (idx === -1) return alert("需 1 張同名卡");

  state.cards.splice(idx, 1);
  c.star++;
  save();
  $("m_bag").onclick();
}

function upRank(uid) {
  let c = state.cards.find(x => x.uid === uid);
  if (c.rarity >= 3) return alert("最高階");

  let dupes = state.cards.filter(x => x.name === c.name && x.uid !== uid);
  if (dupes.length < 4) return alert("需 4 張同名卡");

  for (let i=0;i<4;i++) {
    state.cards.splice(state.cards.findIndex(x => x.name === c.name && x.uid !== uid), 1);
  }

  c.rarity++;
  save();
  $("m_bag").onclick();
}

function awaken(uid) {

  $("mobile").style.display = "block";
}

const joy = $("joy");
const stick = $("stick");
let joyTid = null;
let joyBaseX = 0;
let joyBaseY = 0;

document.addEventListener("touchstart", e => {
  if (e.target.closest("button") || e.target.closest(".tb")) return;

  for (let t of e.changedTouches) {
    if (t.clientX < innerWidth / 2 && joyTid === null && pData && !over) {
      joyTid = t.identifier;
      joyBaseX = t.clientX;
      joyBaseY = t.clientY;
      joy.style.display = "block";
      joy.style.left = (joyBaseX - 75) + "px";
      joy.style.top = (joyBaseY - 75) + "px";
      stick.style.transform = "translate(0px,0px)";
      mv(t);
    }
  }
}, {passive:false});

document.addEventListener("touchmove", e => {
  for (let t of e.changedTouches) {
    if (t.identifier === joyTid) {
      e.preventDefault();
      mv(t);
    }
  }
}, {passive:false});

document.addEventListener("touchend", e => {
  for (let t of e.changedTouches) {
    if (t.identifier === joyTid) {
      joyTid = null;
      joy.style.display = "none";
      touch.x = 0;
      touch.y = 0;
      stick.style.transform = "translate(0px,0px)";
    }
  }
});

function mv(t) {
  let dx = t.clientX - joyBaseX;
  let dy = t.clientY - joyBaseY;
  let len = Math.hypot(dx, dy);
  let max = 45;

  if (len > max) {
    dx = dx / len * max;
    dy = dy / len * max;
  }

  touch.x = dx / max;
  touch.y = dy / max;
  stick.style.transform = `translate(${dx}px, ${dy}px)`;
}

function initBattle(mType, param) {

  let pet = state.cards.find(x => x.uid === state.team.pet);
  let ult = state.cards.find(x => x.uid === state.team.ult);

  let pwr = hc.power();
  let atkBuff = pet ? (pet.buffA || 0) : 0;
  let defBuff = pet ? (pet.buffD || 0) : 0;
  let spdBuff = pet ? (pet.buffS || 0) : 0;

  pData = {
    sys:new Sys(),
    base:hc,
    name:hc.name,
    x:300,
    y:canvas.height / 2,
    r:28,
    hp:hc.hp + pwr,
    maxHp:hc.hp + pwr,
    atk:hc.atk + Math.floor(pwr * 0.1) + atkBuff,
    def:hc.def + defBuff,
    spd:5 + spdBuff,
    fx:1,
    fy:0,
    cd:0,
    cseq:0,
    ct:0,
    inv:0,
    dodge:0,
    musou:0,
    hitstun:0
  };

  pData.sys.ult = ult;

  es = [];
  slashes = [];
  texts = [];
  items = [];
  KOs = 0;
  bossOut = 0;
  over = 0;
  battleFrame = 0;
  screenShake = 0;

  timeLeft = mType === "online" ? (difficultyKey === "demonKing" ? 180 : difficultyKey === "hell" ? 210 : 300) : 0;

  if (mType === "story") {
    worldW = difficultyKey === "demonKing" ? 5000 : 6000;
    $("mission").textContent = difficultyKey === "demonKing"
      ? `【魔王級劇本】擊破 ${getKillRequirement()} 隻 Boss 小兵，引出白銀傳說 Boss`
      : `【劇本】擊破 ${getKillRequirement()} 兵引出大將`;
  } else if (mType === "online") {
    worldW = 2400;
    $("mission").textContent = difficultyKey === "demonKing"
      ? `【魔王級限時】打倒白銀傳說 Boss`
      : `【限時討伐】打倒大將`;
    $("timerUI").style.display = "block";
  } else {
    worldW = difficultyKey === "demonKing" ? 2400 : 2200;
    $("mission").textContent = difficultyKey === "demonKing"
      ? `【魔王級】擊破 ${getKillRequirement()} 隻 Boss 小兵，引出白銀傳說 Boss`
      : `【闖關】擊破 ${getKillRequirement()} 兵引出大將`;
  }

  $("diffUI").textContent = "難度：" + diff.name;
  $("ko").textContent = "擊破 0";
  $("wrap").style.display = "block";

  resize();

  let initSpawn = difficultyKey === "demonKing"
    ? 8
    : Math.floor((mType === "story" ? 50 : 22) * diff.spawn);

  for (let i=0;i<initSpawn;i++) spawnE(true);

  cancelAnimationFrame(loop);
  battleLoop();

  if (difficultyKey === "demonKing") {
    msg("魔王級開始！小兵都是 Boss！", "#ffffff", "44px");
  }
}

function getKillRequirement() {
  let base = mode.type === "story" ? 150 : 30;

  if (difficultyKey === "easy") return Math.floor(base * 0.8);
  if (difficultyKey === "hard") return Math.floor(base * 1.15);
  if (difficultyKey === "shura") return Math.floor(base * 1.35);
  if (difficultyKey === "hell") return Math.floor(base * 1.55);
  if (difficultyKey === "demonKing") return mode.type === "story" ? 18 : 8;

  return base;
}

function exitBattle() {
  $("wrap").style.display = "none";
  $("timerUI").style.display = "none";
  cancelAnimationFrame(loop);
  showMap();
}

function timePowerScale() {
  let minute = battleFrame / 3600;
  return 1 + minute * 0.12 * diff.timeScale;
}

function chooseEnemyKind(isBoss) {
  if (isBoss) return "boss";

  if (difficultyKey === "demonKing") {
    let r = Math.random();
    if (r < 0.35) return "demonBoss";
    if (r < 0.55) return "demonArcher";
    if (r < 0.75) return "demonMage";
    if (r < 0.9) return "demonShield";
    return "demonElite";
  }

  let r = Math.random();

  if (r < diff.mage) return "mage";
  if (r < diff.mage + diff.ranged) return "archer";
  if (r < diff.mage + diff.ranged + diff.shield) return "shield";
  if (Math.random() < 0.12 + diff.spawn * 0.03) return "elite";

  return "soldier";
}

function createSilverLegendBoss() {
  const pool = ["silver_lubu", "silver_zhaoyun", "silver_guanyu"];
  let id = pool[Math.floor(Math.random() * pool.length)];
  let c = make(id);
  c.lv = 100;
  c.star = 10;
  c.rarity = 4;
  return c;
}

function spawnE(init=false, forceBoss=false) {
  let maxE = mode.type === "story" ? 80 : 34;

  if (difficultyKey === "demonKing") {
    maxE = mode.type === "story" ? 16 : 10;
  } else {
    maxE = Math.floor(maxE * diff.spawn);
  }

  if (es.length >= maxE) return;

  let kind = chooseEnemyKind(forceBoss);
  let isBoss = kind === "boss";
  let isDemonMob = kind.startsWith("demon");
  let silverCard = null;

  if (forceBoss && difficultyKey === "demonKing") {
    kind = "silverLegendBoss";
    isBoss = true;
    silverCard = createSilverLegendBoss();
  }

  let dist = init ? Math.random() * 800 + 200 : canvas.width / 2 + 100;
  let a = Math.random() * Math.PI * 2;
  let lv = pData.base.lv;
  let scale = timePowerScale();

  let baseHp = isBoss ? 3000 :
               kind === "elite" ? 480 :
               kind === "shield" ? 360 :
               kind === "mage" ? 220 :
               kind === "archer" ? 200 : 150;

  let baseAtk = isBoss ? 80 :
                kind === "elite" ? 28 :
                kind === "shield" ? 18 :
                kind === "mage" ? 24 :
                kind === "archer" ? 20 : 15;

  let baseDef = isBoss ? 25 :
                kind === "shield" ? 40 :
                kind === "elite" ? 12 : 0;

  if (isDemonMob) {
    baseHp = 1800;
    baseAtk = 70;
    baseDef = 45;

    if (kind === "demonArcher") {
      baseHp = 1500;
      baseAtk = 80;
      baseDef = 30;
    }

    if (kind === "demonMage") {
      baseHp = 1400;
      baseAtk = 95;
      baseDef = 25;
    }

    if (kind === "demonShield") {
      baseHp = 2500;
      baseAtk = 65;
      baseDef = 95;
    }

    if (kind === "demonElite") {
      baseHp = 3200;
      baseAtk = 105;
      baseDef = 80;
    }
  }

  if (kind === "silverLegendBoss") {
    baseHp = silverCard.hp + silverCard.power() * 0.35;
    baseAtk = silverCard.atk + silverCard.power() * 0.015;
    baseDef = silverCard.def + 200;
  }

  let hp = baseHp * Math.pow(1.02, lv) * diff.hp * scale;
  let atk = baseAtk * Math.pow(1.01, lv) * diff.atk * scale;
  let def = baseDef;

  if (kind === "silverLegendBoss") {
    hp *= 1.8;
    atk *= 1.25;
  }

  let color = "#999";

  if (mode.type === "stage") {
    color = mode.param === "火系" ? "#f44" : mode.param === "水系" ? "#44f" : "#4f4";
  }

  if (kind === "boss") color = "#b100ff";
  if (kind === "archer") color = "#c98b3b";
  if (kind === "mage") color = "#8844ff";
  if (kind === "shield") color = "#6b6b6b";
  if (kind === "elite") color = "#ff3333";

  if (isDemonMob) color = "#7f00ff";
  if (kind === "demonArcher") color = "#cc66ff";
  if (kind === "demonMage") color = "#4400ff";
  if (kind === "demonShield") color = "#999999";
  if (kind === "demonElite") color = "#ff0000";
  if (kind === "silverLegendBoss") color = "#ffffff";

  let radius = isBoss ? 45 :
               isDemonMob ? 42 :
               kind === "elite" ? 26 :
               kind === "shield" ? 24 : 20;

  if (kind === "silverLegendBoss") radius = 56;

  let speed = isBoss ? 1.8 :
              kind.includes("Shield") || kind === "shield" ? 1.25 :
              kind.includes("Archer") || kind === "archer" ? 1.75 :
              kind.includes("Mage") || kind === "mage" ? 1.45 :
              Math.random() * 1.5 + 1.5;

  if (kind === "silverLegendBoss") speed = 2.2;
  speed *= diff.spd;

  es.push({
    kind,
    isBoss,
    isDemonMob,
    silverCard,
    phase2:false,
    rage:false,
    skillCd:Math.floor(Math.random() * 120 + 120),
    shootCd:Math.floor(Math.random() * 90 + 90),
    color,
    x:Math.max(80, Math.min(worldW - 80, pData.x + Math.cos(a) * dist)),
    y:Math.max(140, Math.min(canvas.height - 140, pData.y + Math.sin(a) * dist)),
    r:radius,
    hp,
    maxHp:hp,
    atk,
    def,
    spd:speed,
    vx:0,
    vy:0,
    stun:0
  });
}

function maybeDropItem(x, y) {
  let chance = 0.14 * diff.drop;

  if (difficultyKey === "demonKing") {
    chance = 0.06;
  }

  if (Math.random() > chance) return;

  let pool = ["baozi","wine","coin"];
  if (difficultyKey === "easy" || difficultyKey === "normal") pool.push("baozi");

  let type = pool[Math.floor(Math.random() * pool.length)];
  items.push({type, x, y, r:14, life:900});
}

function applyItem(it) {
  if (it.type === "baozi") {
    pData.hp = Math.min(pData.maxHp, pData.hp + pData.maxHp * 0.22);
    msg("肉包補血", "#4dff85", "34px");
  } else if (it.type === "wine") {
    pData.sys.musouEnergy = 100;
    msg("老酒：無雙滿", "#ffe35b", "34px");
  } else if (it.type === "coin") {
    state.coin += difficultyKey === "demonKing" ? 200 : 60;
    save();
    topbar();
    msg(difficultyKey === "demonKing" ? "+200 金錢" : "+60 金錢", "#ffe08a", "32px");
  }
  it.life = 0;
}

function slash(p, a, rad, sp, col, dmg, kb) {
  slashes.push({x:p.x, y:p.y, a, rad, sp, col, life:10, max:10});

  let hits = 0;

  es.forEach(e => {
    if (e.hp <= 0) return;

    let ang = Math.atan2(e.y - p.y, e.x - p.x);
    let ad = Math.abs(ang - a);
    if (ad > Math.PI) ad = Math.PI * 2 - ad;

    let dist = Math.hypot(e.x - p.x, e.y - p.y);

    if (dist <= rad && ad <= sp / 2) {
      let guardRate = 1;

      if (e.kind === "shield" || e.kind === "demonShield") {
        let front = Math.cos(ang - Math.atan2(p.fy, p.fx));
        if (front < 0.3) guardRate = 0.25;
      }

      if (e.kind === "silverLegendBoss") {
        guardRate *= 0.8;
      }

      let finalDmg = Math.max(1, (dmg * guardRate) - e.def);

      e.hp -= finalDmg;

      if (!e.isDemonMob && !e.isBoss) {
        e.stun = 15;
      } else {
        e.stun = Math.max(e.stun, difficultyKey === "demonKing" ? 2 : 5);
      }

      e.vx = Math.cos(ang) * kb;
      e.vy = Math.sin(ang) * kb;

      p.sys.charge("skill", difficultyKey === "demonKing" ? 1.5 : 3);
      p.sys.charge("musou", difficultyKey === "demonKing" ? 0.8 : difficultyKey === "hell" ? 1.2 : 2);

      addText(e.x, e.y, Math.floor(finalDmg), guardRate < 1 ? "#66ccff" : "#fff");
      hits++;
    }
  });

  if (hits) {
    screenShake = Math.min(18, screenShake + hits * 1.5);
  }
}

function boom(x, y, rad, dmg, col) {
  slashes.push({x, y, rad, type:"circle", col, life:15, max:15});

  es.forEach(e => {
    let d = Math.hypot(e.x - x, e.y - y);

    if (d <= rad) {
      let finalDmg = Math.max(1, dmg - e.def);
      e.hp -= finalDmg;
      e.stun = difficultyKey === "demonKing" ? 6 : 20;
      e.vx = (e.x - x) * 0.08;
      e.vy = (e.y - y) * 0.08;
      addText(e.x, e.y, Math.floor(finalDmg), "#ff4");
    }
  });

  screenShake = 18;
}

function enemyProjectile(e) {
  let a = Math.atan2(pData.y - e.y, pData.x - e.x);
  let speed = e.kind === "silverLegendBoss" ? 9 : 7;
  let size = e.kind === "silverLegendBoss" ? 22 : e.kind.includes("Mage") || e.kind === "mage" ? 18 : 10;

  slashes.push({
    x:e.x,
    y:e.y,
    vx:Math.cos(a) * speed,
    vy:Math.sin(a) * speed,
    r:size,
    dmg:e.atk * (e.kind.includes("Mage") || e.kind === "mage" ? 1.3 : 1),
    type:"projectile",
    col:e.kind === "silverLegendBoss" ? "#ffffff" : e.kind.includes("Mage") || e.kind === "mage" ? "#8844ff" : "#ffcc66",
    life:100,
    max:100
  });
}

function bossSkill(e) {
  if (!e.isBoss && !e.isDemonMob) return;

  let rageBonus = e.rage ? 1.4 : 1;
  let radius = e.kind === "silverLegendBoss" ? 220 : 130 * rageBonus;
  let damage = e.kind === "silverLegendBoss" ? e.atk * 3.2 : e.atk * 2.2;

  boom(pData.x, pData.y, radius, damage, e.kind === "silverLegendBoss" ? "#ffffff" : "#b100ff");

  if (e.phase2 || e.kind === "silverLegendBoss") {
    let count = e.kind === "silverLegendBoss" ? 12 : 6;

    for (let i=0;i<count;i++) {
      let ang = Math.PI * 2 * i / count;
      slashes.push({
        x:e.x,
        y:e.y,
        vx:Math.cos(ang) * (e.kind === "silverLegendBoss" ? 7 : 5),
        vy:Math.sin(ang) * (e.kind === "silverLegendBoss" ? 7 : 5),
        r:e.kind === "silverLegendBoss" ? 18 : 14,
        dmg:e.atk * (e.kind === "silverLegendBoss" ? 1.6 : 1.1),
        type:"projectile",
        col:e.kind === "silverLegendBoss" ? "#ffffff" : "#ff44ff",
        life:120,
        max:120
      });
    }
  }

  msg(e.kind === "silverLegendBoss" ? "白銀傳說 Boss 放招！" : e.rage ? "大將狂暴！" : "大將放招！", e.kind === "silverLegendBoss" ? "#ffffff" : "#ff44ff", "42px");
}

function updateP(p) {
  if (p.hitstun > 0) {
    p.hitstun--;
    return;
  }

  let dx = 0;
  let dy = 0;
  let pr = keys.j || act.atk;

  if (keys.w) dy--;
  if (keys.s) dy++;
  if (keys.a) dx--;
  if (keys.d) dx++;

  dx += touch.x;
  dy += touch.y;

  if (p.cd <= 0 && !p.musou) {
    let ang = Math.atan2(p.fy, p.fx);

    if (pr) {
      p.cd = 12;
      p.ct = 50;
      p.cseq = p.cseq % 4 + 1;

      let radius = 150 + p.cseq * 12;
      let damage = p.atk * (1 + p.cseq * 0.1);

      slash(p, ang, radius, Math.PI, p.base.color, damage, 6);

      p.x += p.fx * 12;
      p.y += p.fy * 12;

    } else if ((keys.i || act.ch) && p.cseq) {
      p.cd = 25;

      if (p.cseq === 1) {
        slash(p, ang, 210, Math.PI * 1.1, p.base.color, p.atk * 2, 10);
      } else if (p.cseq === 2) {
        slash(p, ang, 260, Math.PI * 1.4, p.base.color, p.atk * 2.5, 14);
      } else {
        slash(p, ang, 300, Math.PI * 2, p.base.color, p.atk * 3.2, 18);
      }

      p.cseq = 0;

    } else if ((keys.k || act.sk) && p.sys.use("skill", 30)) {
      p.cd = 20;
      p.inv = 20;

      let healSkill = p.base.id === "liubei";
      boom(p.x, p.y, 210, p.atk * 3.5, p.base.color);

      if (healSkill) {
        p.hp = Math.min(p.maxHp, p.hp + p.maxHp * 0.12);
      }

      msg("特技！" + p.base.skill, p.base.color, "36px");

    } else if ((keys.l || act.ul) && p.sys.ult && p.sys.use("ultimate", 100)) {
      p.cd = 40;
      p.inv = 45;
      boom(p.x, p.y, 430, (p.sys.ult.dmg || 500) + p.atk * 5, p.sys.ult.color);
      msg("絕招！" + p.sys.ult.name, "#f33");

    } else if ((keys.u || act.ms) && p.sys.use("musou", 100)) {
      p.musou = 150;
      p.inv = 150;
      msg("無雙亂舞！", "#ff4");

    } else if ((keys.space || act.dg) && p.dodge <= 0) {
      p.dodge = difficultyKey === "demonKing" ? 60 : difficultyKey === "hell" ? 48 : 34;
      p.inv = 15;
      p.x += p.fx * 120;
      p.y += p.fy * 120;
    }
  }

  let len = Math.hypot(dx, dy);

  if (len) {
    p.fx = dx / len;
    p.fy = dy / len;
    let spd = p.musou ? p.spd * 1.5 : p.spd;
    p.x += p.fx * spd;
    p.y += p.fy * spd;
  }

  p.x = Math.max(40, Math.min(worldW - 40, p.x));
  p.y = Math.max(90, Math.min(canvas.height - 90, p.y));

  if (p.musou) {
    p.musou--;

    if (p.musou % 10 === 0) {
      slash(p, Math.atan2(p.fy, p.fx), 270, Math.PI * 2, p.base.color, p.atk * 2.5, 12);
    }

    if (p.musou === 1) {
      boom(p.x, p.y, 520, p.atk * 10, "#fff");
    }
  }

  items.forEach(it => {
    if (Math.hypot(p.x - it.x, p.y - it.y) < p.r + it.r) {
      applyItem(it);
    }
  });

  if (p.ct > 0) {
    p.ct--;
    if (!p.ct) p.cseq = 0;
  }

  p.cd = Math.max(0, p.cd - 1);
  p.inv = Math.max(0, p.inv - 1);
  p.dodge = Math.max(0, p.dodge - 1);
}

function updateProjectiles() {
  slashes.forEach(s => {
    if (s.type !== "projectile") return;

    s.x += s.vx;
    s.y += s.vy;

    if (pData && pData.inv <= 0) {
      let d = Math.hypot(s.x - pData.x, s.y - pData.y);

      if (d < s.r + pData.r) {
        pData.hp -= Math.max(1, s.dmg - pData.def * 0.3);
        pData.sys.charge("musou", 4);
        pData.inv = 10;

        if (difficultyKey === "shura" || difficultyKey === "hell" || difficultyKey === "demonKing") {
          pData.hitstun = difficultyKey === "demonKing" ? 12 : 6;
        }

        s.life = 0;
        screenShake = 10;
      }
    }
  });
}

function updateE() {
  es.forEach(e => {
    if (e.hp <= 0) return;

    if ((e.isBoss || e.isDemonMob) && diff.bossPhase) {
      if (!e.phase2 && e.hp < e.maxHp * 0.5) {
        e.phase2 = true;
        e.spd *= e.kind === "silverLegendBoss" ? 1.45 : 1.25;
        e.atk *= e.kind === "silverLegendBoss" ? 1.45 : 1.25;
        msg(e.kind === "silverLegendBoss" ? "白銀傳說 Boss 第二階段！" : "大將第二階段！", e.kind === "silverLegendBoss" ? "#ffffff" : "#ff44ff", "44px");
      }

      if (!e.rage && diff.bossRage && e.hp < e.maxHp * 0.25) {
        e.rage = true;
        e.spd *= e.kind === "silverLegendBoss" ? 1.6 : 1.35;
        e.atk *= e.kind === "silverLegendBoss" ? 1.8 : 1.5;
        e.skillCd = 40;
        msg(e.kind === "silverLegendBoss" ? "白銀傳說 Boss 狂暴！" : "大將狂暴！", e.kind === "silverLegendBoss" ? "#ffffff" : "#ff0000", "50px");
      }
    }

    if (e.stun > 0) {
      e.stun--;
      e.x += e.vx;
      e.y += e.vy;
      e.vx *= 0.8;
      e.vy *= 0.8;
      return;
    }

    let dx = pData.x - e.x;
    let dy = pData.y - e.y;
    let dist = Math.hypot(dx, dy);
    let a = Math.atan2(dy, dx);

    let rangedEnemy = e.kind === "archer" || e.kind === "mage" || e.kind === "demonArcher" || e.kind === "demonMage";

    if (rangedEnemy) {
      e.shootCd--;

      let preferred = e.kind.includes("Mage") || e.kind === "mage" ? 320 : 380;

      if (dist < preferred - 80) {
        e.x -= Math.cos(a) * e.spd;
        e.y -= Math.sin(a) * e.spd;
      } else if (dist > preferred + 80) {
        e.x += Math.cos(a) * e.spd;
        e.y += Math.sin(a) * e.spd;
      }

      if (e.shootCd <= 0) {
        enemyProjectile(e);
        e.shootCd = e.kind.includes("Mage") || e.kind === "mage" ? 130 : 90;
        if (difficultyKey === "demonKing") e.shootCd = Math.floor(e.shootCd * 0.65);
      }

      return;
    }

    if (e.isBoss || e.isDemonMob) {
      e.skillCd--;
      if (e.skillCd <= 0) {
        bossSkill(e);
        e.skillCd = e.rage ? 90 : e.phase2 ? 130 : 180;

        if (e.kind === "silverLegendBoss") e.skillCd = e.rage ? 55 : e.phase2 ? 75 : 100;
        if (difficultyKey === "demonKing") e.skillCd = Math.floor(e.skillCd * 0.75);
      }
    }

    if (dist > e.r + pData.r) {
      let surroundOffset = 0;

      if (difficultyKey === "shura" || difficultyKey === "hell" || difficultyKey === "demonKing") {
        surroundOffset = Math.sin((battleFrame + e.x) / 30) * 0.7;
      }

      e.x += Math.cos(a + surroundOffset) * e.spd;
      e.y += Math.sin(a + surroundOffset) * e.spd;

    } else if (pData.inv <= 0) {
      pData.hp -= Math.max(1, e.atk - pData.def);
      pData.sys.charge("musou", 4);
      pData.inv = 12;

      if (difficultyKey === "hard" || difficultyKey === "shura" || difficultyKey === "hell" || difficultyKey === "demonKing") {
        pData.hitstun = difficultyKey === "demonKing" ? 14 : difficultyKey === "hell" ? 10 : 6;
      }

      screenShake = 8;
    }
  });

  let old = es.length;

  es = es.filter(e => {
    if (e.hp <= 0) {
      maybeDropItem(e.x, e.y);
      return false;
    }
    return true;
  });

  let killed = old - es.length;

  if (killed) {
    KOs += killed;
    $("ko").textContent = "擊破 " + KOs;
    pData.sys.charge("ultimate", difficultyKey === "demonKing" ? killed * 2 : killed * 4);

    if (bossOut && !es.some(e => e.isBoss)) {
      over = 1;

      let rewardCoin = 200;
      let rewardJade = 50;

      if (difficultyKey === "hard") {
        rewardCoin = 320;
        rewardJade = 80;
      } else if (difficultyKey === "shura") {
        rewardCoin = 450;
        rewardJade = 110;
      } else if (difficultyKey === "hell") {
        rewardCoin = 600;
        rewardJade = 160;
      } else if (difficultyKey === "demonKing") {
        rewardCoin = 3000;
        rewardJade = 800;
      }

      state.coin += rewardCoin;
      state.jade += rewardJade;
      save();
      topbar();

      msg(difficultyKey === "demonKing" ? "擊敗白銀傳說 Boss！" : "戰役勝利！", difficultyKey === "demonKing" ? "#ffffff" : "#4f4", "46px");
      setTimeout(exitBattle, 2000);
    }

    let req = getKillRequirement();

    if (KOs >= req && !bossOut) {
      bossOut = 1;
      spawnE(false, true);
      msg(difficultyKey === "demonKing" ? "白銀傳說 Boss 降臨！" : "敵方大將出現！", difficultyKey === "demonKing" ? "#ffffff" : "#f33", "50px");
    }
  }

  if (!bossOut || difficultyKey === "shura" || difficultyKey === "hell" || difficultyKey === "demonKing") {
    let target = mode.type === "story" ? 60 : 25;

    if (difficultyKey === "demonKing") {
      target = mode.type === "story" ? 12 : 7;
    } else {
      target = Math.floor(target * diff.spawn);
    }

    while (es.length < target) {
      spawnE();
    }
  }
}

function handleOnline() {
  if (mode.type === "online") {
    timeLeft -= 1 / 60;

    let m = Math.floor(timeLeft / 60);
    let s = Math.floor(timeLeft % 60).toString().padStart(2, "0");

    $("timerUI").textContent = `${m}:${s}`;

    if (timeLeft <= 0 && !over) {
      over = 1;
      let cost = diff.revive;

      if (confirm(`時間到！花費 ${cost} 金錢接關加時？`)) {
        if (state.coin >= cost) {
          state.coin -= cost;
          timeLeft = difficultyKey === "demonKing" ? 45 : 60;
          over = 0;
          save();
        } else {
          alert("金錢不足");
          exitBattle();
        }
      } else {
        exitBattle();
      }
    }
  }
}

function drawCharacterArt(ctx, x, y, r, color, style, isHero=false, faceX=1) {
  ctx.save();
  ctx.translate(x, y);
  if (faceX < 0) ctx.scale(-1, 1);

  ctx.fillStyle = "rgba(0,0,0,.35)";
  ctx.beginPath();
  ctx.ellipse(0, r * 0.75, r * 0.75, r * 0.18, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.ellipse(0, -r * 0.1, r * 0.48, r * 0.75, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = "#f1c89b";
  ctx.beginPath();
  ctx.arc(0, -r * 0.82, r * 0.36, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = "#1b1b1b";
  ctx.beginPath();
  ctx.moveTo(-r * 0.45, -r * 1.05);
  ctx.lineTo(0, -r * 1.38);
  ctx.lineTo(r * 0.45, -r * 1.05);
  ctx.closePath();
  ctx.fill();

  if (color === "#ffffff") {
    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth = 4;
    ctx.strokeRect(-r * 0.5, -r * 1.25, r, r * 1.7);
  }

  ctx.fillStyle = "#000";
  ctx.beginPath();
  ctx.arc(-r * 0.13, -r * 0.86, r * 0.045, 0, Math.PI * 2);
  ctx.arc(r * 0.13, -r * 0.86, r * 0.045, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = "#111";
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(-r * 0.28, -r * 0.1);
  ctx.lineTo(-r * 0.85, r * 0.25);
  ctx.moveTo(r * 0.28, -r * 0.1);
  ctx.lineTo(r * 0.85, r * 0.25);
  ctx.stroke();

  ctx.strokeStyle = "#222";
  ctx.beginPath();
  ctx.moveTo(-r * 0.22, r * 0.45);
  ctx.lineTo(-r * 0.35, r * 0.9);
  ctx.moveTo(r * 0.22, r * 0.45);
  ctx.lineTo(r * 0.35, r * 0.9);
  ctx.stroke();

  ctx.strokeStyle = isHero ? "#fff" : "#ccc";
  ctx.lineWidth = isHero ? 5 : 3;

  if (style === "spear") {
    ctx.beginPath();
    ctx.moveTo(r * 0.2, r * 0.1);
    ctx.lineTo(r * 1.25, -r * 1.25);
    ctx.stroke();
  } else if (style === "halberd") {
    ctx.beginPath();
    ctx.moveTo(r * 0.25, r * 0.25);
    ctx.lineTo(r * 1.35, -r * 1.25);
    ctx.stroke();
    ctx.fillStyle = "#ddd";
    ctx.beginPath();
    ctx.moveTo(r * 1.3, -r * 1.25);
    ctx.lineTo(r * 1.55, -r * 1.0);
    ctx.lineTo(r * 1.18, -r * 1.05);
    ctx.closePath();
    ctx.fill();
  } else if (style === "glaive") {
    ctx.beginPath();
    ctx.moveTo(r * 0.2, r * 0.2);
    ctx.lineTo(r * 1.25, -r * 1.1);
    ctx.stroke();
    ctx.fillStyle = "#e8ffe8";
    ctx.beginPath();
    ctx.arc(r * 1.2, -r * 1.1, r * 0.18, 0, Math.PI * 2);
    ctx.fill();
  } else if (style === "mage" || style === "fan") {
    ctx.fillStyle = "rgba(255,255,255,.65)";
    ctx.beginPath();
    ctx.arc(r * 0.85, -r * 0.25, r * 0.28, 0, Math.PI * 2);
    ctx.fill();
  } else {
    ctx.beginPath();
    ctx.moveTo(r * 0.28, r * 0.05);
    ctx.lineTo(r * 1.0, -r * 0.95);
    ctx.stroke();
  }

  ctx.restore();
}

function drawEnemy(ctx, e) {
  let sx = e.x - camX;
  let style = "blade";

  if (e.kind === "archer" || e.kind === "demonArcher") style = "bow";
  if (e.kind === "mage" || e.kind === "demonMage") style = "mage";
  if (e.kind === "shield" || e.kind === "demonShield") style = "shield";
  if (e.kind === "boss" || e.kind === "demonBoss" || e.kind === "demonElite" || e.kind === "silverLegendBoss") style = e.silverCard ? e.silverCard.style : "halberd";

  drawCharacterArt(ctx, sx, e.y, e.r, e.color, style, false, e.x < pData.x ? 1 : -1);

  if (e.kind === "shield" || e.kind === "demonShield") {
    ctx.fillStyle = "#333";
    ctx.fillRect(sx - e.r * 0.8, e.y - e.r * 0.3, e.r * 0.45, e.r * 0.9);
  }

  if (e.kind === "archer" || e.kind === "demonArcher") {
    ctx.strokeStyle = "#f5c16c";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(sx + e.r * 0.3, e.y - e.r * 0.2, e.r * 0.5, -1.2, 1.2);
    ctx.stroke();
  }

  let hpWidth = e.kind === "silverLegendBoss" ? 120 : 50;
  let hpX = sx - hpWidth / 2;

  ctx.fillStyle = "#111";
  ctx.fillRect(hpX, e.y - e.r - 25, hpWidth, 6);
  ctx.fillStyle = e.kind === "silverLegendBoss" ? "#ffffff" : e.isBoss || e.isDemonMob ? "#ff44ff" : "#f33";
  ctx.fillRect(hpX, e.y - e.r - 25, hpWidth * Math.max(0, e.hp / e.maxHp), 6);

  ctx.fillStyle = e.kind === "silverLegendBoss" ? "#ffffff" : "#fff";
  ctx.font = "bold 11px Arial";
  ctx.textAlign = "center";

  if (e.kind === "silverLegendBoss") {
    ctx.fillText(e.silverCard ? e.silverCard.name : "白銀傳說BOSS", sx, e.y - e.r - 34);
  } else if (e.isDemonMob) {
    ctx.fillText("魔王兵", sx, e.y - e.r - 32);
  } else if (e.isBoss) {
    ctx.fillText(e.rage ? "狂暴BOSS" : e.phase2 ? "二階BOSS" : "BOSS", sx, e.y - e.r - 32);
  } else if (e.kind === "archer") {
    ctx.fillText("弓", sx, e.y - e.r - 32);
  } else if (e.kind === "mage") {
    ctx.fillText("法", sx, e.y - e.r - 32);
  } else if (e.kind === "shield") {
    ctx.fillText("盾", sx, e.y - e.r - 32);
  } else if (e.kind === "elite") {
    ctx.fillText("將", sx, e.y - e.r - 32);
  }
}

function drawItems() {
  items.forEach(it => {
    ctx.fillStyle = it.type === "baozi" ? "#4dff85" :
                    it.type === "wine" ? "#ffe35b" : "#ffe08a";
    ctx.beginPath();
    ctx.arc(it.x - camX, it.y, it.r, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = "#111";
    ctx.font = "14px serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(it.type === "baozi" ? "🥟" : it.type === "wine" ? "🍶" : "錢", it.x - camX, it.y);
  });
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!pData) return;

  camX = Math.max(0, Math.min(worldW - canvas.width, pData.x - canvas.width / 2));

  ctx.save();

  if (screenShake > 0) {
    ctx.translate((Math.random() * 2 - 1) * screenShake, (Math.random() * 2 - 1) * screenShake);
    screenShake *= 0.85;
    if (screenShake < 0.5) screenShake = 0;
  }

  ctx.fillStyle = difficultyKey === "demonKing" ? "#120018" : "#1e1308";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = difficultyKey === "demonKing" ? "rgba(255,255,255,0.12)" : "rgba(255,255,255,0.05)";
  for (let i = -camX % 100; i < canvas.width; i += 100) {
    ctx.beginPath();
    ctx.moveTo(i, 0);
    ctx.lineTo(i, canvas.height);
    ctx.stroke();
  }

  ctx.fillStyle = difficultyKey === "demonKing" ? "rgba(255,255,255,.08)" : "rgba(255,255,255,.04)";
  for (let x = -camX % 240; x < canvas.width; x += 240) {
    ctx.fillRect(x, canvas.height - 130, 140, 20);
  }

  slashes.forEach(s => {
    ctx.globalAlpha = s.life / s.max;
    ctx.fillStyle = s.col;
    ctx.beginPath();

    if (s.type === "circle") {
      ctx.arc(s.x - camX, s.y, s.rad, 0, Math.PI * 2);
      ctx.fill();
    } else if (s.type === "projectile") {
      ctx.arc(s.x - camX, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    } else {
      ctx.moveTo(s.x - camX, s.y);
      ctx.arc(s.x - camX, s.y, s.rad, s.a - s.sp / 2, s.a + s.sp / 2);
      ctx.fill();
    }
  });

  ctx.globalAlpha = 1;

  drawItems();

  es.forEach(e => drawEnemy(ctx, e));

  if (pData && pData.hp > 0) {
    if (pData.musou) {
      ctx.fillStyle = "rgba(255,215,0,0.3)";
      ctx.beginPath();
      ctx.arc(pData.x - camX, pData.y, pData.r * 2.1, 0, Math.PI * 2);
      ctx.fill();
    }

    drawCharacterArt(ctx, pData.x - camX, pData.y, pData.r, pData.base.color, pData.base.style, true, pData.fx);

    ctx.fillStyle = "#fff";
    ctx.font = "bold 14px Microsoft JhengHei";
    ctx.textAlign = "center";
    ctx.fillText(pData.name, pData.x - camX, pData.y - pData.r - 36);
  }

  texts.forEach(t => {
    t.y -= 1.5;
    ctx.globalAlpha = t.life / 30;
    ctx.fillStyle = t.c;
    ctx.font = "bold 20px Arial";
    ctx.fillText(t.t, t.x - camX, t.y);
  });

  ctx.globalAlpha = 1;

  texts = texts.filter(t => t.life-- > 0);
  slashes = slashes.filter(s => s.life-- > 0);

  ctx.restore();

  drawHUD();
}

function drawHUD() {
  if (!pData) return;

  $("hud").innerHTML = `
  <b style="color:#ffe08a">${pData.name} C${pData.cseq}</b>
  <div class="barrow"><span>HP</span><div class="bar"><div class="fill hp" style="width:${Math.max(0, pData.hp / pData.maxHp * 100)}%"></div></div></div>
  <div class="barrow"><span>特技</span><div class="bar"><div class="fill sk" style="width:${pData.sys.skillEnergy}%"></div></div></div>
  <div class="barrow"><span>絕招</span><div class="bar"><div class="fill ul" style="width:${pData.sys.ultimateEnergy}%"></div></div></div>
  <div class="barrow"><span>無雙</span><div class="bar"><div class="fill ms" style="width:${pData.sys.musouEnergy}%"></div></div></div>
  <div style="font-size:11px;color:#aaa">難度：${diff.name}｜敵人成長：${timePowerScale().toFixed(2)}x</div>
  `;
}

function battleLoop() {
  if (!over && pData) {
    battleFrame++;

    if (pData.hp <= 0) {
      over = 1;

      let cost = diff.revive;

      if ((mode.type === "online" || difficultyKey === "shura" || difficultyKey === "hell" || difficultyKey === "demonKing") && confirm(`戰死！花費 ${cost} 金錢接關？`)) {
        if (state.coin >= cost) {
          state.coin -= cost;
          pData.hp = pData.maxHp;
          pData.inv = 120;
          over = 0;
          save();
        } else {
          alert("金錢不足");
          exitBattle();
        }
      } else {
        msg("敗退...", "#f44");
        setTimeout(exitBattle, 1500);
      }
    }

    updateP(pData);
    updateE();
    updateProjectiles();
    handleOnline();

    items.forEach(it => it.life--);
    items = items.filter(it => it.life > 0);
  }

  draw();
  loop = requestAnimationFrame(battleLoop);
}

window.onload = () => {
  load();
  topbar();
  showMap();
};
</script>
</body>
</html>
