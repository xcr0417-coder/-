<!DOCTYPE html>

<title>三國志11 Web 戰棋完整版｜單檔整合版</title>
<style>
:root{
  --bg:#101010;
  --panel:#222;
  --panel2:#2f2f2f;
  --panel3:#3b2f20;
  --gold:#ffd36a;
  --red:#d9534f;
  --green:#61c46e;
  --blue:#5dade2;
  --purple:#b084f5;
  --text:#f2f2f2;
  --muted:#aaa;
  --border:#555;
  --dark:#000;
}
*{box-sizing:border-box;}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:"Microsoft JhengHei","PingFang TC",Arial,sans-serif;
  height:100vh;
  overflow:hidden;
}
button,select,input{
  font-family:inherit;
}
button{
  cursor:pointer;
  border:none;
  border-radius:8px;
  padding:8px 12px;
  background:#444;
  color:#fff;
  font-weight:bold;
}
button:hover{filter:brightness(1.15);}
button.primary{background:#b8860b;color:#fff;}
button.danger{background:#8b1e1e;}
button.green{background:#248a3d;}
button.blue{background:#1d5f91;}
button.purple{background:#6b3fa0;}
button.small{padding:4px 8px;font-size:12px;}
button:disabled{
  opacity:.45;
  cursor:not-allowed;
}
#app{
  width:100vw;
  height:100vh;
  display:flex;
  flex-direction:column;
}
#topbar{
  height:54px;
  background:#050505;
  border-bottom:2px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 14px;
  flex-shrink:0;
}
#title{
  font-size:18px;
  font-weight:bold;
  color:var(--gold);
  white-space:nowrap;
}
#resourceBar{
  display:flex;
  gap:14px;
  align-items:center;
  font-size:14px;
  flex-wrap:wrap;
}
.res{
  color:#eee;
}
.res b{
  color:var(--gold);
}
#main{
  flex:1;
  min-height:0;
  display:flex;
}
#sidebar{
  width:290px;
  background:var(--panel);
  border-right:2px solid var(--border);
  display:flex;
  flex-direction:column;
  overflow:auto;
  flex-shrink:0;
}
#content{
  flex:1;
  min-width:0;
  position:relative;
  overflow:hidden;
  background:#161616;
}
.tabs{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
  padding:10px;
  border-bottom:1px solid var(--border);
}
.tabBtn{
  background:#333;
  font-size:13px;
}
.tabBtn.active{
  background:#b8860b;
}
.panel{
  padding:12px;
  border-bottom:1px solid #444;
}
.panel h3{
  margin:0 0 8px 0;
  color:var(--gold);
  font-size:16px;
}
.panel p{
  margin:4px 0;
  line-height:1.5;
}
.muted{color:var(--muted);}
.good{color:var(--green);}
.bad{color:#ff7777;}
.gold{color:var(--gold);}
.blueText{color:#8ed1ff;}
.cardList{
  display:flex;
  flex-direction:column;
  gap:8px;
}
.card{
  background:var(--panel2);
  border:1px solid #555;
  border-radius:10px;
  padding:8px;
}
.card.selected{
  outline:2px solid var(--gold);
}
.card .name{
  font-weight:bold;
  color:var(--gold);
  display:flex;
  justify-content:space-between;
  gap:8px;
}
.card .meta{
  font-size:12px;
  color:#ccc;
  margin-top:4px;
  line-height:1.5;
}
#gameCanvas{
  width:100%;
  height:100%;
  display:block;
  background:#222;
  touch-action:none;
}
#battleHUD{
  position:absolute;
  left:10px;
  top:10px;
  background:rgba(0,0,0,.62);
  border:1px solid #777;
  border-radius:12px;
  padding:10px;
  min-width:230px;
  pointer-events:none;
}
#battleHUD h3{
  margin:0 0 6px 0;
  color:var(--gold);
}
#battleHUD p{
  margin:3px 0;
  font-size:13px;
}
#battleActions{
  position:absolute;
  right:12px;
  bottom:12px;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  justify-content:flex-end;
}
#logBox{
  position:absolute;
  left:10px;
  bottom:10px;
  width:420px;
  max-width:calc(100% - 20px);
  max-height:145px;
  overflow:auto;
  background:rgba(0,0,0,.68);
  border:1px solid #777;
  border-radius:10px;
  padding:8px;
  font-size:13px;
  line-height:1.45;
}
.logLine{margin-bottom:3px;}
#modalMask{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:99;
}
#modal{
  width:min(720px,92vw);
  max-height:88vh;
  overflow:auto;
  background:#252525;
  border:2px solid var(--gold);
  border-radius:16px;
  padding:18px;
  box-shadow:0 0 30px #000;
}
#modal h2{
  color:var(--gold);
  margin:0 0 12px 0;
}
#modalBody{
  line-height:1.65;
}
.modalBtns{
  display:flex;
  justify-content:flex-end;
  gap:8px;
  margin-top:14px;
}
.grid2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}
.grid3{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:8px;
}
.notice{
  background:#332b1a;
  border:1px solid #856404;
  padding:10px;
  border-radius:10px;
  color:#ffe5a3;
}
input,select{
  background:#111;
  color:#fff;
  border:1px solid #666;
  border-radius:8px;
  padding:8px;
  width:100%;
}
#touchPad{
  position:absolute;
  left:18px;
  bottom:170px;
  width:128px;
  height:128px;
  border-radius:50%;
  background:rgba(255,255,255,.08);
  border:2px solid rgba(255,255,255,.25);
  display:none;
  touch-action:none;
}
#touchStick{
  position:absolute;
  left:39px;
  top:39px;
  width:46px;
  height:46px;
  border-radius:50%;
  background:rgba(255,211,106,.65);
  border:2px solid rgba(255,255,255,.5);
}
@media(max-width:900px){
  #main{flex-direction:column;}
  #sidebar{
    width:100%;
    height:280px;
    border-right:none;
    border-bottom:2px solid var(--border);
  }
  #content{height:calc(100vh - 334px);}
  #resourceBar{font-size:12px;gap:8px;}
  #title{font-size:15px;}
  #battleHUD{font-size:12px;min-width:190px;}
  #logBox{display:none;}
  #touchPad{display:block;}
}
</style>
</head>

function defaultState(){
  return {
    lord:"劉備",
    gold:1500,
    food:1800,
    gear:800,
    gems:10,
    day:1,
    difficulty:"normal",

function initHeroState(s){
  HEROES.forEach(h=>{
    if(!s.heroes[h.id]){
      s.heroes[h.id]={
        lv:1,
        exp:0,
        loyal:h.loyal,
        equip:null,
        hp:100 + Math.floor((h.def+h.lead)/2),
        maxHp:100 + Math.floor((h.def+h.lead)/2)
      };
    }
  });
}

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const s = JSON.parse(raw);
      const d = defaultState();
      const merged = Object.assign(d,s);
      initHeroState(merged);
      return merged;
    }
  }catch(e){}
  const s = defaultState();
  initHeroState(s);
  return s;
}

function save(){
  localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
}

function resetGame(){
  if(!confirm("確定要重置所有存檔？"))return;
  localStorage.removeItem(STORAGE_KEY);
  state = defaultState();
  initHeroState(state);
  renderAll();
  drawHome();
}

function log(msg){
  state.log.unshift(`第${state.day}日：${msg}`);
  state.log = state.log.slice(0,80);
  save();
  renderLog();
}

function collectTax(){

function trainTroops(){
  if(state.gold<200 || state.food<200){
    showModal("資源不足","需要金 200、糧 200。");
    return;
  }
  state.gold-=200;
  state.food-=200;
  state.gear+=180;
  state.owned.forEach(id=>{
    state.heroes[id].loyal=clamp(state.heroes[id].loyal+1,0,100);
  });
  log("完成募兵訓練，兵裝 +180，已擁有武將忠誠 +1。");
  save();
  renderAll();
}

function nextDay(){
  state.day++;
  state.dailyClaimed=false;

  let foodCost = state.team.length * 80;
  state.food = Math.max(0,state.food-foodCost);

  state.owned.forEach(id=>{
    const h = hero(id);
    const hs = state.heroes[id];
    if(h.id==="lubu" && Math.random()<0.25)hs.loyal=clamp(hs.loyal-2,0,100);
    else hs.loyal=clamp(hs.loyal+0,0,100);
  });

  log(`進入下一日。隊伍消耗軍糧 ${foodCost}。`);
  save();
  renderAll();
}

function redeemGift(){
  const code = $("giftInput").value.trim().toUpperCase();
  if(!code)return;
  if(state.usedGifts.includes(code)){
    showModal("禮物碼已使用","這組禮物碼已經兌換過。");
    return;
  }
  const g = DB.gifts[code];
  if(!g){
    showModal("禮物碼錯誤","查無此禮物碼。");
    return;
  }
  state.gold += g.gold||0;
  state.food += g.food||0;
  state.gear += g.gear||0;
  state.gems += g.gems||0;
  state.usedGifts.push(code);
  log(`兌換禮物碼 ${code} 成功。`);
  save();
  renderAll();
}

function addTeam(id){
  if(state.team.includes(id))return;
  if(state.team.length>=5){
    showModal("隊伍已滿","最多只能上陣 5 人。");
    return;
  }
  state.team.push(id);
  log(`${hero(id).name} 加入隊伍。`);
  save();
  renderAll();
}

function removeTeam(id){
  state.team = state.team.filter(x=>x!==id);
  log(`${hero(id).name} 離開隊伍。`);
  save();
  renderAll();
}

function drawHero(n){
  const cost = n===10?9:1;
  if(state.gems<cost){
    showModal("玉璽不足",`需要玉璽 ${cost}。`);
    return;
  }
  state.gems-=cost;
  const results=[];
  for(let i=0;i<n;i++){
    const roll=Math.random()*100;
    let pool;
    if(roll<5)pool=HEROES.filter(h=>h.rarity==="UR");
    else if(roll<20)pool=HEROES.filter(h=>h.rarity==="SSR");
    else if(roll<55)pool=HEROES.filter(h=>h.rarity==="SR");
    else pool=HEROES.filter(h=>!["UR","SSR","SR"].includes(h.rarity));

    if(pool.length===0)pool=HEROES;
    const h=choice(pool);

    if(state.owned.includes(h.id)){
      state.heroes[h.id].exp += 60;
      state.heroes[h.id].loyal = clamp(state.heroes[h.id].loyal+2,0,100);
      levelCheck(h.id);
      results.push(`${h.name}（重複，轉經驗）`);
    }else{
      state.owned.push(h.id);
      results.push(`${h.name}（新武將）`);
    }
  }
  log(`完成登用：${results.join("、")}。`);
  save();
  renderAll();
  showModal("登用結果",results.map(x=>`<p>${x}</p>`).join(""));
}

function levelCheck(id){
  const hs=state.heroes[id];
  while(hs.exp>=100){
    hs.exp-=100;
    hs.lv++;
    hs.maxHp+=8;
    hs.hp=hs.maxHp;
  }
}

/* ===================== 戰鬥系統 ===================== */

const canvas = $("gameCanvas");
const ctx = canvas.getContext("2d");

let camera = {x:0,y:0};
let touch = {active:false,dx:0,dy:0};

function resizeCanvas(){
  const rect = $("content").getBoundingClientRect();
  canvas.width = Math.floor(rect.width * devicePixelRatio);
  canvas.height = Math.floor(rect.height * devicePixelRatio);
  canvas.style.width = rect.width+"px";
  canvas.style.height = rect.height+"px";
  ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
}
window.addEventListener("resize",resizeCanvas);

function startBattle(stageId){
  const st = STAGES.find(s=>s.id===stageId);
  if(state.team.length===0){
    showModal("無法出征","請先在隊伍頁至少上陣 1 名武將。");
    return;
  }
  const foodNeed = state.team.length*120;
  const gearNeed = state.team.length*80;
  if(state.food<foodNeed || state.gear<gearNeed){
    showModal("資源不足",`出征需要糧 ${foodNeed}、兵裝 ${gearNeed}。`);
    return;
  }
  state.food-=foodNeed;
  state.gear-=gearNeed;

  const map = createMap(st.map);
  const units = [];

  state.team.forEach((id,i)=>{
    const h = hero(id);
    const hs = state.heroes[id];
    units.push({
      uid:"p"+i,
      side:"player",
      heroId:id,
      name:h.name,
      x:1,
      y:2+i,
      hp:hs.maxHp,
      maxHp:hs.maxHp,
      mp:20,
      atk:h.atk + hs.lv*2 + (state.techs.includes("drill")?5:0),
      def:h.def + hs.lv + (state.techs.includes("armor")?5:0),
      int:h.int,
      lead:h.lead,
      arm:h.arm,
      range:arm(h.arm).range,
      move:arm(h.arm).move + (state.techs.includes("march")?1:0),
      skill:h.skill,
      acted:false,
      guard:false
    });
  });

  const diff = difficulty();
  const enemyCount = st.boss ? 5 : 3 + Math.floor(STAGES.findIndex(s=>s.id===stageId)/1);
  for(let i=0;i<enemyCount;i++){
    const isBoss = st.boss && i===0;
    const baseHp = isBoss?420:160+STAGES.findIndex(s=>s.id===stageId)*40;
    const baseAtk = isBoss?105:68+STAGES.findIndex(s=>s.id===stageId)*10;
    const arms = ["spear","cavalry","bow","shield","mage"];
    units.push({
      uid:"e"+i,
      side:"enemy",
      heroId:null,
      name:isBoss?st.enemy:choice(["賊將","精兵","弓隊","騎隊","軍師"]),
      x:10 + (i%3),
      y:2 + i,
      hp:Math.floor(baseHp*diff.enemyHp),
      maxHp:Math.floor(baseHp*diff.enemyHp),
      mp:16,
      atk:Math.floor(baseAtk*diff.enemyAtk),
      def:isBoss?90:55+rand(0,20),
      int:isBoss?92:50+rand(0,30),
      lead:isBoss?95:60+rand(0,25),
      arm:isBoss?"mage":choice(arms),
      range:isBoss?3:arm(choice(arms)).range,
      move:isBoss?3:2+rand(0,1),
      skill:isBoss?"fire":choice(["rush","arrow","guard"]),
      acted:false,
      guard:false,
      boss:isBoss
    });
  }

  state.battle = {
    active:true,
    stageId,
    stageName:st.name,
    map,
    units,
    turn:"player",
    round:1,
    selected:null,
    mode:"select",
    cursor:{x:0,y:0},
    reward:st.reward,
    boss:st.boss
  };

  state.tab="battle";
  log(`出征 ${st.name}，消耗糧 ${foodNeed}、兵裝 ${gearNeed}。`);
  save();
  renderAll();
}

function createMap(type){
  const w=14,h=10;
  const tiles=[];
  for(let y=0;y<h;y++){
    const row=[];
    for(let x=0;x<w;x++){
      let t="plain";
      if(type==="water" && (y===4||y===5))t="water";
      if(type==="river" && x===6)t="water";
      if(type==="mountain" && (x>7&&y<4))t="mountain";
      if(type==="city" && x>8&&y>5)t="city";
      if(Math.random()<0.05)t="forest";
      row.push(t);
    }
    tiles.push(row);
  }
  return {w,h,tiles};
}

function tileCost(t){
  if(t==="water")return 2;
  if(t==="mountain")return 3;
  if(t==="forest")return 2;
  return 1;
}

function isBlocked(x,y){
  const b=state.battle;
  if(!b)return true;
  if(x<0||y<0||x>=b.map.w||y>=b.map.h)return true;
  return b.units.some(u=>u.hp>0&&u.x===x&&u.y===y);
}

function unitAt(x,y){
  const b=state.battle;
  if(!b)return null;
  return b.units.find(u=>u.hp>0&&u.x===x&&u.y===y)||null;
}

function dist(a,b){
  return Math.abs(a.x-b.x)+Math.abs(a.y-b.y);
}

function updateHud(){
  const b=state.battle;
  if(!b || !b.active){
    $("hudTitle").textContent="主城待命";
    $("hudInfo").textContent="請從左側選擇功能。";
    $("hudTurn").textContent="";
    $("hudSelected").textContent="";
    return;
  }
  $("hudTitle").textContent=b.stageName;
  $("hudInfo").textContent=`回合：${b.turn==="player"?"我方":"敵方"}`;
  $("hudTurn").textContent=`第 ${b.round} 回合`;
  const u=b.units.find(x=>x.uid===b.selected);
  $("hudSelected").textContent=u?`選取：${u.name} HP ${u.hp}/${u.maxHp} MP ${u.mp}`:"尚未選取單位";
}

function renderLog(){
  $("logBox").innerHTML = state.log.slice(0,25).map(x=>`<div class="logLine">${x}</div>`).join("");
}

function battleLoop(){
  resizeCanvas();
  requestAnimationFrame(loop);
}

function loop(){
  updateCamera();
  draw();
  requestAnimationFrame(loop);
}

function updateCamera(){
  camera.x += touch.dx*5;
  camera.y += touch.dy*5;
  camera.x = clamp(camera.x, -200, 200);
  camera.y = clamp(camera.y, -150, 150);
}

function draw(){
  const w=canvas.clientWidth;
  const h=canvas.clientHeight;
  ctx.clearRect(0,0,w,h);

  if(!state.battle || !state.battle.active){
    drawHome();
    return;
  }
  drawBattle();
}

function drawHome(){
  const w=canvas.clientWidth;
  const h=canvas.clientHeight;
  ctx.fillStyle="#151515";
  ctx.fillRect(0,0,w,h);

  ctx.fillStyle="#2f2416";
  ctx.fillRect(0,0,w,h);

  drawCastle(w/2,h/2-20,1.4);

  ctx.fillStyle="#ffd36a";
  ctx.font="bold 28px Microsoft JhengHei";
  ctx.textAlign="center";
  ctx.fillText(`${state.lord} 軍 主城`,w/2,80);

  ctx.fillStyle="#eee";
  ctx.font="16px Microsoft JhengHei";
  ctx.fillText("請從左側選擇：內政、出征、隊伍、武將、技巧或管理。",w/2,112);

  ctx.fillStyle="#fff";
  ctx.font="14px Microsoft JhengHei";
  ctx.fillText(`金 ${state.gold}｜糧 ${state.food}｜兵裝 ${state.gear}｜玉璽 ${state.gems}`,w/2,h-45);
}

function drawCastle(x,y,s){
  ctx.save();
  ctx.translate(x,y);
  ctx.scale(s,s);
  ctx.fillStyle="#4b2e18";
  ctx.fillRect(-90,20,180,80);
  ctx.fillStyle="#6b3d1e";
  ctx.fillRect(-70,-20,140,50);
  ctx.fillStyle="#8b5a2b";
  ctx.fillRect(-45,-60,90,45);
  ctx.fillStyle="#222";
  ctx.fillRect(-20,55,40,45);
  ctx.fillStyle="#ffd36a";
  ctx.fillRect(-80,30,20,20);
  ctx.fillRect(60,30,20,20);
  ctx.fillStyle="#b22222";
  ctx.beginPath();
  ctx.moveTo(-100,20);ctx.lineTo(0,-25);ctx.lineTo(100,20);ctx.closePath();ctx.fill();
  ctx.beginPath();
  ctx.moveTo(-60,-20);ctx.lineTo(0,-70);ctx.lineTo(60,-20);ctx.closePath();ctx.fill();
  ctx.restore();
}

function drawBattle(){
  const b=state.battle;
  const tile=56;
  const ox=80+camera.x;
  const oy=80+camera.y;

  ctx.fillStyle="#0f1513";
  ctx.fillRect(0,0,canvas.clientWidth,canvas.clientHeight);

  for(let y=0;y<b.map.h;y++){
    for(let x=0;x<b.map.w;x++){
      const t=b.map.tiles[y][x];
      const px=ox+x*tile;
      const py=oy+y*tile;
      drawTile(px,py,t,tile);
      if(b.selected){
        const u=b.units.find(z=>z.uid===b.selected);
        if(u && dist(u,{x,y})<=u.move && !u.acted){
          ctx.fillStyle="rgba(255,211,106,.14)";
          ctx.fillRect(px,py,tile,tile);
        }
      }
    }
  }

  b.units.filter(u=>u.hp>0).forEach(u=>{
    drawUnit(ox+u.x*tile+tile/2, oy+u.y*tile+tile/2, u, tile);
  });

  const sel=b.units.find(u=>u.uid===b.selected);
  if(sel){
    ctx.strokeStyle="#ffd36a";
    ctx.lineWidth=3;
    ctx.strokeRect(ox+sel.x*tile+4,oy+sel.y*tile+4,tile-8,tile-8);
  }
}

function drawTile(x,y,t,size){
  const colors={
    plain:"#3d7a3d",
    forest:"#245b2a",
    water:"#246b8f",
    mountain:"#6f6250",
    city:"#7b5c39"
  };
  ctx.fillStyle=colors[t]||"#444";
  ctx.fillRect(x,y,size,size);
  ctx.strokeStyle="rgba(0,0,0,.35)";
  ctx.strokeRect(x,y,size,size);

  if(t==="forest"){
    ctx.fillStyle="#143d18";
    ctx.beginPath();
    ctx.arc(x+18,y+22,10,0,Math.PI*2);
    ctx.arc(x+34,y+30,12,0,Math.PI*2);
    ctx.fill();
  }
  if(t==="water"){
    ctx.strokeStyle="rgba(255,255,255,.25)";
    ctx.beginPath();
    ctx.moveTo(x+8,y+20);
    ctx.quadraticCurveTo(x+22,y+12,x+36,y+20);
    ctx.quadraticCurveTo(x+48,y+28,x+55,y+20);
    ctx.stroke();
  }
  if(t==="mountain"){
    ctx.fillStyle="#4b4036";
    ctx.beginPath();
    ctx.moveTo(x+10,y+45);
    ctx.lineTo(x+28,y+12);
    ctx.lineTo(x+46,y+45);
    ctx.closePath();
    ctx.fill();
  }
  if(t==="city"){
    ctx.fillStyle="#4b2e18";
    ctx.fillRect(x+15,y+20,26,24);
    ctx.fillStyle="#b22222";
    ctx.beginPath();
    ctx.moveTo(x+12,y+20);
    ctx.lineTo(x+28,y+8);
    ctx.lineTo(x+44,y+20);
    ctx.closePath();
    ctx.fill();
  }
}

function drawUnit(cx,cy,u,size){
  ctx.save();
  ctx.translate(cx,cy);

  const isPlayer=u.side==="player";
  ctx.fillStyle=isPlayer?"#2d8cff":"#d94444";
  ctx.beginPath();
  ctx.arc(0,0,20,0,Math.PI*2);
  ctx.fill();

  ctx.strokeStyle=u.boss?"#ffd36a":"#111";
  ctx.lineWidth=u.boss?4:2;
  ctx.stroke();

  ctx.fillStyle="#fff";
  ctx.font="bold 12px Microsoft JhengHei";
  ctx.textAlign="center";
  ctx.fillText(u.name,0,-28);

  ctx.fillStyle="#000";
  ctx.fillRect(-24,23,48,6);
  ctx.fillStyle=u.hp/u.maxHp>.5?"#61c46e":u.hp/u.maxHp>.25?"#ffd36a":"#ff6666";
  ctx.fillRect(-24,23,48*(u.hp/u.maxHp),6);

  ctx.fillStyle="#fff";
  ctx.font="11px Arial";
  ctx.fillText(arm(u.arm).name,0,5);

  if(u.acted){
    ctx.fillStyle="rgba(0,0,0,.45)";
    ctx.beginPath();
    ctx.arc(0,0,22,0,Math.PI*2);
    ctx.fill();
  }

  if(u.guard){
    ctx.strokeStyle="#9ee7ff";
    ctx.lineWidth=3;
    ctx.beginPath();
    ctx.arc(0,0,26,0,Math.PI*2);
    ctx.stroke();
  }

  ctx.restore();
}

canvas.addEventListener("click",handleCanvasClick);

function canvasToGrid(e){
  const rect=canvas.getBoundingClientRect();
  const x=e.clientX-rect.left;
  const y=e.clientY-rect.top;
  const tile=56;
  const ox=80+camera.x;
  const oy=80+camera.y;
  return {
    gx:Math.floor((x-ox)/tile),
    gy:Math.floor((y-oy)/tile)
  };
}

function handleCanvasClick(e){
  const b=state.battle;
  if(!b || !b.active || b.turn!=="player")return;
  const {gx,gy}=canvasToGrid(e);
  const clicked=unitAt(gx,gy);

  if(clicked && clicked.side==="player" && !clicked.acted){
    b.selected=clicked.uid;
    updateHud();
    save();
    return;
  }

  const sel=b.units.find(u=>u.uid===b.selected);
  if(!sel || sel.acted)return;

  if(clicked && clicked.side==="enemy"){
    if(dist(sel,clicked)<=sel.range){
      attack(sel,clicked,false);
    }else{
      log(`${sel.name} 距離不足，無法攻擊 ${clicked.name}。`);
    }
    afterPlayerAction();
    return;
  }

  if(!clicked && gx>=0&&gy>=0&&gx<b.map.w&&gy<b.map.h){
    if(dist(sel,{x:gx,y:gy})<=sel.move){
      sel.x=gx;
      sel.y=gy;
      sel.acted=true;
      log(`${sel.name} 移動至 (${gx},${gy})。`);
      afterPlayerAction();
    }
  }
}

function attack(a,d,skillMode){
  let power = a.atk - d.def*0.45;
  if(a.arm==="mage")power = a.int - d.def*0.25;
  let mul=1;
  if(skillMode)mul=1.3;
  if(a.guard)mul*=0.8;

  let dmg = Math.max(8,Math.floor(power*mul + rand(-8,10)));
  if(d.guard)dmg=Math.floor(dmg*0.55);
  d.hp = Math.max(0,d.hp-dmg);

  log(`${a.name} 攻擊 ${d.name}，造成 ${dmg} 傷害。`);

  if(d.hp<=0){
    log(`${d.name} 被擊破。`);
  }

  checkBattleEnd();
}

function afterPlayerAction(){
  const b=state.battle;
  b.selected=null;
  updateHud();
  if(b.units.filter(u=>u.side==="player"&&u.hp>0).every(u=>u.acted)){
    endPlayerTurn();
  }
  save();
  renderAll();
}

function endPlayerTurn(){
  const b=state.battle;
  if(!b || !b.active)return;
  b.turn="enemy";
  b.units.forEach(u=>{if(u.side==="enemy"){u.acted=false;u.guard=false;}});
  updateHud();
  setTimeout(enemyTurn,500);
}

function enemyTurn(){
  const b=state.battle;
  if(!b || !b.active)return;

  const enemies=b.units.filter(u=>u.side==="enemy"&&u.hp>0);
  for(const e of enemies){
    const players=b.units.filter(u=>u.side==="player"&&u.hp>0);
    if(players.length===0)break;
    let target=players.sort((a,b)=>dist(e,a)-dist(e,b))[0];

    if(dist(e,target)>e.range){
      moveToward(e,target);
    }

    target=b.units.filter(u=>u.side==="player"&&u.hp>0).sort((a,b)=>dist(e,a)-dist(e,b))[0];
    if(target && dist(e,target)<=e.range){
      attack(e,target,false);
    }else if(Math.random()<0.25){
      e.guard=true;
      log(`${e.name} 採取防禦。`);
    }
    e.acted=true;
  }

  if(!checkBattleEnd()){
    b.turn="player";
    b.round++;
    b.units.forEach(u=>{if(u.side==="player"){u.acted=false;u.guard=false;u.mp=Math.min(20,u.mp+4);}});
    log(`進入第 ${b.round} 回合。`);
    updateHud();
    save();
    renderAll();
  }
}

function moveToward(u,t){
  let best={x:u.x,y:u.y,d:dist(u,t)};
  const dirs=[[1,0],[-1,0],[0,1],[0,-1]];
  for(let step=0;step<u.move;step++){
    let moved=false;
    for(const [dx,dy] of dirs.sort(()=>Math.random()-0.5)){
      const nx=u.x+dx, ny=u.y+dy;
      if(nx<0||ny<0||nx>=state.battle.map.w||ny>=state.battle.map.h)continue;
      if(isBlocked(nx,ny))continue;
      const nd=dist({x:nx,y:ny},t);
      if(nd<best.d){
        best={x:nx,y:ny,d:nd};
        moved=true;
      }
    }
    if(moved){
      u.x=best.x;
      u.y=best.y;
    }else break;
  }
}

function checkBattleEnd(){
  const b=state.battle;
  if(!b || !b.active)return false;

  const aliveP=b.units.some(u=>u.side==="player"&&u.hp>0);
  const aliveE=b.units.some(u=>u.side==="enemy"&&u.hp>0);

  if(!aliveP){
    b.active=false;
    log("戰鬥失敗，全軍撤退。");
    save();
    renderAll();
    showModal("戰敗","我方全滅，請整備後再戰。");
    return true;
  }

  if(!aliveE){
    b.active=false;
    const st=STAGES.find(s=>s.id===b.stageId);
    const diff=difficulty();
    const reward=Math.floor(st.reward*diff.reward);
    state.gold+=reward;
    state.food+=Math.floor(reward*0.6);
    state.gear+=Math.floor(reward*0.35);

    const drop = rollDrop();
    applyDrop(drop);

    state.team.forEach(id=>{
      state.heroes[id].exp+=60+(st.boss?60:0);
      levelCheck(id);
      state.heroes[id].hp=state.heroes[id].maxHp;
    });

    unlockNextStage(st.id);

    log(`戰鬥勝利，獲得金 ${reward}，掉落 ${drop.name}。`);
    save();
    renderAll();
    showModal("勝利",`
      <p>攻克 ${st.name}。</p>
      <p>獲得金：${reward}</p>
      <p>獲得糧：${Math.floor(reward*0.6)}</p>
      <p>獲得兵裝：${Math.floor(reward*0.35)}</p>
      <p>掉落：<b class="gold">${drop.name}</b>｜${drop.desc}</p>
    `);
    return true;
  }
  return false;
}

function unlockNextStage(id){
  const idx=STAGES.findIndex(s=>s.id===id);
  if(idx>=0 && idx<STAGES.length-1){
    state.currentStage=STAGES[idx+1].id;
  }
}

function rollDrop(){
  const pool=DB.items;
  return choice(pool);
}

function applyDrop(item){
  if(item.id==="rice")state.food+=500;
  if(item.id==="coin")state.gold+=500;
  if(item.id==="gear")state.gear+=300;
  if(item.id==="book"){
    const id=choice(state.team);
    state.heroes[id].exp+=80;
    levelCheck(id);
  }
  if(item.id==="horse"){
    state.gold+=300;
  }
  if(item.id==="blade"){
    state.gear+=300;
  }
  if(item.id==="armor"){
    state.gear+=300;
  }
}

$("btnEndTurn").onclick=()=>{
  const b=state.battle;
  if(!b || !b.active || b.turn!=="player")return;
  b.units.forEach(u=>{if(u.side==="player")u.acted=true;});
  log("我方結束回合。");
  endPlayerTurn();
};

$("btnWait").onclick=()=>{
  const b=state.battle;
  if(!b || !b.active)return;
  const u=b.units.find(x=>x.uid===b.selected);
  if(!u)return;
  u.acted=true;
  log(`${u.name} 待機。`);
  afterPlayerAction();
};

$("btnRetreat").onclick=()=>{
  const b=state.battle;
  if(!b || !b.active)return;
  if(!confirm("確定撤退？"))return;
  b.active=false;
  log("我方撤退。");
  save();
  renderAll();
};

$("btnSkill").onclick=()=>{
  const b=state.battle;
  if(!b || !b.active || b.turn!=="player")return;
  const u=b.units.find(x=>x.uid===b.selected);
  if(!u){
    showModal("尚未選取","請先選取一名我方武將。");
    return;
  }
  const sk=skill(u.skill);
  if(u.mp<sk.cost){
    showModal("氣力不足",`${u.name} 使用 ${sk.name} 需要 MP ${sk.cost}。`);
    return;
  }

  if(sk.type==="heal"){
    const allies=b.units.filter(x=>x.side==="player"&&x.hp>0);
    const target=allies.sort((a,b)=>(a.hp/a.maxHp)-(b.hp/b.maxHp))[0];
    const heal=Math.floor(target.maxHp*sk.power);
    target.hp=clamp(target.hp+heal,0,target.maxHp);
    u.mp-=sk.cost;
    u.acted=true;
    log(`${u.name} 使用 ${sk.name}，${target.name} 恢復 ${heal}。`);
    afterPlayerAction();
    return;
  }

  if(sk.type==="buff"){
    u.guard=true;
    u.mp-=sk.cost;
    u.acted=true;
    log(`${u.name} 使用 ${sk.name}，進入防禦狀態。`);
    afterPlayerAction();
    return;
  }

  showModal("選擇目標",`
    <p>${u.name} 的戰法：<b>${sk.name}</b></p>
    <p>請關閉視窗後，點選射程內敵人。此版本的戰法會套用在下一次普通攻擊倍率中。</p>
    <p class="muted">簡化處理：點選敵人時仍會以普通攻擊流程計算，但可先扣 MP 並提高傷害。</p>
  `,`<button class="primary" onclick="prepareSkillAttack()">準備戰法</button><button onclick="closeModal()">取消</button>`);
};

function prepareSkillAttack(){
  const b=state.battle;
  const u=b.units.find(x=>x.uid===b.selected);
  if(!u)return;
  const sk=skill(u.skill);
  if(u.mp<sk.cost)return;
  u.mp-=sk.cost;
  u.skillReady=true;
  closeModal();
  log(`${u.name} 準備使用 ${sk.name}。請點選敵方目標。`);
}

/* 覆蓋攻擊：若有 skillReady，使用戰法倍率 */
const oldAttack = attack;
attack = function(a,d,skillMode){
  let useSkill = a.skillReady || skillMode;
  let sk = useSkill ? skill(a.skill) : null;

  let power = a.atk - d.def*0.45;
  if(a.arm==="mage")power = a.int - d.def*0.25;

  let mul=1;
  if(useSkill && sk){
    mul = sk.power || 1.25;
    a.skillReady=false;
  }
  if(d.guard)mul*=0.55;

  let dmg = Math.max(8,Math.floor(power*mul + rand(-8,10)));

  if(useSkill && sk && sk.type==="aoe"){
    const b=state.battle;
    const targets=b.units.filter(x=>x.side!==a.side&&x.hp>0&&dist(d,x)<=1);
    targets.forEach(t=>{
      const aoeDmg=Math.max(6,Math.floor(dmg*(t.uid===d.uid?1:0.65)));
      t.hp=Math.max(0,t.hp-aoeDmg);
      log(`${a.name} 使用 ${sk.name}，${t.name} 受到 ${aoeDmg} 傷害。`);
      if(t.hp<=0)log(`${t.name} 被擊破。`);
    });
  }else{
    d.hp = Math.max(0,d.hp-dmg);
    log(`${a.name}${useSkill&&sk?` 使用 ${sk.name}`:""}攻擊 ${d.name}，造成 ${dmg} 傷害。`);
    if(d.hp<=0)log(`${d.name} 被擊破。`);
  }

  checkBattleEnd();
};

/* ===================== 觸控搖桿 ===================== */
const pad=$("touchPad");
const stick=$("touchStick");

pad.addEventListener("touchstart",e=>{
  touch.active=true;
  e.preventDefault();
});
pad.addEventListener("touchmove",e=>{
  const rect=pad.getBoundingClientRect();
  const t=e.touches[0];
  const cx=rect.left+rect.width/2;
  const cy=rect.top+rect.height/2;
  let dx=(t.clientX-cx)/50;
  let dy=(t.clientY-cy)/50;
  const len=Math.hypot(dx,dy);
  if(len>1){dx/=len;dy/=len;}
  touch.dx=dx;
  touch.dy=dy;
  stick.style.left=(39+dx*35)+"px";
  stick.style.top=(39+dy*35)+"px";
  e.preventDefault();
});
pad.addEventListener("touchend",e=>{
  touch.active=false;
  touch.dx=0;
  touch.dy=0;
  stick.style.left="39px";
  stick.style.top="39px";
  e.preventDefault();
});

/* ===================== 鍵盤 ===================== */
window.addEventListener("keydown",e=>{
  if(e.key==="ArrowLeft")camera.x+=30;
  if(e.key==="ArrowRight")camera.x-=30;
  if(e.key==="ArrowUp")camera.y+=30;
  if(e.key==="ArrowDown")camera.y-=30;
});

/* ===================== 初始化 ===================== */
renderAll();
battleLoop();
</script>
