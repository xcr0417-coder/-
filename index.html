<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>三國幻戰風格 H5 自動戰鬥 RPG</title>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: "Microsoft JhengHei", sans-serif;
  background: linear-gradient(#22140c, #090504);
  color: #f8e7b0;
}
#app {
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
header {
  height: 58px;
  background: linear-gradient(90deg, #3b1609, #7a3515, #3b1609);
  border-bottom: 2px solid #d8a84f;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 14px;
}
header h1 {
  font-size: 22px;
  margin: 0;
  color: gold;
}
.resource {
  font-size: 14px;
}
main {
  flex: 1;
  display: flex;
  overflow: hidden;
}
#side {
  width: 180px;
  background: rgba(0,0,0,.35);
  border-right: 1px solid #8b6a32;
  padding: 12px;
}
.navbtn {
  width: 100%;
  margin-bottom: 10px;
  padding: 12px;
  background: linear-gradient(#7c3d1a, #3d1809);
  color: #ffe9aa;
  border: 1px solid #d8a84f;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
}
.navbtn:hover {
  filter: brightness(1.2);
}
#content {
  flex: 1;
  padding: 14px;
  overflow-y: auto;
}
.panel {
  background: rgba(0,0,0,.42);
  border: 1px solid #9c7938;
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 14px;
}
.title {
  color: gold;
  font-size: 20px;
  margin-bottom: 10px;
}
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 12px;
}
.hero-card {
  background: linear-gradient(#352015, #15100c);
  border: 1px solid #8b6a32;
  border-radius: 10px;
  padding: 10px;
  text-align: center;
}
.hero-card.ssr { border-color: #ff4df0; }
.hero-card.ur { border-color: #ffcc00; box-shadow: 0 0 10px #d49c21; }
.avatar {
  width: 70px;
  height: 70px;
  margin: 0 auto 8px;
  border-radius: 50%;
  background: radial-gradient(circle, #ffe19a, #713000);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
}
button {
  cursor: pointer;
  border-radius: 6px;
  border: 1px solid #d8a84f;
  background: linear-gradient(#9c5627, #4a1d0a);
  color: #ffe9aa;
  padding: 7px 10px;
  margin: 3px;
}
button:disabled {
  opacity: .45;
  cursor: not-allowed;
}
.team-slot {
  display: inline-block;
  width: 130px;
  min-height: 120px;
  margin: 8px;
  padding: 10px;
  border: 1px dashed #d8a84f;
  border-radius: 10px;
  text-align: center;
  background: rgba(255,255,255,.05);
}
.battlefield {
  height: 460px;
  background: radial-gradient(circle, #573116, #130b07);
  border: 2px solid #9c7938;
  border-radius: 12px;
  position: relative;
  overflow: hidden;
}
.unit {
  position: absolute;
  width: 86px;
  height: 76px;
  border-radius: 12px;
  text-align: center;
  padding-top: 5px;
  font-size: 13px;
  border: 1px solid #fff2a8;
}
.ally {
  background: linear-gradient(#204b8f, #10233f);
}
.enemy {
  background: linear-gradient(#8f2020, #3f1010);
}
.hpbar, .ragebar {
  height: 6px;
  background: #111;
  margin: 3px 6px;
  border-radius: 4px;
  overflow: hidden;
}
.hpfill {
  height: 100%;
  background: #37e66c;
}
.ragefill {
  height: 100%;
  background: #ffd700;
}
.log {
  height: 150px;
  overflow-y: auto;
  background: rgba(0,0,0,.55);
  border: 1px solid #6c4b22;
  border-radius: 8px;
  padding: 8px;
  font-size: 13px;
}
.big {
  font-size: 24px;
  color: gold;
}
.tag {
  display: inline-block;
  padding: 2px 6px;
  border-radius: 5px;
  background: #5a2b12;
  color: #ffd98a;
  font-size: 12px;
}
</style>
</head>

<body>
<div id="app">
  <header>
    <h1>三國幻武傳 H5</h1>
    <div class="resource">
      金幣：<span id="gold">0</span>　
      元寶：<span id="jade">0</span>　
      關卡：<span id="stage">1</span>
    </div>
  </header>

  <main>
    <div id="side">
      <button class="navbtn" onclick="showHome()">主城</button>
      <button class="navbtn" onclick="showHeroes()">武將</button>
      <button class="navbtn" onclick="showTeam()">陣容</button>
      <button class="navbtn" onclick="showSummon()">抽將</button>
      <button class="navbtn" onclick="showBattle()">關卡戰鬥</button>
    </div>

    <div id="content"></div>
  </main>
</div>

<script>
const heroPool = [
  { id:"zhaoyun", name:"趙雲", camp:"蜀", rare:"SSR", role:"輸出", icon:"🐉", hp:620, atk:95, def:32, skill:"龍膽突襲" },
  { id:"guanyu", name:"關羽", camp:"蜀", rare:"SSR", role:"戰士", icon:"🟢", hp:760, atk:88, def:42, skill:"青龍偃月" },
  { id:"zhangfei", name:"張飛", camp:"蜀", rare:"SR", role:"坦克", icon:"🛡️", hp:900, atk:70, def:58, skill:"怒吼震軍" },
  { id:"zhugeliang", name:"諸葛亮", camp:"蜀", rare:"UR", role:"法師", icon:"🪭", hp:560, atk:120, def:28, skill:"八卦天雷" },
  { id:"caocao", name:"曹操", camp:"魏", rare:"SSR", role:"統帥", icon:"👑", hp:720, atk:85, def:45, skill:"霸者號令" },
  { id:"lubu", name:"呂布", camp:"群", rare:"UR", role:"輸出", icon:"🔥", hp:880, atk:135, def:45, skill:"無雙亂舞" },
  { id:"diaochan", name:"貂蟬", camp:"群", rare:"SSR", role:"輔助", icon:"🌸", hp:580, atk:78, def:34, skill:"閉月魅舞" },
  { id:"sunshangxiang", name:"孫尚香", camp:"吳", rare:"SR", role:"射手", icon:"🏹", hp:540, atk:82, def:30, skill:"連弩齊射" },
  { id:"zhouyu", name:"周瑜", camp:"吳", rare:"SSR", role:"法師", icon:"🔥", hp:570, atk:112, def:30, skill:"赤壁烈焰" },
  { id:"xuchu", name:"許褚", camp:"魏", rare:"SR", role:"坦克", icon:"🐯", hp:940, atk:72, def:60, skill:"虎癡猛擊" }
];

let state = {
  gold: 3000,
  jade: 300,
  stage: 1,
  heroes: [],
  team: [],
  log: []
};

function save() {
  localStorage.setItem("sanguo_h5_save", JSON.stringify(state));
}

function load() {
  const data = localStorage.getItem("sanguo_h5_save");
  if (data) state = JSON.parse(data);
  if (state.heroes.length === 0) {
    addHero("zhaoyun");
    addHero("zhangfei");
    addHero("sunshangxiang");
    state.team = [state.heroes[0].uid, state.heroes[1].uid, state.heroes[2].uid];
  }
}

function addHero(id) {
  const base = heroPool.find(h => h.id === id);
  const hero = {
    ...base,
    uid: id + "_" + Date.now() + "_" + Math.floor(Math.random()*9999),
    level: 1,
    star: base.rare === "UR" ? 3 : base.rare === "SSR" ? 2 : 1,
    exp: 0
  };
  state.heroes.push(hero);
  save();
  return hero;
}

function power(h) {
  return Math.floor((h.hp + h.atk * 8 + h.def * 6) * (1 + h.level * 0.08 + h.star * 0.12));
}

function stat(h, key) {
  return Math.floor(h[key] * (1 + h.level * 0.08 + h.star * 0.12));
}

function updateTop() {
  document.getElementById("gold").textContent = state.gold;
  document.getElementById("jade").textContent = state.jade;
  document.getElementById("stage").textContent = state.stage;
}

function setContent(html) {
  document.getElementById("content").innerHTML = html;
  updateTop();
}

function showHome() {
  setContent(`
    <div class="panel">
      <div class="title">主城</div>
      <p class="big">歡迎回到亂世戰場</p>
      <p>目前玩法：抽將、升級、編隊、5v5 自動戰鬥、推進關卡。</p>
      <p>建議先去「抽將」取得武將，再到「陣容」編隊，最後進入「關卡戰鬥」。</p>
    </div>

    <div class="panel">
      <div class="title">目前戰力</div>
      <p>總武將數：${state.heroes.length}</p>
      <p>上陣人數：${state.team.length} / 5</p>
      <p>隊伍戰力：${teamPower()}</p>
    </div>
  `);
}

function showHeroes() {
  let html = `<div class="panel"><div class="title">武將列表</div><div class="card-grid">`;
  state.heroes.forEach(h => {
    html += `
      <div class="hero-card ${h.rare.toLowerCase()}">
        <div class="avatar">${h.icon}</div>
        <b>${h.name}</b><br>
        <span class="tag">${h.camp}</span>
        <span class="tag">${h.rare}</span>
        <span class="tag">${h.role}</span>
        <p>Lv.${h.level}　${h.star}★</p>
        <p>戰力：${power(h)}</p>
        <p>技能：${h.skill}</p>
        <button onclick="levelHero('${h.uid}')">升級 500 金幣</button>
      </div>
    `;
  });
  html += `</div></div>`;
  setContent(html);
}

function levelHero(uid) {
  const h = state.heroes.find(x => x.uid === uid);
  if (!h || state.gold < 500) return alert("金幣不足");
  state.gold -= 500;
  h.level++;
  save();
  showHeroes();
}

function showTeam() {
  let html = `<div class="panel"><div class="title">目前陣容</div>`;
  for (let i = 0; i < 5; i++) {
    const uid = state.team[i];
    const h = state.heroes.find(x => x.uid === uid);
    html += `
      <div class="team-slot">
        <b>${i < 2 ? "前排" : "後排"} ${i+1}</b><br>
        ${h ? `<div class="avatar">${h.icon}</div>${h.name}<br>戰力 ${power(h)}<br><button onclick="removeTeam(${i})">下陣</button>` : "空位"}
      </div>
    `;
  }
  html += `</div><div class="panel"><div class="title">選擇武將上陣</div><div class="card-grid">`;

  state.heroes.forEach(h => {
    const onTeam = state.team.includes(h.uid);
    html += `
      <div class="hero-card ${h.rare.toLowerCase()}">
        <div class="avatar">${h.icon}</div>
        <b>${h.name}</b><br>
        Lv.${h.level} ${h.star}★<br>
        戰力：${power(h)}<br>
        <button ${onTeam ? "disabled" : ""} onclick="addTeam('${h.uid}')">
          ${onTeam ? "已上陣" : "上陣"}
        </button>
      </div>
    `;
  });

  html += `</div></div>`;
  setContent(html);
}

function addTeam(uid) {
  if (state.team.length >= 5) return alert("最多上陣 5 人");
  state.team.push(uid);
  save();
  showTeam();
}

function removeTeam(index) {
  state.team.splice(index, 1);
  save();
  showTeam();
}

function showSummon() {
  setContent(`
    <div class="panel">
      <div class="title">酒館招募</div>
      <p>消耗 100 元寶抽 1 次。可能取得 SR / SSR / UR 武將。</p>
      <button onclick="summonOne()">招募一次</button>
      <button onclick="summonTen()">招募十次</button>
    </div>
    <div class="panel">
      <div class="title">機率</div>
      <p>UR：8%　SSR：27%　SR：65%</p>
    </div>
  `);
}

function summonOne() {
  if (state.jade < 100) return alert("元寶不足");
  state.jade -= 100;
  const h = randomHero();
  addHero(h.id);
  alert("招募成功：" + h.name + " [" + h.rare + "]");
  save();
  showSummon();
}

function summonTen() {
  if (state.jade < 1000) return alert("元寶不足");
  state.jade -= 1000;
  let names = [];
  for (let i = 0; i < 10; i++) {
    const h = randomHero();
    addHero(h.id);
    names.push(h.name + "[" + h.rare + "]");
  }
  alert("十連招募：\n" + names.join("、"));
  save();
  showSummon();
}

function randomHero() {
  const r = Math.random();
  let rarity = r < 0.08 ? "UR" : r < 0.35 ? "SSR" : "SR";
  const list = heroPool.filter(h => h.rare === rarity);
  return list[Math.floor(Math.random() * list.length)];
}

function teamPower() {
  return state.team
    .map(uid => state.heroes.find(h => h.uid === uid))
    .filter(Boolean)
    .reduce((sum, h) => sum + power(h), 0);
}

function showBattle() {
  const allies = state.team
    .map(uid => state.heroes.find(h => h.uid === uid))
    .filter(Boolean);

  if (allies.length === 0) {
    setContent(`<div class="panel">請先到「陣容」安排武將。</div>`);
    return;
  }

  setContent(`
    <div class="panel">
      <div class="title">關卡 ${state.stage}：黃巾殘軍</div>
      <p>隊伍戰力：${teamPower()}　建議戰力：${state.stage * 900}</p>
      <button onclick="startBattle()">開始自動戰鬥</button>
    </div>
    <div class="battlefield" id="field"></div>
    <div class="panel">
      <div class="title">戰鬥紀錄</div>
      <div class="log" id="battleLog"></div>
    </div>
  `);
}

function createBattleUnits() {
  const allies = state.team
    .map(uid => state.heroes.find(h => h.uid === uid))
    .filter(Boolean)
    .map((h, i) => ({
      side:"ally",
      name:h.name,
      icon:h.icon,
      skill:h.skill,
      x:80 + (i % 2) * 90,
      y:70 + i * 70,
      maxHp:stat(h, "hp"),
      hp:stat(h, "hp"),
      atk:stat(h, "atk"),
      def:stat(h, "def"),
      rage:0,
      cd:0
    }));

  const enemyNames = ["黃巾兵", "黃巾弓兵", "黃巾力士", "張梁", "張寶"];
  const enemies = enemyNames.map((name, i) => {
    const boss = i >= 3;
    return {
      side:"enemy",
      name,
      icon: boss ? "👹" : "⚔️",
      skill: boss ? "妖術爆炎" : "亂擊",
      x:620 + (i % 2) * 90,
      y:70 + i * 70,
      maxHp:Math.floor((420 + state.stage * 95) * (boss ? 1.7 : 1)),
      hp:Math.floor((420 + state.stage * 95) * (boss ? 1.7 : 1)),
      atk:Math.floor((55 + state.stage * 9) * (boss ? 1.4 : 1)),
      def:Math.floor(18 + state.stage * 3),
      rage:0,
      cd:0
    };
  });

  return { allies, enemies };
}

let battleTimer = null;

function startBattle() {
  if (battleTimer) clearInterval(battleTimer);

  let { allies, enemies } = createBattleUnits();
  let tick = 0;
  writeLog("戰鬥開始！");
  renderBattle(allies, enemies);

  battleTimer = setInterval(() => {
    tick++;

    autoAct(allies, enemies);
    autoAct(enemies, allies);

    allies = allies.filter(u => u.hp > 0);
    enemies = enemies.filter(u => u.hp > 0);

    renderBattle(allies, enemies);

    if (enemies.length === 0) {
      clearInterval(battleTimer);
      battleTimer = null;
      winBattle();
    }

    if (allies.length === 0) {
      clearInterval(battleTimer);
      battleTimer = null;
      loseBattle();
    }
  }, 700);
}

function autoAct(team, targets) {
  team.forEach(u => {
    if (targets.length === 0) return;

    u.cd--;
    if (u.cd > 0) return;

    const target = targets[Math.floor(Math.random() * targets.length)];

    if (u.rage >= 100) {
      const dmg = Math.max(1, Math.floor(u.atk * 2.4 - target.def * 0.5));
      target.hp -= dmg;
      u.rage = 0;
      u.cd = 2;
      writeLog(`${u.name} 施放【${u.skill}】，對 ${target.name} 造成 ${dmg} 傷害！`);
    } else {
      const dmg = Math.max(1, Math.floor(u.atk - target.def * 0.45 + Math.random() * 20));
      target.hp -= dmg;
      u.rage += 30;
      u.cd = 1;
      writeLog(`${u.name} 攻擊 ${target.name}，造成 ${dmg} 傷害。`);
    }

    target.hp = Math.max(0, target.hp);
  });
}

function renderBattle(allies, enemies) {
  const field = document.getElementById("field");
  if (!field) return;

  field.innerHTML = "";

  [...allies, ...enemies].forEach(u => {
    const div = document.createElement("div");
    div.className = "unit " + u.side;
    div.style.left = u.x + "px";
    div.style.top = u.y + "px";
    div.innerHTML = `
      <div>${u.icon} ${u.name}</div>
      <div class="hpbar"><div class="hpfill" style="width:${u.hp/u.maxHp*100}%"></div></div>
      <div class="ragebar"><div class="ragefill" style="width:${u.rage}%"></div></div>
      <small>${Math.floor(u.hp)}/${u.maxHp}</small>
    `;
    field.appendChild(div);
  });
}

function writeLog(text) {
  const log = document.getElementById("battleLog");
  if (!log) return;
  const div = document.createElement("div");
  div.textContent = text;
  log.prepend(div);
}

function winBattle() {
  const goldGain = 800 + state.stage * 120;
  const jadeGain = 30;
  state.gold += goldGain;
  state.jade += jadeGain;
  state.stage++;
  save();
  alert(`勝利！獲得金幣 ${goldGain}、元寶 ${jadeGain}`);
  showBattle();
}

function loseBattle() {
  alert("戰敗！請升級武將或調整陣容。");
  showBattle();
}

load();
showHome();
</script>
</body>
</html>
