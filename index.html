<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>三國志 Web：戰法覺醒版 v2.0</title>
    <style>
        :root { --color-shu: #2980b9; --color-wei: #c0392b; --color-wu: #27ae60; --color-none: #7f8c8d; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: #1a1a1a; color: #fff; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .header { background: #2c3e50; width: 100%; padding: 10px; text-align: center; border-bottom: 4px solid #f1c40f; display: flex; justify-content: space-around; align-items: center; }
        .game-area { display: flex; gap: 20px; padding: 20px; flex-wrap: wrap; justify-content: center; }
        .map-grid { display: grid; grid-template-columns: repeat(10, 60px); grid-template-rows: repeat(10, 60px); gap: 2px; background: #222; padding: 10px; border: 5px solid #3e2723; border-radius: 8px; }
        .cell { width: 60px; height: 60px; background: #2e7d32; display: flex; align-items: center; justify-content: center; position: relative; cursor: pointer; }
        .cell.city { background: #546e7a; border: 2px inset #f1c40f; }
        .unit { width: 48px; height: 48px; border-radius: 50%; border: 2px solid #fff; background-size: cover; position: absolute; z-index: 10; transition: 0.3s; }
        .unit.selected { border-color: #f1c40f; box-shadow: 0 0 15px #f1c40f; transform: scale(1.1); }
        .u-shu { background-color: var(--color-shu); }
        .u-wei { background-color: var(--color-wei); }
        .u-wu { background-color: var(--color-wu); }
        .side-panel { width: 320px; background: #34495e; padding: 15px; border-radius: 12px; }
        .action-menu { background: #2c3e50; padding: 10px; border-radius: 8px; margin-bottom: 10px; display: none; border: 2px solid #f1c40f; }
        .log { background: #000; padding: 10px; height: 150px; overflow-y: auto; font-size: 13px; color: #2ecc71; border-radius: 8px; }
        button { padding: 8px; cursor: pointer; font-weight: bold; border: none; border-radius: 4px; margin: 2px; }
        .btn-attack { background: #c0392b; color: white; width: 100%; }
        .btn-tactic { background: #f39c12; color: white; width: 100%; }
        .btn-next { background: #27ae60; color: white; width: 100%; margin-top: 10px; font-size: 1.1em; }
    </style>
</head>
<body>

<div class="header">
    <div id="playerIndicator" style="padding:5px 15px; border-radius:5px;">載入中...</div>
    <div>📅 第 <span id="uiTurn">1</span> 旬</div>
    <div>💰 金：<span id="uiGold">1000</span></div>
</div>

<div class="game-area">
    <div id="map" class="map-grid"></div>
    <div class="side-panel">
        <div id="actionMenu" class="action-menu">
            <b id="activeUnitName">武將</b>
            <button class="btn-attack" onclick="handleAttack()">⚔️ 普通攻擊</button>
            <button class="btn-tactic" id="tacticBtn" onclick="handleTactic()">🔥 發動戰法</button>
        </div>
        <div id="infoBox"><h3>戰略中心</h3><div id="targetStats">選取部隊以行動</div></div>
        <div class="log" id="logBox">> 歡迎，主公。</div>
        <button class="btn-next" onclick="nextTurn()">⏳ 結束回合 (AI 運算)</button>
    </div>
</div>

<script>
    const UNIT_TYPES = {
        '騎': { bonus: '步', move: 3, tactic: '突擊', img: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Zhao' },
        '步': { bonus: '弓', move: 2, tactic: '火計', img: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Guan' },
        '弓': { bonus: '騎', move: 1, tactic: '亂射', img: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Huang' }
    };

    let gameState = {
        turn: 1, currentPlayerIndex: 0,
        factions: [
            { id: 'shu', name: '蜀軍', color: 'var(--color-shu)', gold: 1000, isAI: false },
            { id: 'wei', name: '魏軍', color: 'var(--color-wei)', gold: 1000, isAI: true },
            { id: 'wu', name: '吳軍', color: 'var(--color-wu)', gold: 1000, isAI: true }
        ],
        units: [
            { id: 1, name: "趙雲", faction: 'shu', type: '騎', x: 2, y: 2, troops: 5000, acted: false },
            { id: 2, name: "曹操", faction: 'wei', type: '步', x: 7, y: 2, troops: 6000, acted: false },
            { id: 3, name: "孫權", faction: 'wu', type: '弓', x: 5, y: 7, troops: 5500, acted: false }
        ],
        cities: [
            { id: 1, x: 1, y: 1, faction: 'shu', name: "成都" },
            { id: 2, x: 8, y: 1, faction: 'wei', name: "許昌" },
            { id: 3, x: 8, y: 8, faction: 'wu', name: "建業" }
        ]
    };

    let selectedUnit = null;

    function initMap() {
        const mapEl = document.getElementById('map');
        mapEl.innerHTML = '';
        for (let y = 0; y < 10; y++) {
            for (let x = 0; x < 10; x++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                const city = gameState.cities.find(c => c.x === x && c.y === y);
                if (city) {
                    cell.classList.add('city');
                    cell.innerHTML = `<span style="color:${getFactionColor(city.faction)}">🏰</span>`;
                }
                cell.onclick = () => handleCellClick(x, y);
                mapEl.appendChild(cell);
            }
        }
        renderUnits();
        updateUI();
    }

    function renderUnits() {
        gameState.units.forEach(u => {
            if (u.troops <= 0) return;
            const cellIndex = u.y * 10 + u.x;
            const cell = document.getElementById('map').children[cellIndex];
            const uEl = document.createElement('div');
            uEl.className = `unit u-${u.faction} ${selectedUnit === u ? 'selected' : ''}`;
            uEl.style.backgroundImage = `url('${UNIT_TYPES[u.type].img}')`;
            if (u.acted) uEl.style.filter = "grayscale(1)";
            cell.appendChild(uEl);
        });
    }

    function handleCellClick(x, y) {
        const currentFac = gameState.factions[gameState.currentPlayerIndex];
        const unitAtPos = gameState.units.find(u => u.x === x && u.y === y && u.troops > 0);

        if (unitAtPos && unitAtPos.faction === currentFac.id) {
            if (unitAtPos.acted) { log(`${unitAtPos.name} 本旬已行動。`); return; }
            selectedUnit = unitAtPos;
            showActionMenu(unitAtPos);
            initMap();
        } else if (selectedUnit) {
            const dist = Math.abs(x - selectedUnit.x) + Math.abs(y - selectedUnit.y);
            if (dist <= UNIT_TYPES[selectedUnit.type].move) {
                selectedUnit.x = x; selectedUnit.y = y;
                log(`${selectedUnit.name} 移動至 (${x},${y})`);
                checkCityCapture(selectedUnit);
                // 移動後不自動結束，允許攻擊
                initMap();
            }
        }
    }

    function showActionMenu(unit) {
        const menu = document.getElementById('actionMenu');
        menu.style.display = 'block';
        document.getElementById('activeUnitName').innerText = `${unit.name} (${unit.type}兵 ${unit.troops})`;
        document.getElementById('tacticBtn').innerText = `🔥 戰法：${UNIT_TYPES[unit.type].tactic}`;
    }

    function handleAttack() {
        if (!selectedUnit) return;
        const enemy = gameState.units.find(u => 
            u.faction !== selectedUnit.faction && 
            Math.abs(u.x - selectedUnit.x) + Math.abs(u.y - selectedUnit.y) === 1 &&
            u.troops > 0
        );

        if (enemy) {
            const damage = calculateDamage(selectedUnit, enemy, false);
            enemy.troops -= damage;
            const counter = Math.floor(calculateDamage(enemy, selectedUnit, false) * 0.5);
            selectedUnit.troops -= counter;
            log(`⚔️ ${selectedUnit.name} 攻擊 ${enemy.name}，造成 ${damage} 傷害！`);
            if (enemy.troops <= 0) log(`💀 ${enemy.name} 陣亡了！`);
            finishAction();
        } else {
            log("範圍內沒有敵軍！", "orange");
        }
    }

    function handleTactic() {
        if (!selectedUnit) return;
        const enemy = gameState.units.find(u => 
            u.faction !== selectedUnit.faction && 
            Math.abs(u.x - selectedUnit.x) + Math.abs(u.y - selectedUnit.y) <= 2 &&
            u.troops > 0
        );

        if (enemy) {
            const damage = calculateDamage(selectedUnit, enemy, true);
            enemy.troops -= damage;
            log(`🔥 ${selectedUnit.name} 發動【${UNIT_TYPES[selectedUnit.type].tactic}】，${enemy.name} 兵力大損 ${damage}！`, "gold");
            finishAction();
        } else {
            log("戰法範圍內沒有敵軍！", "orange");
        }
    }

    function calculateDamage(attacker, defender, isTactic) {
        let base = attacker.troops * 0.2;
        if (UNIT_TYPES[attacker.type].bonus === defender.type) base *= 1.5; // 相剋加成
        if (isTactic) base *= 2;
        return Math.floor(base * (0.8 + Math.random() * 0.4));
    }

    function finishAction() {
        selectedUnit.acted = true;
        selectedUnit = null;
        document.getElementById('actionMenu').style.display = 'none';
        initMap();
    }

    function nextTurn() {
        gameState.units.forEach(u => u.acted = false);
        gameState.currentPlayerIndex = (gameState.currentPlayerIndex + 1) % gameState.factions.length;
        const fac = gameState.factions[gameState.currentPlayerIndex];
        
        if (fac.isAI) {
            runSimpleAI(fac.id);
            setTimeout(nextTurn, 1000);
        } else {
            if (gameState.currentPlayerIndex === 0) gameState.turn++;
            log(`--- 第 ${gameState.turn} 旬：${fac.name}回合 ---`, "#3498db");
        }
        initMap();
    }

    function runSimpleAI(facId) {
        const units = gameState.units.filter(u => u.faction === facId && u.troops > 0);
        units.forEach(u => {
            const playerUnit = gameState.units.find(pu => pu.faction === 'shu' && pu.troops > 0);
            if (playerUnit) {
                if (u.x < playerUnit.x) u.x++; else if (u.x > playerUnit.x) u.x--;
                if (Math.abs(u.x - playerUnit.x) + Math.abs(u.y - playerUnit.y) === 1) {
                    playerUnit.troops -= calculateDamage(u, playerUnit, false);
                    log(`⚠️ ${u.name} 突襲了您的部隊！`, "red");
                }
            }
        });
    }

    function checkCityCapture(unit) {
        const city = gameState.cities.find(c => c.x === unit.x && c.y === unit.y);
        if (city && city.faction !== unit.faction) {
            city.faction = unit.faction;
            log(`🚩 ${unit.name} 佔領了 ${city.name}！`, "gold");
        }
    }

    function getFactionColor(id) { return id === 'none' ? '#7f8c8d' : `var(--color-${id})`; }
    function updateUI() {
        const f = gameState.factions[gameState.currentPlayerIndex];
        document.getElementById('uiTurn').innerText = gameState.turn;
        document.getElementById('uiGold').innerText = f.gold;
        const ind = document.getElementById('playerIndicator');
        ind.innerText = f.name; ind.style.backgroundColor = f.color;
    }
    function log(msg, col="#2ecc71") {
        const b = document.getElementById('logBox');
        b.innerHTML += `<div style="color:${col}">> ${msg}</div>`;
        b.scrollTop = b.scrollHeight;
    }

    initMap();
</script>
</body>
</html>
